/* ── Cloud persistence helpers ── */
async function loadSB(key) {
  if (!supabase) return null;
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return null;
    const { data, error } = await supabase.from('user_store').select('value').eq('user_id', user.id).eq('key', key).maybeSingle();
    if (error) throw error;
    return data ? data.value : null;
  } catch (e) { console.warn('[SB] loadSB error:', e.message); return null; }
}

async function saveSB(key, value) {
  if (!supabase) return false;
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return false;
    const { error } = await supabase.from('user_store').upsert(
      { user_id: user.id, key, value, updated_at: new Date().toISOString() },
      { onConflict: 'user_id,key' }
    );
    if (error) throw error;
    return true;
  } catch (e) { console.warn('[SB] saveSB error:', e.message); return false; }
}

async function deleteSB(key) {
  if (!supabase) return false;
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return false;
    const { error } = await supabase.from('user_store').delete().eq('user_id', user.id).eq('key', key);
    if (error) throw error;
    return true;
  } catch (e) { console.warn('[SB] deleteSB error:', e.message); return false; }
}

/* ── Recurrence helpers ── */
function getNextOccurrence(task){
  if(!task.recurrence||!task.dueDate)return null;
  const rec=task.recurrence;
  const curDate=new Date(task.dueDate);
  let nextDate=new Date(curDate);

  if(rec.type==='daily'){
    nextDate.setDate(nextDate.getDate()+1);
  }else if(rec.type==='weekly'){
    nextDate.setDate(nextDate.getDate()+7);
  }else if(rec.type==='biweekly'){
    nextDate.setDate(nextDate.getDate()+14);
  }else if(rec.type==='monthly'){
    nextDate.setMonth(nextDate.getMonth()+1);
  }else if(rec.type==='custom'&&rec.interval&&rec.unit){
    if(rec.unit==='days')nextDate.setDate(nextDate.getDate()+rec.interval);
    else if(rec.unit==='weeks')nextDate.setDate(nextDate.getDate()+rec.interval*7);
    else if(rec.unit==='months')nextDate.setMonth(nextDate.getMonth()+rec.interval);
  }

  if(rec.endDate&&nextDate.toLocaleDateString('en-CA')>rec.endDate)return null;
  return nextDate.toLocaleDateString('en-CA');
}

function cloneRecurringTask(task){
  const nextDue=getNextOccurrence(task);
  if(!nextDue)return null;
  return{
    ...task,
    id:uuid(),
    status:'',
    dueDate:nextDue,
    statusChanged:null,
    dateCompleted:null,
    dateAdded:now(),
  };
}

function describeRecurrence(rec){
  if(!rec)return'';
  if(rec.type==='daily')return'Every day';
  if(rec.type==='weekly')return'Every week';
  if(rec.type==='biweekly')return'Every 2 weeks';
  if(rec.type==='monthly')return'Every month';
  if(rec.type==='custom'&&rec.interval&&rec.unit){
    const u=rec.unit==='days'?'day':(rec.unit==='weeks'?'week':'month');
    return'Every '+rec.interval+' '+u+(rec.interval>1?'s':'');
  }
  return'';
}

function processAutoReturns(tasks){
  const n=msNow();let changed=false;
  const out=tasks.map(t=>{
    if(t.autoReturn&&t.statusChanged&&AUTO_RETURN_MS[t.status]){
      if(n-new Date(t.statusChanged).getTime()>=AUTO_RETURN_MS[t.status]){
        changed=true;return{...t,status:'',statusChanged:now(),autoReturn:true};
      }
    }
    return t;
  });
  return{tasks:out,changed};
}

function processDueDates(tasks){
  const n=msNow();let changed=false;
  const out=tasks.map(t=>{
    if(t.dueDate&&t.status!==''&&t.status!=='x'&&t.status!=='s'&&t.status!=='u'){
      const diff=new Date(t.dueDate).getTime()-n;
      if(diff<=DUE_SOON_MS&&diff>-86400000*30){changed=true;return{...t,status:'',statusChanged:now()};}
    }
    return t;
  });
  return{tasks:out,changed};
}

/* ── Import/Export Utilities ── */
function parseXlsxDate(val){
  if(!val)return null;
  if(val instanceof Date||typeof val==='number'){
    if(typeof val==='number'){const d=XLSX.SSF.parse_date_code(val);return new Date(d.y,d.m-1,d.d,d.H||0,d.M||0,d.S||0).toISOString();}
    return new Date(val).toISOString();
  }
  const s=String(val).trim();if(!s)return null;
  const d=new Date(s);
  if(!isNaN(d.getTime()))return d.toISOString();
  const cleaned=s.replace(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),\s*/i,'');
  const d2=new Date(cleaned);
  if(!isNaN(d2.getTime()))return d2.toISOString();
  return null;
}

function importFromXlsx(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:null});
        const STATUS_MAP={'x':'x','s':'s','t':'t','w':'w','m':'m','l':'l','u':'u'};
        const tasks=[];
        for(const row of rows){
          const title=row['Todo 2026']||row['Todo']||row['Title']||row['title']||row['Task'];
          if(!title||String(title).trim()==='')continue;
          const rawStatus=row['x']||row['Status']||row['status']||'';
          const status=STATUS_MAP[String(rawStatus).trim().toLowerCase()]||'';
          const dateAdded=parseXlsxDate(row['Date Added'])||now();
          const dateCompleted=parseXlsxDate(row['Date Completed'])||null;
          const dueDate=parseXlsxDate(row['Due Date']);
          const dueDateStr=dueDate?dueDate.split('T')[0]:null;
          tasks.push({
            id:uuid(),
            title:String(title).trim(),
            status,
            order:row['Order']!=null?Number(row['Order']):tasks.length,
            category:row['Category']&&String(row['Category']).trim()?String(row['Category']).trim():null,
            importance:row['Importance']!=null?row['Importance']:null,
            dateAdded,
            dateCompleted:status==='x'?dateCompleted||dateAdded:null,
            statusChanged:status?dateCompleted||dateAdded:null,
            dueDate:dueDateStr,
            notes:row['Notes']?String(row['Notes']):'',
            autoReturn:status==='t'||status==='w'||status==='m',
            recurrence:null,
            startTime:null,
            endTime:null,
          });
        }
        resolve(tasks);
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsArrayBuffer(file);
  });
}

function importFromJson(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.tasks&&Array.isArray(data.tasks)){
          resolve({tasks:data.tasks,categories:data.categories||null});
        }else if(Array.isArray(data)){
          resolve({tasks:data,categories:null});
        }else{reject(new Error('Unrecognized JSON format'));}
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

function exportToJson(tasks,categories){
  const data=JSON.stringify({version:1,exportedAt:now(),tasks,categories},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='taskflow-export-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportToXlsx(tasks){
  const rows=tasks.map(t=>({
    'x':t.status||'',
    'Todo 2026':t.title,
    'Order':t.order??'',
    'Category':t.category||'',
    'Importance':t.importance||'',
    'Date Added':t.dateAdded?new Date(t.dateAdded).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}):'',
    'Date Completed':t.dateCompleted?new Date(t.dateCompleted).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}):'',
    'Due Date':t.dueDate||'',
    'Recurrence':describeRecurrence(t.recurrence)||'',
    'Notes':t.notes||'',
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const colWidths=[{wch:4},{wch:45},{wch:6},{wch:14},{wch:12},{wch:42},{wch:42},{wch:12},{wch:20},{wch:30}];
  ws['!cols']=colWidths;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Daily');
  XLSX.writeFile(wb,'taskflow-export-'+new Date().toISOString().split('T')[0]+'.xlsx');
}

function exportMindmapJson(projects){
  const data={version:1,type:'taskflow-mindmap',exportedAt:new Date().toISOString(),projects:projects.map(p=>{
    const nodes=loadLS('taskflow-mm-'+p.id,[]); return{...p,nodes};
  })};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='mindmap-export-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importMindmapJson(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.type!=='taskflow-mindmap'||!Array.isArray(data.projects)){reject(new Error('Not a valid TaskFlow mindmap export'));return;}
        resolve(data.projects);
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

/* ── Claude Prompt Generator ── */

function generateClaudePrompt(rootNode, allNodes, projectName) {
  // Build tree structure text from nodes
  function buildTreeText(nodeId, depth) {
    const node = allNodes.find(n => n.id === nodeId);
    if (!node) return '';
    const indent = '  '.repeat(depth);
    const status = node.checked ? ' [COMPLETED]' : '';
    let line = indent + '- ' + node.title + status + '\n';
    if (node.notes && node.notes.trim()) {
      const notesLines = node.notes.trim().split('\n');
      notesLines.forEach(nl => {
        line += indent + '  > ' + nl + '\n';
      });
    }
    if (node.children && node.children.length > 0) {
      node.children.forEach(childId => {
        line += buildTreeText(childId, depth + 1);
      });
    }
    return line;
  }

  // Count stats
  function countNodes(nodeId) {
    const node = allNodes.find(n => n.id === nodeId);
    if (!node) return { total: 0, completed: 0, pending: 0 };
    let total = 1, completed = node.checked ? 1 : 0;
    (node.children || []).forEach(cid => {
      const sub = countNodes(cid);
      total += sub.total;
      completed += sub.completed;
    });
    return { total, completed, pending: total - completed };
  }

  const stats = countNodes(rootNode.id);
  const treeText = buildTreeText(rootNode.id, 0);

  // Build the prompt
  const prompt = `You are a planning and implementation agent. I need you to analyze the following task tree and generate a detailed, actionable plan to complete all remaining work.

## Project Context
**Project:** ${projectName}
**Branch:** ${rootNode.title}
**Progress:** ${stats.completed}/${stats.total} tasks completed (${stats.pending} remaining)

## Task Tree
The following is a hierarchical breakdown of the work. Items marked [COMPLETED] are already done. Indentation indicates parent-child relationships. Lines starting with ">" are notes/details for that task.

\`\`\`
${treeText.trimEnd()}
\`\`\`

## Instructions
1. Review the entire task tree above, paying attention to the hierarchy and any notes attached to tasks.
2. Identify all incomplete tasks and understand their relationships to parent/sibling tasks.
3. Generate a step-by-step implementation plan that:
   - Respects the dependency order implied by the tree structure
   - Accounts for what has already been completed
   - Breaks down any high-level tasks into concrete actions
   - Identifies potential blockers or decisions that need to be made
   - Suggests a logical ordering for parallel vs sequential work
4. For each step, provide:
   - What to do
   - Why it matters in context of the overall branch
   - Any relevant details from the notes
   - Estimated complexity (small / medium / large)

Please output the plan in a clear, numbered format that can be executed sequentially.`;

  return prompt;
}

        borderRadius:8,cursor:'grab',userSelect:'none',
        border:isSelected?'1.5px solid #4a9eff':'1.5px solid #333333',
        transition:'all 0.15s ease',position:'relative',
        opacity:task.status==='s'?0.45:1,
        marginBottom:3,
      }}>

      {/* Left accent bar — outline: click to add subtask; filled: has children, click to collapse/expand */}
      {(()=>{
        const barColor=hasChildren?(task.collapsed?'#4a9eff':'#6ecf6e'):(s.color||'#555');
        return(
          <div onClick={e=>{e.stopPropagation();if(hasChildren)onToggleCollapse(task.id);else if(depth<3)onAddSubtask(task.id);}}
            style={{position:'absolute',left:0,top:0,bottom:0,width:5,
              background:hasChildren?barColor:'transparent',
              borderLeft:hasChildren?'none':('2px solid '+barColor+'44'),
              cursor:hasChildren||(depth<3)?'pointer':'default',
              transition:'all 0.2s',borderRadius:'8px 0 0 8px',
            }}
            onMouseEnter={e=>{if(hasChildren)e.currentTarget.style.opacity='0.7';else if(depth<3)e.currentTarget.style.borderLeftColor=barColor+'88';}}
            onMouseLeave={e=>{if(hasChildren)e.currentTarget.style.opacity='1';else if(depth<3)e.currentTarget.style.borderLeftColor=barColor+'44';}}
            title={hasChildren?(task.collapsed?'Expand subtasks':'Collapse subtasks'):(depth<3?'Add subtask':'')}/>
        );
      })()}

      {/* Order number */}
      {showOrder&&<span style={{width:24,textAlign:'right',fontSize:14,fontFamily:"'JetBrains Mono',monospace",color:'#606060',fontWeight:600,flexShrink:0}}>{idx}</span>}

      {/* Status badge - click for dropdown, double-click for instant x */}
      <div style={{position:'relative',flexShrink:0}}>
        <span onClick={handleStatusClick} style={{
          width:30,height:30,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:17,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',
          background:task.status?s.bg:'#2a2a2a',color:task.status?s.color:'#4a4a4a',
          border:task.status?'none':'2px solid #333333',
          transition:'all 0.15s',
        }}>{task.status||'·'}</span>
        {statusOpen&&<StatusDropdown onSelect={st=>{onChangeStatus(task.id,st);setStatusOpen(false);}} onClose={()=>setStatusOpen(false)}/>}
      </div>

      {/* Title */}
      <div style={{flex:1,minWidth:0}}>
        {editing?(
          <input ref={inp} value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={donEdit}
            onKeyDown={e=>{if(e.key==='Enter')donEdit();if(e.key==='Escape')setEditing(false);}}
            style={{border:'none',outline:'none',background:'#1a1a1a',padding:'4px 8px',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,borderRadius:4,boxShadow:'0 0 0 2px #4a9eff',color:'#e0e0e0',width:'100%'}}/>
        ):(
          <span onClick={e=>{e.stopPropagation();setEditing(true);setEditVal(task.title);}} style={{
            fontSize:15,fontFamily:"'IBM Plex Sans',sans-serif",
            color:task.status==='x'?'#5a8a5a':(task.status==='s'?'#555':'#d0d4e0'),
            textDecoration:task.status==='x'?'line-through':'none',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.35,
            fontWeight:task.status==='u'?600:400,cursor:'text',display:'inline',
          }}>{task.title}</span>
        )}
      </div>

      {/* Auto-return countdown + recurrence indicator */}
      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
        {task.recurrence&&<span style={{fontSize:12,color:'#888',fontFamily:"'JetBrains Mono',monospace"}}>🔁</span>}
        {retInfo&&task.autoReturn&&<span style={{fontSize:12,color:s.color,fontFamily:"'JetBrains Mono',monospace",opacity:0.7}}>↩ {retInfo}</span>}
      </div>

      {/* Category pill */}
      <div style={{position:'relative',flexShrink:0}}>
        {catCfg?(
          <button onClick={e=>{e.stopPropagation();setCatOpen(!catOpen);}} style={{border:'none',borderRadius:5,padding:'3px 10px',fontSize:12,background:catCfg.bg,cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:catCfg.text||'#222'}}>{task.category}</button>
        ):(
          <button onClick={e=>{e.stopPropagation();setCatOpen(!catOpen);}} style={{border:'1.5px dashed #333',borderRadius:5,padding:'3px 8px',fontSize:12,color:'#444',background:'transparent',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}}>+</button>
        )}
        {catOpen&&<CatDropdown categories={categories} onSelect={c=>{onUpdate({...task,category:c});setCatOpen(false);}} onClose={()=>setCatOpen(false)}/>}
      </div>

      {/* Due date */}
      <div style={{position:'relative',flexShrink:0,display:'flex',alignItems:'center',gap:4}}>
        {task.dueDate?(
          <>
            <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",padding:'3px 8px',borderRadius:5,
              background:overdue?'#4a1a1a':(soon?'#3a3520':'#2e2e2e'),
              color:overdue?'#ff6b6b':(soon?'#f0c040':'#5a6080'),
            }}>{new Date(task.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            <button onClick={e=>{e.stopPropagation();onUpdate({...task,dueDate:null});}}
              style={{border:'none',background:'transparent',cursor:'pointer',color:'#444',fontSize:16,padding:'0 2px',lineHeight:1}}
              onMouseEnter={e=>e.currentTarget.style.color='#ff6b6b'} onMouseLeave={e=>e.currentTarget.style.color='#444'} title="Remove due date">×</button>
          </>
        ):(
          <>
            <button onClick={e=>{e.stopPropagation();setDuePicker(!duePicker);}}
              style={{border:'1px dashed #3a3a3a',borderRadius:5,padding:'3px 8px',fontSize:12,color:'#555555',background:'transparent',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}} title="Add due date">📅</button>
            {duePicker&&<input type="date" autoFocus style={{position:'absolute',top:32,right:0,zIndex:200,background:'#2c2c2c',border:'1px solid #333',borderRadius:6,padding:8,fontSize:13,color:'#ccc',colorScheme:'dark'}}
              onChange={e=>{if(e.target.value)onUpdate({...task,dueDate:e.target.value});setDuePicker(false);}} onBlur={()=>setDuePicker(false)}/>}
          </>
        )}
      </div>

      {/* Timestamps */}
      {task.status==='x'?(
        <div style={{display:'flex',gap:10,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:'#3a5a3a',flexShrink:0,textAlign:'right'}}>
          <span>+ {fmt(task.dateAdded)}</span>
          {task.dateCompleted&&<span>✓ {fmt(task.dateCompleted)}</span>}
        </div>
      ):(
        <span style={{fontSize:11,color:'#4a4a4a',fontFamily:"'JetBrains Mono',monospace",flexShrink:0,minWidth:100,textAlign:'right'}}>{fmt(task.dateAdded)}</span>
      )}

    </div>
  );
}

  );

/* ══════════════════════════════════════════
   ── Mindmap: Tree Layout Algorithm ──
   ══════════════════════════════════════════ */

function buildTreeStructure(nodes, rootId) {
  const nodeMap = new Map();
  nodes.forEach(node => {
    nodeMap.set(node.id, { ...node, _children: [] });
  });
  nodes.forEach(node => {
    if (node.parentId) {
      const parent = nodeMap.get(node.parentId);
      if (parent) parent._children.push(nodeMap.get(node.id));
    }
  });
  return nodeMap.get(rootId);
}

function initializeLayoutTree(node, nodeWidth, nodeHeight, parent) {
  const layoutNode = {
    id: node.id, data: node,
    x: 0, y: 0, width: nodeWidth, height: nodeHeight,
    prelim: 0, modifier: 0,
    parent: parent || null,
    number: 0,
    children: []
  };
  if (!node.collapsed) {
    layoutNode.children = node._children.map((child, index) => {
      const lc = initializeLayoutTree(child, nodeWidth, nodeHeight, layoutNode);
      lc.number = index;
      return lc;
    });
  }
  return layoutNode;
}

function firstWalk(node) {
  if (node.children.length === 0) {
    const ls = node.parent ? node.parent.children[node.number - 1] : null;
    node.prelim = ls ? ls.prelim + 2 : 0;
  } else {
    node.children.forEach(c => firstWalk(c));
    const mid = node.children.reduce((s, c) => s + c.prelim, 0) / node.children.length;
    const ls = node.parent ? node.parent.children[node.number - 1] : null;
    if (ls) {
      node.prelim = ls.prelim + 2;
      node.modifier = node.prelim - mid;
    } else {
      node.prelim = mid;
    }
  }
}

function secondWalk(node, modifier) {
  node.x = node.prelim + modifier;
  node.children.forEach(c => secondWalk(c, modifier + node.modifier));
}

function findMinX(node) {
  let min = node.x;
  node.children.forEach(c => { min = Math.min(min, findMinX(c)); });
  return min;
}

function collectPositioned(node, out, depth, minX, hs, vs, nw, nh) {
  out.push({ id: node.id, x: Math.round((node.x - minX) * hs), y: Math.round(depth * vs), width: nw, height: nh });
  node.children.forEach(c => collectPositioned(c, out, depth + 1, minX, hs, vs, nw, nh));
}

function computeTreeLayout(nodes, rootId, options = {}) {
  const { horizontalSpacing = 120, verticalSpacing = 80, nodeWidth = 200, nodeHeight = 54 } = options;
  const root = buildTreeStructure(nodes, rootId);
  if (!root) return [];
  const layoutRoot = initializeLayoutTree(root, nodeWidth, nodeHeight, null);
  firstWalk(layoutRoot);
  secondWalk(layoutRoot, 0);
  const minX = findMinX(layoutRoot);
  const positioned = [];
  collectPositioned(layoutRoot, positioned, 0, minX, horizontalSpacing, verticalSpacing, nodeWidth, nodeHeight);
  return positioned;
}

function getVisualNodeHeight(node, posHeight) {
  const titleRowH = 38;
  const nh = posHeight || 54;
  const hasNotes = node && node.notes && node.notes.trim();
  const notesExpanded = node && node.notesExpanded;
  const notesAreaH = notesExpanded && hasNotes ? Math.max(0, nh - titleRowH) : 0;
  return titleRowH + notesAreaH;
}

function computeEdges(positionedNodes, nodes) {
  const posMap = new Map();
  const nodeMap = new Map();
  positionedNodes.forEach(p => posMap.set(p.id, p));
  nodes.forEach(n => nodeMap.set(n.id, n));
  const edges = [];
  nodes.forEach(n => {
    if (n.parentId) {
      const pp = posMap.get(n.parentId), cp = posMap.get(n.id);
      const parentNode = nodeMap.get(n.parentId);
      if (pp && cp) {
        const parentVisH = getVisualNodeHeight(parentNode, pp.height);
        edges.push({
          fromId: n.parentId, toId: n.id,
          fromX: Math.round(pp.x + pp.width / 2), fromY: Math.round(pp.y + parentVisH),
          toX: Math.round(cp.x + cp.width / 2), toY: Math.round(cp.y),
          parentColor: parentNode ? (parentNode.color || '#4a9eff') : '#4a9eff'
        });
      }
    }
  });
  return edges;
}

function MindmapNode({ node, position, isSelected, isRoot, onSelect, onAddChild, onToggleCollapse, onStartRename, onToggleChecked, onAddToTasks, onStartDragNode, onStartResizeNode, onToggleNodeNotes, onSetNotes, tasks }) {
  const [hover, setHover] = useState(false);
  const [editingNotes, setEditingNotes] = useState(false);
  const [notesVal, setNotesVal] = useState(node.notes || '');
  const notesInputRef = useRef(null);
  useEffect(() => { setNotesVal(node.notes || ''); }, [node.notes]);
  useEffect(() => { if (editingNotes && notesInputRef.current) notesInputRef.current.focus(); }, [editingNotes]);
  const finishNotesEdit = () => { setEditingNotes(false); onSetNotes(notesVal); if(!notesVal.trim()&&node.notesExpanded){onToggleNodeNotes(true);} };
  const hasChildren = node.children && node.children.length > 0;
  const nw = position.width || 200, nh = position.height || 54;
  const titleRowH = 38;
  const hasNotes = node.notes && node.notes.trim();
  const notesExpanded = node.notesExpanded || editingNotes;
  const notesAreaH = notesExpanded ? Math.max(0, nh - titleRowH) : 0;
  const totalNodeH = titleRowH + notesAreaH;
  const foHeight = totalNodeH + 32;
  const isChecked = node.checked;
  const nodeColor = node.color || '#4a9eff';
  const linkedTask = node.linkedTaskId ? tasks.find(t => t.id === node.linkedTaskId) : null;
  const linkedStatus = linkedTask ? linkedTask.status : null;
  const statusCfg = linkedStatus && STATUS_CONFIG[linkedStatus] ? STATUS_CONFIG[linkedStatus] : null;

  return (
    <g onClick={e=>{e.stopPropagation();onSelect();}} onDoubleClick={e=>{e.stopPropagation();onStartRename();}}
       onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <foreignObject x={position.x} y={position.y} width={nw+4} height={foHeight+4} style={{overflow:'visible'}}>
        <div style={{position:'relative',width:nw,height:foHeight}}>
          <div onMouseDown={e=>onStartDragNode(e, node.id)} style={{
            width:nw,height:totalNodeH,background:isChecked?'#1a1a1a':'#242424',
            border:'2px solid '+(isSelected?'#4a9eff':isChecked?'#2a4a2a':'#333333'),
            borderRadius:6,
            position:'relative',cursor:'grab',
            boxShadow:isSelected?'0 0 12px rgba(74,158,255,0.3)':'none',
            opacity:isChecked?0.55:1,
            transition:'border-color 0.2s, box-shadow 0.2s',fontFamily:"'IBM Plex Sans',sans-serif",
            fontSize:isRoot?15:13,fontWeight:isRoot?600:500,color:isChecked?'#555':'#d0d4e0',
            overflow:'hidden',userSelect:'none',display:'flex',flexDirection:'column'
          }}>
            {/* Color accent bar */}
            <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:isChecked?'#6ecf6e':nodeColor,borderRadius:'4px 0 0 4px'}}/>
            {/* Top row: checkbox + title — fixed height */}
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 8px',paddingLeft:12,paddingRight:hasChildren?32:8,height:titleRowH,flexShrink:0}}>
              <div onClick={e=>{e.stopPropagation();onToggleChecked();}}
                style={{width:18,height:18,borderRadius:4,flexShrink:0,
                  border:isChecked?'2px solid #6ecf6e':'2px solid #4a4a4a',
                  background:isChecked?'#2a4a2a':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  cursor:'pointer',transition:'all 0.15s',fontSize:11,fontWeight:700,
                  color:'#6ecf6e'}}>
                {isChecked?'✓':''}
              </div>
              <div style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                textDecoration:isChecked?'line-through':'none',lineHeight:'1.3'}}>
                {node.title}
              </div>
              {linkedStatus && linkedStatus !== '' && statusCfg && (
                <span style={{fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                  background:statusCfg.bg,color:statusCfg.color,borderRadius:3,padding:'1px 5px',flexShrink:0}}>
                  {linkedStatus}
                </span>
              )}
              <div onClick={e=>{e.stopPropagation();if(!hasNotes&&!notesExpanded){onToggleNodeNotes(false);setEditingNotes(true);}else if(notesExpanded&&!hasNotes){setEditingNotes(false);onToggleNodeNotes(true);}else{onToggleNodeNotes(false);}}}
                style={{cursor:'pointer',flexShrink:0,transition:'all 0.15s',display:'flex',alignItems:'center'}}
                title={notesExpanded?'Hide notes':(hasNotes?'Show notes':'Add notes')}>
                {(()=>{const iconColor=(hasNotes||notesExpanded)?nodeColor:'#666';return(
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                  <rect x="2" y="1" width="12" height="14" rx="1.5" stroke={iconColor} strokeWidth="1.5"/>
                  <line x1="5" y1="5" x2="11" y2="5" stroke={iconColor} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1="5" y1="8" x2="11" y2="8" stroke={iconColor} strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1="5" y1="11" x2="9" y2="11" stroke={iconColor} strokeWidth="1.2" strokeLinecap="round"/>
                </svg>);})()}
              </div>
            </div>
            {/* Notes body — fills remaining space when expanded */}
            {notesExpanded && (
              editingNotes ? (
                <div style={{flex:1,borderTop:'1px solid #333333',marginLeft:12,marginRight:8,paddingTop:4,minHeight:0,display:'flex',flexDirection:'column'}}
                  onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
                  <textarea ref={notesInputRef} value={notesVal} onChange={e=>setNotesVal(e.target.value)}
                    onBlur={finishNotesEdit}
                    onKeyDown={e=>{if(e.key==='Escape'){setEditingNotes(false);setNotesVal(node.notes||'');if(!node.notes?.trim()&&node.notesExpanded)onToggleNodeNotes(true);}}}
                    style={{flex:1,border:'none',outline:'none',background:'transparent',color:'#d0d4e0',
                      fontSize:11,lineHeight:'1.4',fontFamily:"'IBM Plex Sans',sans-serif",
                      padding:'2px 0 6px',resize:'none',minHeight:0,width:'100%',cursor:'text'}}/>
                </div>
              ) : (
                <div onDoubleClick={e=>{e.stopPropagation();setEditingNotes(true);}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}
                  style={{flex:1,padding:'0 12px 6px',fontSize:11,color:hasNotes?'#8a9bb8':'#555',lineHeight:'1.4',
                    fontFamily:"'IBM Plex Sans',sans-serif",whiteSpace:'pre-wrap',wordWrap:'break-word',
                    borderTop:'1px solid #333333',marginLeft:12,marginRight:8,paddingTop:4,
                    overflow:'auto',minHeight:0,cursor:'text'}}>
                  {hasNotes ? node.notes : 'Double-click to add notes...'}
                </div>
              )
            )}
            {/* Collapse toggle for children */}
            {hasChildren&&<div onClick={e=>{e.stopPropagation();onToggleCollapse();}}
              style={{position:'absolute',right:8,top:titleRowH/2,transform:'translateY(-50%) rotateZ('+(node.collapsed?'0deg':'90deg')+')',
                width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',
                cursor:'pointer',color:'#606060',transition:'transform 0.2s',fontSize:10}}>▶</div>}
            {/* Resize handle — inside the node border, bottom-right corner */}
            <div onMouseDown={e=>{e.stopPropagation();onStartResizeNode(e, node.id);}}
              style={{position:'absolute',bottom:2,right:2,width:12,height:12,
                cursor:'nwse-resize',opacity:hover?1:0.5,transition:'opacity 0.15s',pointerEvents:'auto',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="8" height="8" viewBox="0 0 8 8">
                <line x1="7" y1="1" x2="1" y2="7" stroke={nodeColor} strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="7" y1="4" x2="4" y2="7" stroke={nodeColor} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
          </div>
          {/* Hover buttons below node */}
          <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
            display:'flex',gap:4,opacity:hover?1:0,pointerEvents:hover?'auto':'none',transition:'opacity 0.2s'}}>
            <div onClick={e=>{e.stopPropagation();onAddChild();}}
              style={{width:24,height:24,background:nodeColor,borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                color:'#1a1a1a',fontSize:14,fontWeight:'bold'}}>+</div>
            {!node.linkedTaskId && (
              <div onClick={e=>{e.stopPropagation();onAddToTasks();}} title="Add to Tasks"
                style={{height:24,padding:'0 8px',background:'#2a4a2a',borderRadius:12,
                  display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                  color:'#6ecf6e',fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap'}}>→ Tasks</div>
            )}
          </div>
        </div>
      </foreignObject>
    </g>
  );
}

function MindmapEdge({ edge }) {
  const dy = edge.toY - edge.fromY;
  const off = Math.max(dy * 0.4, 30);
  const d = `M ${edge.fromX} ${edge.fromY} C ${edge.fromX} ${edge.fromY+off}, ${edge.toX} ${edge.toY-off}, ${edge.toX} ${edge.toY}`;
  const stroke = edge.parentColor || '#333333';
  return <path d={d} stroke={stroke} strokeWidth="2" fill="none" strokeLinecap="round" pointerEvents="none"/>;
}

function MindmapNodeEditor({ node, position, onSave, onCancel }) {
  const [val, setVal] = useState(node.title);
  const ref = useRef(null);
  useEffect(()=>{if(ref.current){ref.current.focus();ref.current.select();}},[]);
  const nw = position.width || 200, nh = position.height || 54;
  return (
    <foreignObject x={position.x} y={position.y} width={nw} height={nh} style={{overflow:'visible'}}>
      <div style={{width:nw,height:nh,background:'#242424',border:'2px solid #4a9eff',borderRadius:6,
        display:'flex',alignItems:'center',padding:'0 16px',boxShadow:'0 0 12px rgba(74,158,255,0.3)'}}>
        <input ref={ref} type="text" value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();onSave(val);}else if(e.key==='Escape'){e.preventDefault();onCancel();}}}
          onBlur={()=>onCancel()} onClick={e=>e.stopPropagation()}
          style={{width:'100%',background:'transparent',border:'none',color:'#d0d4e0',
            fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,fontWeight:500,outline:'none',padding:0}}/>
      </div>
    </foreignObject>
  );
}

/* ══════════════════════════════════════════
   ── Mindmap: State Management ──
   ══════════════════════════════════════════ */

const MM_PROJECTS_KEY='taskflow-mm-projects';
const MM_DATA_PREFIX='taskflow-mm-';

function useMindmap(sbSession) {
  const [projects, setProjects] = useState(() => {
    const stored = loadLS(MM_PROJECTS_KEY, null);
    if (stored && Array.isArray(stored) && stored.length > 0) return stored;
    const pid = uuid();
    const def = [{ id: pid, name: 'My Project', color: '#4a9eff' }];
    saveLS(MM_PROJECTS_KEY, def);
    const old = loadLS('taskflow-mindmap', null);
    if (old && Array.isArray(old) && old.length > 0) {
      saveLS(MM_DATA_PREFIX + pid, old.map(n => ({ notes:'', checked:false, linkedTaskId:null, ...n })));
    } else {
      const rid = uuid();
      saveLS(MM_DATA_PREFIX + pid, [{ id:rid, parentId:null, title:'My Project', color:'#4a9eff', collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null, notesExpanded:false, customX:null, customY:null, customWidth:null, customHeight:null }]);
    }
    return def;
  });
  const [activeProjectId, setActiveProjectId] = useState(() => {
    const p = loadLS(MM_PROJECTS_KEY, []);
    return p.length > 0 ? p[0].id : null;
  });
  const [nodes, setNodes] = useState(() => {
    const p = loadLS(MM_PROJECTS_KEY, []);
    const pid = p.length > 0 ? p[0].id : null;
    if (!pid) return [];
    return loadLS(MM_DATA_PREFIX + pid, []).map(n => ({ notes:'', checked:false, linkedTaskId:null, notesExpanded:false, customX:null, customY:null, customWidth:null, customHeight:null, ...n }));
  });
  const [selectedId, setSelectedId] = useState(null);
  const [defaultNodeColor, setDefaultNodeColor] = useState('#4a9eff');

  const rootId = useMemo(() => nodes.find(n => !n.parentId)?.id || null, [nodes]);
  const persistProjects = useCallback(pp => { setProjects(pp); saveLS(MM_PROJECTS_KEY, pp); if(sbSession) debouncedSaveSB(MM_PROJECTS_KEY, pp); }, [sbSession]);
  const persistNodes = useCallback((nn, pid) => { const key = MM_DATA_PREFIX + (pid || activeProjectId); setNodes(nn); saveLS(key, nn); if(sbSession) debouncedSaveSB(key, nn); }, [activeProjectId, sbSession]);

  const switchProject = useCallback(pid => {
    setActiveProjectId(pid);
    setNodes(loadLS(MM_DATA_PREFIX + pid, []).map(n => ({ notes:'', checked:false, linkedTaskId:null, notesExpanded:false, customX:null, customY:null, customWidth:null, customHeight:null, ...n })));
    setSelectedId(null);
  }, []);

  const addProject = useCallback((name = 'New Project') => {
    const pid = uuid(), rid = uuid();
    const np = [...projects, { id:pid, name, color:'#4a9eff' }];
    persistProjects(np);
    const initNodes = [{ id:rid, parentId:null, title:name, color:'#4a9eff', collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null, notesExpanded:false, customX:null, customY:null, customWidth:null, customHeight:null }];
    saveLS(MM_DATA_PREFIX + pid, initNodes);
    if(sbSession) debouncedSaveSB(MM_DATA_PREFIX + pid, initNodes);
    switchProject(pid);
    return pid;
  }, [projects, persistProjects, switchProject, sbSession]);

  const renameProject = useCallback((pid, name) => {
    persistProjects(projects.map(p => p.id === pid ? { ...p, name } : p));
  }, [projects, persistProjects]);

  const deleteProject = useCallback(pid => {
    if (projects.length <= 1) return;
    const np = projects.filter(p => p.id !== pid);
    persistProjects(np);
    try { localStorage.removeItem(MM_DATA_PREFIX + pid); } catch(e) {}
    if(sbSession) deleteSB(MM_DATA_PREFIX + pid);
    if (activeProjectId === pid) switchProject(np[0].id);
  }, [projects, activeProjectId, persistProjects, switchProject]);

  const findDescendants = useCallback(nodeId => {
    const desc = [], stack = [nodeId];
    while (stack.length) {
      const cid = stack.pop();
      const nd = nodes.find(n => n.id === cid);
      if (nd && nd.children) nd.children.forEach(ch => { desc.push(ch); stack.push(ch); });
    }
    return desc;
  }, [nodes]);

  const addChild = useCallback((parentId, title = 'New Node') => {
    const newId = uuid();
    const parentNode = nodes.find(n => n.id === parentId);
    const childColor = parentNode ? (parentNode.color || defaultNodeColor) : defaultNodeColor;
    // If parent has a custom position, compute child's initial custom position relative to parent
    let childCustomX = null, childCustomY = null;
    if (parentNode && parentNode.customX !== null && parentNode.customX !== undefined) {
      const siblingCount = (parentNode.children || []).length;
      childCustomX = parentNode.customX + (siblingCount - Math.floor(siblingCount / 2)) * 130;
      childCustomY = (parentNode.customY ?? 0) + 100;
    }
    const nn = [...nodes, { id:newId, parentId, title, color:childColor, collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null, notesExpanded:false, customX:childCustomX, customY:childCustomY, customWidth:null, customHeight:null }];
    const p = nn.find(n => n.id === parentId);
    if (p) p.children = [...(p.children || []), newId];
    persistNodes(nn);
    return newId;
  }, [nodes, defaultNodeColor, persistNodes]);

  const deleteNode = useCallback(id => {
    if (id === rootId) return [];
    const toDelete = new Set([id, ...findDescendants(id)]);
    let nn = nodes.filter(n => !toDelete.has(n.id));
    const nd = nodes.find(n => n.id === id);
    if (nd?.parentId) nn = nn.map(n => n.id === nd.parentId ? { ...n, children: n.children.filter(c => c !== id) } : n);
    if (toDelete.has(selectedId)) setSelectedId(null);
    persistNodes(nn);
    return [...toDelete].map(did => nodes.find(n => n.id === did)?.linkedTaskId).filter(Boolean);
  }, [nodes, rootId, selectedId, findDescendants, persistNodes]);

  const renameNode = useCallback((id, t) => persistNodes(nodes.map(n => n.id === id ? { ...n, title: t } : n)), [nodes, persistNodes]);
  const setNodeColor = useCallback((id, c) => persistNodes(nodes.map(n => n.id === id ? { ...n, color: c } : n)), [nodes, persistNodes]);
  const toggleCollapse = useCallback((id, positionedNodes) => {
    const nd = nodes.find(n => n.id === id);
    if (!nd) return;
    const descendants = findDescendants(id);
    const posMap = new Map();
    if (positionedNodes) positionedNodes.forEach(p => posMap.set(p.id, p));
    const parentPos = posMap.get(id);

    if (!nd.collapsed && parentPos && descendants.length > 0) {
      // Collapsing: store each descendant's position relative to parent, clear custom positions
      // For descendants not in positionedNodes (already hidden by inner collapse),
      // compute a fallback offset relative to their direct parent chain
      persistNodes(nodes.map(n => {
        if (n.id === id) return { ...n, collapsed: true, collapseX: parentPos.x, collapseY: parentPos.y };
        if (descendants.includes(n.id)) {
          const dp = posMap.get(n.id);
          if (dp) {
            return { ...n, collapseRelX: dp.x - parentPos.x, collapseRelY: dp.y - parentPos.y, customX: null, customY: null };
          }
          // Node not in layout (hidden by inner collapse) — use its custom position or
          // walk up to find nearest positioned ancestor and use its offset
          if (n.customX !== null && n.customX !== undefined) {
            return { ...n, collapseRelX: n.customX - parentPos.x, collapseRelY: (n.customY ?? 0) - parentPos.y, customX: null, customY: null };
          }
          // Fallback: keep existing collapseRel if it has one, or store 0,0 (will snap to parent on expand)
          if (n.collapseRelX !== null && n.collapseRelX !== undefined) return n;
          return { ...n, collapseRelX: 0, collapseRelY: 0, customX: null, customY: null };
        }
        return n;
      }));
    } else if (nd.collapsed && parentPos && descendants.length > 0) {
      // Expanding: restore positions relative to parent's current position
      persistNodes(nodes.map(n => {
        if (n.id === id) return { ...n, collapsed: false };
        if (descendants.includes(n.id) && n.collapseRelX !== undefined && n.collapseRelX !== null) {
          return { ...n, customX: parentPos.x + n.collapseRelX, customY: parentPos.y + n.collapseRelY, collapseRelX: null, collapseRelY: null };
        }
        return n;
      }));
    } else {
      // Simple toggle (no positioned nodes available or no descendants)
      persistNodes(nodes.map(n => n.id === id ? { ...n, collapsed: !n.collapsed } : n));
    }
  }, [nodes, findDescendants, persistNodes]);
  const setNodeNotes = useCallback((id, notes) => persistNodes(nodes.map(n => n.id === id ? { ...n, notes } : n)), [nodes, persistNodes]);
  const toggleNodeChecked = useCallback(id => persistNodes(nodes.map(n => n.id === id ? { ...n, checked: !n.checked } : n)), [nodes, persistNodes]);
  const toggleNodeNotesExpanded = useCallback(id => persistNodes(nodes.map(n => n.id === id ? { ...n, notesExpanded: !n.notesExpanded } : n)), [nodes, persistNodes]);
  const setNodeLinkedTask = useCallback((id, taskId) => persistNodes(nodes.map(n => n.id === id ? { ...n, linkedTaskId: taskId } : n)), [nodes, persistNodes]);

  const syncNodeFromTask = useCallback((taskId, newStatus) => {
    const nd = nodes.find(n => n.linkedTaskId === taskId);
    if (!nd) return;
    persistNodes(nodes.map(n => n.linkedTaskId === taskId ? { ...n, checked: newStatus === 'x' } : n));
  }, [nodes, persistNodes]);

  const moveNode = useCallback((id, newParentId) => {
    if (id === rootId) return;
    const desc = findDescendants(id);
    if (desc.includes(newParentId)) return;
    const nd = nodes.find(n => n.id === id);
    if (!nd) return;
    let nn = [...nodes];
    if (nd.parentId) nn = nn.map(n => n.id === nd.parentId ? { ...n, children: n.children.filter(c => c !== id) } : n);
    nn = nn.map(n => {
      if (n.id === id) return { ...n, parentId: newParentId };
      if (n.id === newParentId) return { ...n, children: [...(n.children || []), id] };
      return n;
    });
    persistNodes(nn);
  }, [nodes, rootId, findDescendants, persistNodes]);

  const setNodePosition = useCallback((id, x, y) => {
    persistNodes(nodes.map(n => n.id === id ? { ...n, customX: x, customY: y } : n));
  }, [nodes, persistNodes]);

  const setNodeSize = useCallback((id, w, h) => {
    persistNodes(nodes.map(n => n.id === id ? { ...n, customWidth: w, customHeight: h } : n));
  }, [nodes, persistNodes]);

  // Clipboard for copy/paste
  const clipboardRef = useRef(null);

  const copyNode = useCallback(id => {
    const nd = nodes.find(n => n.id === id);
    if (!nd) return;
    // Deep-clone node and all descendants
    const desc = findDescendants(id);
    const allIds = [id, ...desc];
    const cloned = nodes.filter(n => allIds.includes(n.id)).map(n => ({ ...n }));
    clipboardRef.current = cloned;
  }, [nodes, findDescendants]);

  const pasteNode = useCallback(targetParentId => {
    if (!clipboardRef.current || !clipboardRef.current.length) return null;
    const cloned = clipboardRef.current;
    // Build id mapping for fresh ids
    const idMap = new Map();
    cloned.forEach(n => idMap.set(n.id, uuid()));
    // The first node in the clipboard is the root of the copied subtree
    const rootCopy = cloned[0];
    const newNodes = cloned.map(n => ({
      ...n,
      id: idMap.get(n.id),
      parentId: n.id === rootCopy.id ? targetParentId : (idMap.get(n.parentId) || targetParentId),
      children: (n.children || []).map(c => idMap.get(c) || c),
      linkedTaskId: null,
      customX: null, customY: null,
      collapseRelX: null, collapseRelY: null,
    }));
    let nn = [...nodes, ...newNodes];
    const parent = nn.find(n => n.id === targetParentId);
    if (parent) {
      nn = nn.map(n => n.id === targetParentId ? { ...n, children: [...(n.children || []), idMap.get(rootCopy.id)] } : n);
    }
    persistNodes(nn);
    return idMap.get(rootCopy.id);
  }, [nodes, persistNodes]);

  return {
    nodes, rootId, selectedId, setSelectedId, persistNodes,
    addChild, deleteNode, renameNode, setNodeColor, toggleCollapse, moveNode, setNodePosition, setNodeSize,
    setNodeNotes, toggleNodeChecked, toggleNodeNotesExpanded, setNodeLinkedTask, syncNodeFromTask, findDescendants,
    projects, activeProjectId, switchProject, addProject, renameProject, deleteProject, persistProjects,
    defaultNodeColor, setDefaultNodeColor, copyNode, pasteNode, clipboardRef,
  };
}

/* ══════════════════════════════════════════
   ── Mindmap: Sidebar Tree Item ──
   ══════════════════════════════════════════ */

function MindmapTreeItem({ nodeId, nodes, depth, selectedId, onSelect, expandedIds, onToggleExpand }) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return null;
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = expandedIds.has(nodeId);
  const isSelected = selectedId === nodeId;

  return (
    <div>
      <div onClick={() => onSelect(nodeId)}
        style={{
          display:'flex',alignItems:'center',gap:6,
          padding:'5px 8px 5px '+(8 + depth * 14)+'px',
          cursor:'pointer',
          background:isSelected?'rgba(74,158,255,0.12)':'transparent',
          borderLeft:isSelected?'2px solid #4a9eff':'2px solid transparent',
          transition:'all 0.12s',fontSize:14,fontFamily:"'IBM Plex Sans',sans-serif",
          color:isSelected?'#d0d4e0':node.checked?'#444':'#6a7090',
        }}
        onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background='rgba(255,255,255,0.03)';}}
        onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background='transparent';}}>
        {hasChildren?(
          <span onClick={e=>{e.stopPropagation();onToggleExpand(nodeId);}}
            style={{width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:9,color:'#606060',cursor:'pointer',transition:'transform 0.15s',flexShrink:0,
              transform:isExpanded?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
        ):(<span style={{width:14,height:14,flexShrink:0}}/>)}
        {node.checked ? (
          <span style={{fontSize:12,color:'#6ecf6e',flexShrink:0,fontWeight:700}}>✓</span>
        ) : (
          <span style={{width:7,height:7,borderRadius:'50%',background:node.color||'#4a9eff',flexShrink:0}}/>
        )}
        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
          fontWeight:depth===0?600:400,textDecoration:node.checked?'line-through':'none'}}>{node.title}</span>
        {hasChildren&&<span style={{fontSize:12,color:'#4a4a4a',fontFamily:"'JetBrains Mono',monospace"}}>{node.children.length}</span>}
      </div>
      {hasChildren && isExpanded && node.children.map(childId => (
        <MindmapTreeItem key={childId} nodeId={childId} nodes={nodes} depth={depth+1}
          selectedId={selectedId} onSelect={onSelect} expandedIds={expandedIds} onToggleExpand={onToggleExpand}/>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   ── Mindmap: Main Tab Component ──
   ══════════════════════════════════════════ */

const MINDMAP_COLORS=['#4a9eff','#6ecf6e','#f0c040','#ff6b6b','#b080e0','#e08050','#50e0c0','#ff80b0'];

function MindmapTab({ mm, tasks, onAddTask, onChangeStatus }) {
  const { nodes, rootId, selectedId, setSelectedId, persistNodes, addChild, deleteNode, renameNode, setNodeColor,
    toggleCollapse, setNodeNotes, toggleNodeChecked, toggleNodeNotesExpanded, setNodeLinkedTask, syncNodeFromTask, findDescendants, setNodePosition, setNodeSize,
    projects, activeProjectId, switchProject, addProject, renameProject, deleteProject, copyNode, pasteNode, clipboardRef } = mm;

  const [vt, setVt] = useState({ x: 0, y: 0, scale: 1 });
  const [toast, setToast] = useState(null);
  const [isPanning, setIsPanning] = useState(false);
  const [panStart, setPanStart] = useState({ x: 0, y: 0 });
  const [editingId, setEditingId] = useState(null);
  const svgRef = useRef(null);
  const canvasRef = useRef(null);
  const [initialized, setInitialized] = useState(false);
  const [notesNodeId, setNotesNodeId] = useState(null);
  // Drag state
  const dragStateRef = useRef({ isDragging: false, nodeId: null, startX: 0, startY: 0, nodeX: 0, nodeY: 0 });
  const resizeStateRef = useRef({ isResizing: false, nodeId: null, startX: 0, startY: 0, nodeW: 0, nodeH: 0 });

  const { positionedNodes, edges } = useMemo(() => {
    if (!nodes || !nodes.length || !rootId) return { positionedNodes: [], edges: [] };
    const p = computeTreeLayout(nodes, rootId, { horizontalSpacing: 130, verticalSpacing: 100, nodeWidth: 200, nodeHeight: 54 });
    // Override positions with custom x/y if present
    const pWithCustom = p.map(pos => {
      const node = nodes.find(n => n.id === pos.id);
      if (node && node.customX !== null && node.customX !== undefined && node.customY !== null && node.customY !== undefined) {
        return { ...pos, x: node.customX, y: node.customY };
      }
      return pos;
    });
    // Override sizes with custom width/height if present
    const pWithCustomSize = pWithCustom.map(pos => {
      const node = nodes.find(n => n.id === pos.id);
      if (node && node.customWidth !== null && node.customWidth !== undefined && node.customHeight !== null && node.customHeight !== undefined) {
        return { ...pos, width: node.customWidth, height: node.customHeight };
      }
      return pos;
    });
    return { positionedNodes: pWithCustomSize, edges: computeEdges(pWithCustomSize, nodes) };
  }, [nodes, rootId]);

  const fitToView = useCallback(() => {
    if (!positionedNodes.length || !canvasRef.current) return;
    const pad = 80;
    const minX = Math.min(...positionedNodes.map(n => n.x));
    const minY = Math.min(...positionedNodes.map(n => n.y));
    const maxX = Math.max(...positionedNodes.map(n => n.x + n.width));
    const maxY = Math.max(...positionedNodes.map(n => n.y + n.height));
    const cw = canvasRef.current.clientWidth, ch = canvasRef.current.clientHeight;
    const s = Math.min(cw / (maxX - minX + pad * 2), ch / (maxY - minY + pad * 2), 1.5);
    setVt({ x: (cw - (maxX - minX) * s) / 2 - minX * s, y: (ch - (maxY - minY) * s) / 2 - minY * s + 20, scale: s });
  }, [positionedNodes]);

  useEffect(() => { if (!initialized && positionedNodes.length) { fitToView(); setInitialized(true); } }, [initialized, positionedNodes, fitToView]);
  // Re-fit when switching projects
  useEffect(() => { setInitialized(false); }, [activeProjectId]);

  const handleWheel = useCallback(e => {
    e.preventDefault();
    const d = e.deltaY > 0 ? 0.9 : 1.1;
    const ns = Math.max(0.2, Math.min(3.0, vt.scale * d));
    if (svgRef.current) {
      const r = svgRef.current.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const ox = (mx - vt.x) / vt.scale, oy = (my - vt.y) / vt.scale;
      setVt({ x: mx - ox * ns, y: my - oy * ns, scale: ns });
    }
  }, [vt]);

  const handleSvgMouseDown = useCallback(e => {
    if (e.target !== svgRef.current) return;
    setIsPanning(true);
    setPanStart({ x: e.clientX - vt.x, y: e.clientY - vt.y });
  }, [vt]);

  const handleMouseMove = useCallback(e => {
    const dragState = dragStateRef.current;
    const resizeState = resizeStateRef.current;

    if (dragState.isDragging && dragState.nodeId) {
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      const newX = dragState.nodeX + dx / vt.scale;
      const newY = dragState.nodeY + dy / vt.scale;
      setNodePosition(dragState.nodeId, newX, newY);
      return;
    }

    if (resizeState.isResizing && resizeState.nodeId) {
      const dx = e.clientX - resizeState.startX;
      const dy = e.clientY - resizeState.startY;
      const newW = Math.max(100, resizeState.nodeW + dx / vt.scale);
      const newH = Math.max(40, resizeState.nodeH + dy / vt.scale);
      setNodeSize(resizeState.nodeId, newW, newH);
      return;
    }

    if (!isPanning) return;
    setVt(prev => ({ ...prev, x: e.clientX - panStart.x, y: e.clientY - panStart.y }));
  }, [isPanning, panStart, vt, setNodePosition, setNodeSize]);

  const handleMouseUp = useCallback(() => {
    dragStateRef.current = { isDragging: false, nodeId: null, startX: 0, startY: 0, nodeX: 0, nodeY: 0 };
    resizeStateRef.current = { isResizing: false, nodeId: null, startX: 0, startY: 0, nodeW: 0, nodeH: 0 };
    setIsPanning(false);
  }, []);
  const handleSvgClick = useCallback(e => { if (e.target === svgRef.current) { setSelectedId(null); setNotesNodeId(null); } }, [setSelectedId]);

  // Toast helper
  const showToast = useCallback(msg => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  }, []);

  const handleKeyDown = useCallback(e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') { setEditingId(null); setSelectedId(null); setNotesNodeId(null); }
    else if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId && selectedId !== rootId && !editingId) {
      e.preventDefault(); deleteNode(selectedId); setSelectedId(null);
    } else if (e.key === 'Enter' && selectedId && !editingId) { setEditingId(selectedId); }
    else if ((e.ctrlKey || e.metaKey) && e.key === 'c' && selectedId && !editingId) {
      e.preventDefault(); copyNode(selectedId); showToast('Node copied');
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'v' && selectedId && !editingId && clipboardRef.current) {
      e.preventDefault();
      const newId = pasteNode(selectedId);
      if (newId) { setSelectedId(newId); showToast('Node pasted'); }
    }
  }, [selectedId, rootId, editingId, deleteNode, setSelectedId, copyNode, pasteNode, clipboardRef, showToast]);

  const editingNode = editingId ? nodes.find(n => n.id === editingId) : null;
  const editingPos = editingId ? positionedNodes.find(p => p.id === editingId) : null;

  // Add node (and its children recursively) to Tasks tab as subtasks
  const handleAddToTasks = useCallback(nodeId => {
    const project = projects.find(p => p.id === activeProjectId);
    const projectName = project ? project.name : 'Mindmap';
    const maxOrd = tasks.reduce((mx, tk) => (tk.status === '' || tk.status === 'u') ? Math.max(mx, tk.order ?? 0) : mx, 0);
    const tasksToAdd = [];
    const nodeLinks = [];

    const addNodeRecursive = (nid, parentTaskId, ord) => {
      const nd = nodes.find(n => n.id === nid);
      if (!nd || nd.linkedTaskId) return ord;
      const taskId = uuid();
      const taskTitle = parentTaskId ? nd.title : nd.title + ' [' + projectName + ']';
      tasksToAdd.push({
        id: taskId, title: taskTitle, status: nd.checked ? 'x' : '', order: ord,
        category: null, importance: null, dateAdded: now(),
        dateCompleted: nd.checked ? now() : null,
        statusChanged: nd.checked ? now() : null,
        dueDate: null, notes: nd.notes || '',
        autoReturn: true, recurrence: null, startTime: null, endTime: null,
        eventColor: null, parentId: parentTaskId, collapsed: false, activeVisible: true,
        mindmapNodeId: nid, mindmapProjectId: activeProjectId
      });
      nodeLinks.push({ nodeId: nid, taskId });
      let nextOrd = ord + 1;
      if (nd.children && nd.children.length > 0) {
        nd.children.forEach(childId => {
          nextOrd = addNodeRecursive(childId, taskId, nextOrd);
        });
      }
      return nextOrd;
    };

    addNodeRecursive(nodeId, null, maxOrd + 1);
    tasksToAdd.forEach(t => onAddTask(t));
    nodeLinks.forEach(({ nodeId: nid, taskId }) => setNodeLinkedTask(nid, taskId));
    const count = tasksToAdd.length;
    showToast(count === 1 ? 'Node added to task list' : count + ' nodes added to task list');
  }, [nodes, projects, activeProjectId, tasks, onAddTask, setNodeLinkedTask, showToast]);

  // Start dragging a node
  const handleStartDragNode = useCallback((e, nodeId) => {
    if (e.button !== 0) return; // Left click only
    e.stopPropagation();
    const pos = positionedNodes.find(p => p.id === nodeId);
    if (!pos) return;
    dragStateRef.current = {
      isDragging: true,
      nodeId,
      startX: e.clientX,
      startY: e.clientY,
      nodeX: pos.x,
      nodeY: pos.y
    };
    setIsPanning(false);
  }, [positionedNodes]);

  // Start resizing a node
  const handleStartResizeNode = useCallback((e, nodeId) => {
    if (e.button !== 0) return; // Left click only
    e.stopPropagation();
    const pos = positionedNodes.find(p => p.id === nodeId);
    if (!pos) return;
    resizeStateRef.current = {
      isResizing: true,
      nodeId,
      startX: e.clientX,
      startY: e.clientY,
      nodeW: pos.width || 200,
      nodeH: pos.height || 54
    };
    setIsPanning(false);
  }, [positionedNodes]);

  return (
    <div tabIndex={0} ref={canvasRef}
      style={{display:'flex',flexDirection:'column',flex:1,height:'100%',background:'#1a1a1a',overflow:'hidden',outline:'none',position:'relative'}}
      onKeyDown={handleKeyDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>

      {/* SVG Canvas */}
      <svg ref={svgRef} style={{flex:1,width:'100%',height:'100%',background:'#1a1a1a',cursor:isPanning?'grabbing':'grab',userSelect:'none'}}
        onWheel={handleWheel} onMouseDown={handleSvgMouseDown} onClick={handleSvgClick}>
        <g transform={`translate(${vt.x},${vt.y}) scale(${vt.scale})`}>
          {edges.map((edge,i)=><MindmapEdge key={'me-'+i} edge={edge}/>)}
          {positionedNodes.map(pos=>{
            const nd=nodes.find(n=>n.id===pos.id);
            if(!nd)return null;
            return <g key={'mn-'+nd.id}>
              {editingId===nd.id&&editingNode&&editingPos?
                <MindmapNodeEditor node={editingNode} position={editingPos}
                  onSave={t=>{renameNode(nd.id,t);setEditingId(null);}} onCancel={()=>setEditingId(null)}/>:
                <MindmapNode node={nd} position={pos} isSelected={selectedId===nd.id} isRoot={nd.id===rootId}
                  onSelect={()=>{setSelectedId(nd.id);setNotesNodeId(nd.id);}}
                  onAddChild={()=>addChild(nd.id)}
                  onToggleCollapse={()=>toggleCollapse(nd.id, positionedNodes)}
                  onStartRename={()=>setEditingId(nd.id)}
                  onToggleChecked={()=>{
                    toggleNodeChecked(nd.id);
                    if(nd.linkedTaskId){const newChecked=!nd.checked;onChangeStatus(nd.linkedTaskId,newChecked?'x':'');}
                  }}
                  onAddToTasks={()=>handleAddToTasks(nd.id)}
                  onToggleNodeNotes={(closingEmpty)=>{
                    if(closingEmpty){
                      /* Closing notes with no content — shrink back and collapse in one update */
                      persistNodes(nodes.map(n => n.id === nd.id ? { ...n, notesExpanded: false, customWidth: pos.width||200, customHeight: 54 } : n));
                    } else if(!nd.notesExpanded){
                      /* Opening notes — expand + toggle in one update */
                      const curH = pos.height||54;
                      const newH = curH < 180 ? 180 : curH;
                      persistNodes(nodes.map(n => n.id === nd.id ? { ...n, notesExpanded: true, customWidth: pos.width||200, customHeight: newH } : n));
                    } else {
                      /* Closing notes that have content — just toggle */
                      toggleNodeNotesExpanded(nd.id);
                    }
                  }}
                  onSetNotes={notes=>setNodeNotes(nd.id, notes)}
                  onStartDragNode={handleStartDragNode}
                  onStartResizeNode={handleStartResizeNode}
                  tasks={tasks}/>}
            </g>;
          })}
        </g>
      </svg>

      {/* Floating Fit button — bottom right */}
      <button onClick={fitToView} title="Fit to View"
        style={{position:'absolute',bottom:16,right:16,
          padding:'8px 14px',background:'#242424',border:'1px solid #333333',color:'#d0d4e0',
          borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,
          fontFamily:"'JetBrains Mono',monospace",
          boxShadow:'0 2px 12px rgba(0,0,0,0.4)',transition:'all 0.15s',
          display:'flex',alignItems:'center',gap:6}}
        onMouseEnter={e=>{e.currentTarget.style.background='#1a1f30';e.currentTarget.style.borderColor='#4a9eff';}}
        onMouseLeave={e=>{e.currentTarget.style.background='#242424';e.currentTarget.style.borderColor='#333333';}}>
        ⊡ Fit
      </button>

      {/* Toast notification */}
      {toast && (
        <div style={{position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',
          background:'#242424',border:'1px solid #333333',borderRadius:8,
          padding:'10px 20px',fontSize:13,color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",
          boxShadow:'0 4px 16px rgba(0,0,0,0.5)',
          animation:'fadeInUp 0.2s ease-out',whiteSpace:'nowrap',
          display:'flex',alignItems:'center',gap:8}}>
          <span style={{color:'#6ecf6e',fontWeight:600}}>✓</span> {toast}
        </div>
      )}

    </div>
  );
}
