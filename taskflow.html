              </span>
              {VIEWS.find(v=>v.key===view)?.label}
              <span style={{fontSize:15,fontWeight:400,color:'#606060',fontFamily:"'JetBrains Mono',monospace"}}>{filtered.length}</span>
            </h1>
          </div>

          {/* Category filter pills — always colored */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:13,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                  boxShadow:catFilter===name?'0 0 12px '+cfg.bg+'88':'none',
                }}>{name}</button>
            ))}
          </div>

          {/* Search */}
          <div style={{position:'relative'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
              style={{border:'1px solid #333333',borderRadius:6,padding:'8px 12px 8px 32px',fontSize:14,fontFamily:"'IBM Plex Sans',sans-serif",outline:'none',width:210,background:'#1a1a1a',color:'#d0d4e0',transition:'border-color 0.15s'}}
              onFocus={e=>e.target.style.borderColor='#4a9eff'} onBlur={e=>e.target.style.borderColor='#333333'}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'#4a4a4a'}}>⌕</span>
          </div>
        </div>}

        {/* Category manager OR task/calendar/mindmap views */}
        {showCatMgr&&mainTab==='tasks'?(
          <div style={{flex:1,overflow:'auto'}}><CategoryManager categories={categories} onUpdate={setCategories}/></div>
        ):mainTab==='mindmap'?(
          <MindmapTab mm={mm} tasks={tasks} onAddTask={addTaskRaw} onChangeStatus={changeStatus}/>
        ):(mainTab==='calendar'?(
          <CalendarView tasks={tasks} categories={categories} onAddTask={addTask} onSelectTask={setSelId} onChangeStatus={changeStatus} onUpdateTask={updateTask} selId={selId} calMode={calMode} setCalMode={setCalMode} currentDate={calDate} setCurrentDate={setCalDate}/>
        ):(
          <>
            {/* Quick entry + clear button (active view only) */}
            {view==='active'&&(
              <div style={{padding:'14px 24px',borderBottom:'1px solid #2a2a2a',background:'#161616'}}>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <span style={{color:'#4a9eff',fontSize:22,fontWeight:700}}>+</span>
                  <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'&&input.trim()){addTask(input);setInput('');}}}
                    placeholder="Add a task... (#W for Work, #H for Home, etc.)"
                    style={{flex:1,border:'none',outline:'none',fontSize:17,fontFamily:"'IBM Plex Sans',sans-serif",color:'#d0d4e0',background:'transparent',padding:'4px 0'}}/>
                  {hasChecked&&<button onClick={clearChecked}
                    style={{border:'1px solid #2a4a2a',borderRadius:6,padding:'5px 14px',fontSize:13,cursor:'pointer',
                      background:'rgba(110,207,110,0.1)',color:'#6ecf6e',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                      transition:'all 0.15s',whiteSpace:'nowrap'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(110,207,110,0.2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(110,207,110,0.1)'}>
                    ✓ Clear checked ({checkedCount})
                  </button>}
                  <span style={{fontSize:12,color:'#4a4a4a',fontFamily:"'JetBrains Mono',monospace"}}>⏎ enter</span>
                </div>
              </div>
            )}

            {/* Task list */}
            <div style={{flex:1,overflow:'auto',padding:'8px 12px 60px'}}>
              {filtered.length===0?(
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60%',color:'#4a4a4a',gap:12}}>
                  <span style={{fontSize:44}}>{view==='active'?'✨':view==='x'?'📦':'📋'}</span>
                  <span style={{fontSize:16}}>{view==='active'?'All clear — add a task to get started.':'No tasks here.'}</span>
                </div>
              ):view==='active'?(
                <div style={{display:'flex',flexDirection:'column',gap:2,paddingTop:4}}>
                  {filtered.map((task,idx)=>renderTaskWithChildren(task,idx,0))}
                </div>
              ):(
                grouped?.map(([dk,dayTasks])=>(
                  <div key={dk} style={{marginBottom:24}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#4a4a4a',fontFamily:"'JetBrains Mono',monospace",padding:'12px 16px 6px',letterSpacing:0.5,textTransform:'uppercase',borderBottom:'1px solid #2a2a2a',marginBottom:6}}>
                      {fmtDay(dk+'T12:00:00')}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:2}}>
                      {dayTasks.map((task,idx)=>renderTaskWithChildren(task,idx,0))}
                    </div>
                  </div>
                ))
              )}
            </div>
          </>
        ))}

        {/* Detail bar for selected task - works in both tasks and calendar tabs */}
        {selTask&&(mainTab==='tasks'||mainTab==='calendar')&&(()=>{
          const task=selTask;
          return(
            <div style={{borderTop:'1px solid #2a2a2a',padding:'10px 24px',background:'#161616',display:'flex',alignItems:'center',gap:16,fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:'#606060',flexWrap:'wrap'}}>
              <span style={{fontWeight:600,color:'#6a7090',maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</span>
              <span>added {fmt(task.dateAdded)}</span>
              {task.dateCompleted&&<span style={{color:'#5a8a5a'}}>done {fmt(task.dateCompleted)}</span>}

              {/* Auto-return button */}
              {(task.status==='t'||task.status==='w'||task.status==='m')&&(
                <button onClick={()=>updateTask({...task,autoReturn:!task.autoReturn})}
                  style={{border:'1px solid #333333',borderRadius:5,padding:'3px 10px',cursor:'pointer',background:task.autoReturn?'#1a2a1a':'transparent',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:task.autoReturn?'#6ecf6e':'#606060'}}>
                  ↩ auto-return {task.autoReturn?'on':'off'}
                </button>
              )}

              {/* Recurrence button */}
              <div style={{position:'relative'}}>
                <button onClick={()=>setRecDropOpen(!recDropOpen)}
                  style={{border:'1px solid #333333',borderRadius:5,padding:'3px 10px',cursor:'pointer',background:task.recurrence?'#1a2a3e':'transparent',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:task.recurrence?'#50a0e0':'#606060'}}>
                  🔁 {task.recurrence?describeRecurrence(task.recurrence):'repeat off'}
                </button>
                {recDropOpen&&<RecurrenceDropdown task={task} onSelect={rec=>{updateTask({...task,recurrence:rec});setRecDropOpen(false);}} onClose={()=>setRecDropOpen(false)}/>}
              </div>

              {/* Notes input */}
              <input value={task.notes||''} onChange={e=>updateTask({...task,notes:e.target.value})} placeholder="Add notes..."
                style={{flex:1,border:'1px solid #333333',borderRadius:5,padding:'4px 8px',fontSize:12,background:'#1a1a1a',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>

              {/* Close button */}
              <button onClick={()=>setSelId(null)}
                style={{border:'none',background:'transparent',cursor:'pointer',color:'#444',fontSize:18,padding:'0 4px'}}
                onMouseEnter={e=>e.currentTarget.style.color='#888'} onMouseLeave={e=>e.currentTarget.style.color='#444'}>×</button>
            </div>
          );
        })()}
      </div>

      {/* Import/Export Modal */}
      {showImportExport&&<ImportExportModal
        onClose={()=>setShowImportExport(false)}
        onImport={handleImport}
        onExportJson={()=>exportToJson(tasks,categories)}
        onExportXlsx={()=>exportToXlsx(tasks)}
        taskCount={tasks.length}
      />}
      {showMmImportExport&&<MindmapImportExportModal
        onClose={()=>setShowMmImportExport(false)}
        projects={mm.projects}
        projectCount={mm.projects.length}
        nodeCount={mm.projects.reduce((s,p)=>{const n=loadLS('taskflow-mm-'+p.id,[]);return s+n.length;},0)}
        onImport={(importedProjects,mode)=>{
          if(mode==='replace'){
            /* Remove all existing project data */
            mm.projects.forEach(p=>{try{localStorage.removeItem('taskflow-mm-'+p.id);}catch(e){} if(session)deleteSB('taskflow-mm-'+p.id);});
            /* Save imported projects and their nodes */
            const projList=importedProjects.map(p=>({id:p.id,name:p.name,color:p.color||'#4a9eff'}));
            importedProjects.forEach(p=>{saveLS('taskflow-mm-'+p.id,p.nodes||[]); if(session)saveSB('taskflow-mm-'+p.id,p.nodes||[]);});
            /* Update React state and switch to first imported project */
            mm.persistProjects(projList);
            mm.switchProject(projList[0].id);
          }else{
            /* Merge: add imported projects alongside existing, rename on conflict */
            const existingNames=new Set(mm.projects.map(p=>p.name));
            const newProjects=[...mm.projects];
            let lastNewId=null;
            importedProjects.forEach(ip=>{
              let name=ip.name;
              if(existingNames.has(name)){let i=2;while(existingNames.has(name+' ('+i+')'))i++;name=name+' ('+i+')';}
              const newId=uuid();
              lastNewId=newId;
              const nodeIdMap={};
              const nodes=(ip.nodes||[]).map(n=>{const nid=uuid();nodeIdMap[n.id]=nid;return{...n,id:nid};});
              nodes.forEach(n=>{
                if(n.parentId)n.parentId=nodeIdMap[n.parentId]||n.parentId;
                if(n.children)n.children=n.children.map(c=>nodeIdMap[c]||c);
              });
              newProjects.push({id:newId,name,color:ip.color||'#4a9eff'});
              existingNames.add(name);
              saveLS('taskflow-mm-'+newId,nodes); if(session)saveSB('taskflow-mm-'+newId,nodes);
            });
            /* Update React state and switch to first imported project */
            mm.persistProjects(newProjects);
            if(lastNewId) mm.switchProject(lastNewId);
          }
        }}
      />}
      {claudePromptData&&<ClaudePromptModal
        onClose={()=>setClaudePromptData(null)}
        prompt={claudePromptData.prompt}
        branchName={claudePromptData.branchName}
        stats={claudePromptData.stats}
      />}
    </div>
  );
}

/* ══════════════════════════════════════════
   ── Auth Gate & Connection Indicator ──
   ══════════════════════════════════════════ */
function AuthGate() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(!!supabase);
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    if (!supabase) { setLoading(false); return; }
    supabase.auth.getSession().then(({ data: { session: s } }) => {
      setSession(s);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
      setSession(s);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleGoogleSignIn = async () => {
    setAuthError(null);
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href.split('?')[0].split('#')[0] }
    });
    if (error) setAuthError(error.message);
  };

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  if (loading) {
    return React.createElement('div', {
      style: { height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#1a1a1a', color: '#6a7090', fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 16 }
    }, 'Loading...');
  }

  // No Supabase configured — just render the app directly
  if (!supabase) return React.createElement(TaskFlow, { session: null, onSignOut: null });

  // Not signed in — show sign-in overlay
  if (!session) {
    return React.createElement('div', { style: { height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#1a1a1a', fontFamily: "'IBM Plex Sans', sans-serif", gap: 24 } },
      React.createElement('div', { style: { fontSize: 32, fontWeight: 700, color: '#d0d4e0', letterSpacing: '-0.5px' } }, 'TaskFlow'),
      React.createElement('div', { style: { fontSize: 14, color: '#6a7090', marginBottom: 8 } }, 'Sign in to sync your tasks across devices'),
      React.createElement('button', {
        onClick: handleGoogleSignIn,
        style: { display: 'flex', alignItems: 'center', gap: 10, padding: '12px 28px', background: '#242424', border: '1px solid #333', borderRadius: 10, color: '#d0d4e0', fontSize: 15, fontWeight: 500, cursor: 'pointer', fontFamily: "'IBM Plex Sans', sans-serif", transition: 'border-color 0.15s' },
        onMouseEnter: e => e.currentTarget.style.borderColor = '#4a9eff',
        onMouseLeave: e => e.currentTarget.style.borderColor = '#333'
      },
        React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24' },
          React.createElement('path', { d: 'M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z', fill: '#4285F4' }),
          React.createElement('path', { d: 'M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z', fill: '#34A853' }),
          React.createElement('path', { d: 'M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z', fill: '#FBBC05' }),
          React.createElement('path', { d: 'M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z', fill: '#EA4335' })
        ),
        'Sign in with Google'
      ),
      authError && React.createElement('div', { style: { color: '#ff6b6b', fontSize: 13, marginTop: 4 } }, authError),
      React.createElement('button', {
        onClick: () => { /* skip auth, use localStorage only */ setSession({ skip: true }); },
        style: { background: 'transparent', border: 'none', color: '#555', fontSize: 13, cursor: 'pointer', marginTop: 4, fontFamily: "'IBM Plex Sans', sans-serif" },
        onMouseEnter: e => e.currentTarget.style.color = '#888',
        onMouseLeave: e => e.currentTarget.style.color = '#555'
      }, 'Continue offline with local storage')
    );
  }

  return React.createElement(TaskFlow, { session: session.skip ? null : session, onSignOut: session.skip ? null : handleSignOut });
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate/>);
</script>
</body>
