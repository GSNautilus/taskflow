function MindmapTreeItem({ nodeId, nodes, depth, selectedId, onSelect, expandedIds, onToggleExpand }) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return null;
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = expandedIds.has(nodeId);
  const isSelected = selectedId === nodeId;

  return (
    <div>
      <div onClick={() => onSelect(nodeId)}
        style={{
          display:'flex',alignItems:'center',gap:6,
          padding:'5px 8px 5px '+(8 + depth * 14)+'px',
          cursor:'pointer',
          background:isSelected?'rgba(74,158,255,0.12)':'transparent',
          borderLeft:isSelected?'2px solid #4a9eff':'2px solid transparent',
          transition:'all 0.12s',fontSize:12,fontFamily:"'IBM Plex Sans',sans-serif",
          color:isSelected?'#d0d4e0':node.checked?'#444':'#6a7090',
        }}
        onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background='rgba(255,255,255,0.03)';}}
        onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background='transparent';}}>
        {hasChildren?(
          <span onClick={e=>{e.stopPropagation();onToggleExpand(nodeId);}}
            style={{width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:7,color:'#3a4060',cursor:'pointer',transition:'transform 0.15s',flexShrink:0,
              transform:isExpanded?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
        ):(<span style={{width:14,height:14,flexShrink:0}}/>)}
        {node.checked ? (
          <span style={{fontSize:10,color:'#6ecf6e',flexShrink:0,fontWeight:700}}>✓</span>
        ) : (
          <span style={{width:7,height:7,borderRadius:'50%',background:node.color||'#4a9eff',flexShrink:0}}/>
        )}
        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
          fontWeight:depth===0?600:400,textDecoration:node.checked?'line-through':'none'}}>{node.title}</span>
        {hasChildren&&<span style={{fontSize:10,color:'#2a3050',fontFamily:"'JetBrains Mono',monospace"}}>{node.children.length}</span>}
      </div>
      {hasChildren && isExpanded && node.children.map(childId => (
        <MindmapTreeItem key={childId} nodeId={childId} nodes={nodes} depth={depth+1}
          selectedId={selectedId} onSelect={onSelect} expandedIds={expandedIds} onToggleExpand={onToggleExpand}/>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   ── Mindmap: Main Tab Component ──
   ══════════════════════════════════════════ */

const MINDMAP_COLORS=['#4a9eff','#6ecf6e','#f0c040','#ff6b6b','#b080e0','#e08050','#50e0c0','#ff80b0'];

function MindmapTab({ mm, tasks, onAddTask, onChangeStatus }) {
  const { nodes, rootId, selectedId, setSelectedId, addChild, deleteNode, renameNode, setNodeColor,
    toggleCollapse, setNodeNotes, toggleNodeChecked, setNodeLinkedTask, syncNodeFromTask,
    projects, activeProjectId, switchProject, addProject, renameProject, deleteProject } = mm;

  const [vt, setVt] = useState({ x: 0, y: 0, scale: 1 });
  const [isPanning, setIsPanning] = useState(false);
  const [panStart, setPanStart] = useState({ x: 0, y: 0 });
  const [editingId, setEditingId] = useState(null);
  const svgRef = useRef(null);
  const canvasRef = useRef(null);
  const [initialized, setInitialized] = useState(false);
  const [notesNodeId, setNotesNodeId] = useState(null);

  const { positionedNodes, edges } = useMemo(() => {
    if (!nodes || !nodes.length || !rootId) return { positionedNodes: [], edges: [] };
    const p = computeTreeLayout(nodes, rootId, { horizontalSpacing: 130, verticalSpacing: 100, nodeWidth: 200, nodeHeight: 54 });
    return { positionedNodes: p, edges: computeEdges(p, nodes) };
  }, [nodes, rootId]);

  const fitToView = useCallback(() => {
    if (!positionedNodes.length || !canvasRef.current) return;
    const pad = 80;
    const minX = Math.min(...positionedNodes.map(n => n.x));
    const minY = Math.min(...positionedNodes.map(n => n.y));
    const maxX = Math.max(...positionedNodes.map(n => n.x + n.width));
    const maxY = Math.max(...positionedNodes.map(n => n.y + n.height));
    const cw = canvasRef.current.clientWidth, ch = canvasRef.current.clientHeight;
    const s = Math.min(cw / (maxX - minX + pad * 2), ch / (maxY - minY + pad * 2), 1.5);
    setVt({ x: (cw - (maxX - minX) * s) / 2 - minX * s, y: (ch - (maxY - minY) * s) / 2 - minY * s + 20, scale: s });
  }, [positionedNodes]);

  useEffect(() => { if (!initialized && positionedNodes.length) { fitToView(); setInitialized(true); } }, [initialized, positionedNodes, fitToView]);
  // Re-fit when switching projects
  useEffect(() => { setInitialized(false); }, [activeProjectId]);

  const handleWheel = useCallback(e => {
    e.preventDefault();
    const d = e.deltaY > 0 ? 0.9 : 1.1;
    const ns = Math.max(0.2, Math.min(3.0, vt.scale * d));
    if (svgRef.current) {
      const r = svgRef.current.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const ox = (mx - vt.x) / vt.scale, oy = (my - vt.y) / vt.scale;
      setVt({ x: mx - ox * ns, y: my - oy * ns, scale: ns });
    }
  }, [vt]);

  const handleSvgMouseDown = useCallback(e => {
    if (e.target !== svgRef.current) return;
    setIsPanning(true);
    setPanStart({ x: e.clientX - vt.x, y: e.clientY - vt.y });
  }, [vt]);

  const handleMouseMove = useCallback(e => {
    if (!isPanning) return;
    setVt(prev => ({ ...prev, x: e.clientX - panStart.x, y: e.clientY - panStart.y }));
  }, [isPanning, panStart]);

  const handleMouseUp = useCallback(() => setIsPanning(false), []);
  const handleSvgClick = useCallback(e => { if (e.target === svgRef.current) { setSelectedId(null); setNotesNodeId(null); } }, [setSelectedId]);

  const handleKeyDown = useCallback(e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') { setEditingId(null); setSelectedId(null); setNotesNodeId(null); }
    else if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId && selectedId !== rootId && !editingId) {
      e.preventDefault(); deleteNode(selectedId); setSelectedId(null);
    } else if (e.key === 'Enter' && selectedId && !editingId) { setEditingId(selectedId); }
  }, [selectedId, rootId, editingId, deleteNode, setSelectedId]);

  const editingNode = editingId ? nodes.find(n => n.id === editingId) : null;
  const editingPos = editingId ? positionedNodes.find(p => p.id === editingId) : null;

  // Add node to Tasks tab
  const handleAddToTasks = useCallback(nodeId => {
    const node = nodes.find(n => n.id === nodeId);
    if (!node || node.linkedTaskId) return;
    const project = projects.find(p => p.id === activeProjectId);
    const projectName = project ? project.name : 'Mindmap';
    const taskTitle = node.title + ' [' + projectName + ']';
    // Create task and get its ID
    const taskId = uuid();
    const maxOrd = tasks.reduce((mx, tk) => (tk.status === '' || tk.status === 'u') ? Math.max(mx, tk.order ?? 0) : mx, 0);
    onAddTask({
      id: taskId, title: taskTitle, status: '', order: maxOrd + 1,
      category: null, importance: null, dateAdded: now(), dateCompleted: null,
      statusChanged: null, dueDate: null, notes: 'From mindmap: ' + projectName,
      autoReturn: true, recurrence: null, startTime: null, endTime: null,
      mindmapNodeId: nodeId, mindmapProjectId: activeProjectId
    });
    setNodeLinkedTask(nodeId, taskId);
  }, [nodes, projects, activeProjectId, tasks, onAddTask, setNodeLinkedTask]);

  return (
    <div tabIndex={0} ref={canvasRef}
      style={{display:'flex',flexDirection:'column',flex:1,height:'100%',background:'#0d1117',overflow:'hidden',outline:'none',position:'relative'}}
      onKeyDown={handleKeyDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>

      {/* SVG Canvas */}
      <svg ref={svgRef} style={{flex:1,width:'100%',height:'100%',background:'#0d1117',cursor:isPanning?'grabbing':'grab',userSelect:'none'}}
        onWheel={handleWheel} onMouseDown={handleSvgMouseDown} onClick={handleSvgClick}>
        <g transform={`translate(${vt.x},${vt.y}) scale(${vt.scale})`}>
          {edges.map((edge,i)=><MindmapEdge key={'me-'+i} edge={edge}/>)}
          {positionedNodes.map(pos=>{
            const nd=nodes.find(n=>n.id===pos.id);
            if(!nd)return null;
            return <g key={'mn-'+nd.id}>
              {editingId===nd.id&&editingNode&&editingPos?
                <MindmapNodeEditor node={editingNode} position={editingPos}
                  onSave={t=>{renameNode(nd.id,t);setEditingId(null);}} onCancel={()=>setEditingId(null)}/>:
                <MindmapNode node={nd} position={pos} isSelected={selectedId===nd.id} isRoot={nd.id===rootId}
                  onSelect={()=>{setSelectedId(nd.id);setNotesNodeId(nd.id);}}
                  onAddChild={()=>addChild(nd.id)}
                  onToggleCollapse={()=>toggleCollapse(nd.id)}
                  onStartRename={()=>setEditingId(nd.id)}
                  onToggleChecked={()=>toggleNodeChecked(nd.id)}
                  onAddToTasks={()=>handleAddToTasks(nd.id)}
                  tasks={tasks}/>}
            </g>;
          })}
        </g>
      </svg>

      {/* Floating Fit button — bottom right */}
      <button onClick={fitToView} title="Fit to View"
        style={{position:'absolute',bottom:16,right:16,
          padding:'8px 14px',background:'#141822',border:'1px solid #1e2438',color:'#d0d4e0',
          borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,
          fontFamily:"'JetBrains Mono',monospace",
          boxShadow:'0 2px 12px rgba(0,0,0,0.4)',transition:'all 0.15s',
          display:'flex',alignItems:'center',gap:6}}
        onMouseEnter={e=>{e.currentTarget.style.background='#1a1f30';e.currentTarget.style.borderColor='#4a9eff';}}
        onMouseLeave={e=>{e.currentTarget.style.background='#141822';e.currentTarget.style.borderColor='#1e2438';}}>
        ⊡ Fit
      </button>

      {/* Notes panel — bottom of canvas when a node is selected */}
      {notesNodeId && nodes.find(n => n.id === notesNodeId) && (()=>{
        const nd = nodes.find(n => n.id === notesNodeId);
        return (
          <div style={{position:'absolute',bottom:0,left:0,right:0,
            background:'#0a0e18',borderTop:'1px solid #151a28',padding:'10px 20px',
            display:'flex',alignItems:'center',gap:12,fontSize:13}}>
            <span style={{color:'#3a4060',fontFamily:"'JetBrains Mono',monospace",fontSize:11,flexShrink:0}}>📝</span>
            <input value={nd.notes||''} onChange={e=>setNodeNotes(notesNodeId, e.target.value)}
              placeholder="Add notes..."
              style={{flex:1,border:'1px solid #1e2438',borderRadius:5,padding:'6px 10px',fontSize:12,
                background:'#0d1117',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#4a9eff'} onBlur={e=>e.target.style.borderColor='#1e2438'}/>
            <span style={{color:'#2a3050',fontFamily:"'JetBrains Mono',monospace",fontSize:11,flexShrink:0,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{nd.title}</span>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════
   ── Calendar View ──
   ══════════════════════════════════════════ */

function CalendarView({tasks,categories,onAddTask,onSelectTask,onChangeStatus,onUpdateTask,selId}){
  const[calMode,setCalMode]=useState('month');
  const[currentDate,setCurrentDate]=useState(new Date());
  const[addingDate,setAddingDate]=useState(null);
  const[addInput,setAddInput]=useState('');
  const[addStartTime,setAddStartTime]=useState('');
  const[addEndTime,setAddEndTime]=useState('');
  const[catFilter,setCatFilter]=useState(null);
  const containerRef=useRef(null);
  const timelineRef=useRef(null);
  const[dragState,setDragState]=useState(null); // {type:'move'|'resize', taskId, startY, origStartMin, origEndMin}
  const didDragRef=useRef(false);

  const minToTime=min=>{const h=Math.floor(Math.max(0,Math.min(1439,min))/60);const m=Math.round(Math.max(0,Math.min(1439,min))%60);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');};

  useEffect(()=>{
    if(!dragState)return;
    const handleMouseMove=e=>{
      const tl=timelineRef.current;
      if(!tl)return;
      const rect=tl.getBoundingClientRect();
      const scrollTop=tl.scrollTop;
      const mouseMin=Math.max(0,Math.min(1439,(e.clientY-rect.top+scrollTop)));
      const deltaMin=mouseMin-dragState.startY;
      if(Math.abs(deltaMin)>2)didDragRef.current=true;
      const task=tasks.find(t=>t.id===dragState.taskId);
      if(!task)return;
      if(dragState.type==='move'){
        const duration=dragState.origEndMin-dragState.origStartMin;
        let newStart=Math.round((dragState.origStartMin+deltaMin)/5)*5;
        newStart=Math.max(0,Math.min(1440-duration,newStart));
        const newEnd=newStart+duration;
        onUpdateTask({...task,startTime:minToTime(newStart),endTime:minToTime(newEnd)});
      }else if(dragState.type==='resize'){
        let newEnd=Math.round((dragState.origEndMin+deltaMin)/5)*5;
        newEnd=Math.max(dragState.origStartMin+15,Math.min(1440,newEnd));
        onUpdateTask({...task,endTime:minToTime(newEnd)});
      }
    };
    const handleMouseUp=()=>{setDragState(null);};
    document.addEventListener('mousemove',handleMouseMove);
    document.addEventListener('mouseup',handleMouseUp);
    return()=>{document.removeEventListener('mousemove',handleMouseMove);document.removeEventListener('mouseup',handleMouseUp);};
  },[dragState,tasks,onUpdateTask]);

  const filteredTasks=useMemo(()=>{
    if(!catFilter)return tasks;
    return tasks.filter(t=>t.category===catFilter);
  },[tasks,catFilter]);

  const tasksByDate=useMemo(()=>{
    const m={};
    filteredTasks.forEach(t=>{
      if(t.dueDate){
        if(!m[t.dueDate])m[t.dueDate]=[];
        m[t.dueDate].push(t);
      }
    });
    return m;
  },[filteredTasks]);

  const visibleTasks=useMemo(()=>{
    if(calMode==='month'){
      const y=currentDate.getFullYear();
      const m=currentDate.getMonth();
      const fd=new Date(y,m,1);
      const ld=new Date(y,m+1,0);
      const startD=new Date(fd);startD.setDate(startD.getDate()-fd.getDay());
      const endD=new Date(ld);endD.setDate(endD.getDate()+(6-ld.getDay()));
      const result=[];
      let d=new Date(startD);
      while(d<=endD){
        const dateStr=d.toLocaleDateString('en-CA');
        if(tasksByDate[dateStr]){result.push(...tasksByDate[dateStr]);}
        d.setDate(d.getDate()+1);
      }
      return result;
    }else if(calMode==='week'){
      const y=currentDate.getFullYear();
      const m=currentDate.getMonth();
      const day=currentDate.getDate();
      const dayOfWeek=currentDate.getDay();
      const startDate=new Date(y,m,day-dayOfWeek);
      const result=[];
      for(let i=0;i<7;i++){
        const d=new Date(startDate);d.setDate(d.getDate()+i);
        const dateStr=d.toLocaleDateString('en-CA');
        if(tasksByDate[dateStr]){result.push(...tasksByDate[dateStr]);}
      }
      return result;
    }else{
      return filteredTasks.filter(t=>t.dueDate&&new Date(t.dueDate).toLocaleDateString('en-CA')===new Date().toLocaleDateString('en-CA'));
    }
  },[filteredTasks,tasksByDate,currentDate,calMode]);

  const goToday=()=>setCurrentDate(new Date());
  const goNext=()=>{
    const d=new Date(currentDate);
    if(calMode==='month')d.setMonth(d.getMonth()+1);
    else if(calMode==='week')d.setDate(d.getDate()+7);
    else d.setDate(d.getDate()+1);
    setCurrentDate(d);
  };
  const goPrev=()=>{
    const d=new Date(currentDate);
    if(calMode==='month')d.setMonth(d.getMonth()-1);
    else if(calMode==='week')d.setDate(d.getDate()-7);
    else d.setDate(d.getDate()-1);
    setCurrentDate(d);
  };

  const handleAddTask=(dueDate)=>{
    if(!addInput.trim())return;
    onAddTask(addInput,dueDate,addStartTime||null,addEndTime||null);
    setAddInput('');
    setAddStartTime('');
    setAddEndTime('');
    setAddingDate(null);
  };

  const cancelAdding=()=>{
    setAddingDate(null);
    setAddInput('');
    setAddStartTime('');
    setAddEndTime('');
  };

  const startAdding=(dateStr,startTime)=>{
    setAddingDate(dateStr);
    setAddInput('');
    if(startTime){
      setAddStartTime(startTime);
      // Default 1 hour duration
      const[h,m]=startTime.split(':').map(Number);
      const endMin=Math.min(h*60+m+60,1440);
      setAddEndTime(minToTime(endMin));
    }else{
      setAddStartTime('');
      setAddEndTime('');
    }
  };

  useEffect(()=>{
    const h=e=>{
      if(addingDate&&containerRef.current&&!containerRef.current.contains(e.target)){
        cancelAdding();
      }
    };
    if(addingDate){
      document.addEventListener('mousedown',h);
      return()=>document.removeEventListener('mousedown',h);
    }
  },[addingDate]);

  if(calMode==='month'){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const fd=new Date(y,m,1);
    const ld=new Date(y,m+1,0);
    const startD=new Date(fd);startD.setDate(startD.getDate()-fd.getDay());
    const endD=new Date(ld);endD.setDate(endD.getDate()+(6-ld.getDay()));

    const cells=[];
    let d=new Date(startD);
    while(d<=endD){
      cells.push(new Date(d));
      d.setDate(d.getDate()+1);
    }

    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',overflow:'hidden'}}>
        {/* Main calendar */}
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 24px',overflow:'hidden'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
              <button onClick={goToday} style={{border:'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
              <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
              <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{MONTH_NAMES[m]} {y}</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
              <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
              <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
            </div>
          </div>

          {/* Category filter pills */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:12,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                }}>{name}</button>
            ))}
          </div>

          {/* Calendar grid */}
          <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,overflow:'auto'}}>
            {/* Day headers */}
            {DAY_NAMES.map(dn=>(
              <div key={dn} style={{fontSize:11,fontWeight:600,color:'#444',textAlign:'center',padding:'8px 0',borderBottom:'1px solid #151a28'}}>
                {dn}
              </div>
            ))}

            {/* Cells */}
            {cells.map((cellDate,idx)=>{
              const cellDateStr=cellDate.toLocaleDateString('en-CA');
              const isToday=cellDateStr===todayStr;
              const isCurrentMonth=cellDate.getMonth()===m;
              const cellTasks=tasksByDate[cellDateStr]||[];

              return(
                <div key={idx} style={{
                  minHeight:100,padding:8,borderRadius:8,
                  background:isCurrentMonth?'#141822':'#0d1117',
                  border:isToday?'2px solid #4a9eff':'1px solid #1e2438',
                  opacity:isCurrentMonth?1:0.4,
                  cursor:'pointer',
                  display:'flex',flexDirection:'column',
                  position:'relative',overflow:'hidden',
                }}
                onClick={()=>startAdding(cellDateStr)}>
                  <div style={{fontSize:isToday?13:11,fontWeight:isToday?600:400,color:isToday?'#4a9eff':'#666',marginBottom:4}}>
                    {cellDate.getDate()}
                  </div>

                  {addingDate===cellDateStr?(
                    <div onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column',gap:4}}>
                      <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAddTask(cellDateStr);if(e.key==='Escape')cancelAdding();}}
                        placeholder="New task..." autoFocus
                        style={{border:'1px solid #4a9eff',borderRadius:4,padding:'4px 6px',fontSize:11,background:'#0d1117',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>
                      <div style={{display:'flex',gap:3,alignItems:'center'}}>
                        <input type="time" value={addStartTime} onChange={e=>setAddStartTime(e.target.value)}
                          style={{flex:1,border:'1px solid #1e2438',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                        <span style={{fontSize:9,color:'#3a4060'}}>→</span>
                        <input type="time" value={addEndTime} onChange={e=>setAddEndTime(e.target.value)}
                          style={{flex:1,border:'1px solid #1e2438',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <button onClick={e=>{e.stopPropagation();handleAddTask(cellDateStr);}} style={{flex:1,border:'none',borderRadius:3,padding:'3px',background:'#4a9eff',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:600}}>Add</button>
                        <button onClick={e=>{e.stopPropagation();cancelAdding();}} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'3px',background:'transparent',color:'#666',fontSize:10,cursor:'pointer'}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:'flex',flexDirection:'column',gap:2,flex:1}}>
                      {cellTasks.slice(0,3).map(task=>{
                        const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                        return(
                          <div key={task.id} onClick={e=>{e.stopPropagation();onSelectTask(task.id);}}
                            style={{
                              fontSize:10,padding:'2px 6px',borderRadius:3,borderLeft:'3px solid '+s.color,
                              background:task.category&&categories[task.category]?categories[task.category].bg+'22':'#1a1e2e',
                              color:'#9aa',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                              fontWeight:500,
                            }}>
                            {task.title}
                          </div>
                        );
                      })}
                      {cellTasks.length>3&&<div style={{fontSize:9,color:'#555',padding:'2px 6px'}}>+{cellTasks.length-3} more</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }else if(calMode==='week'){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const d=currentDate.getDate();
    const dayOfWeek=currentDate.getDay();
    const startDate=new Date(y,m,d-dayOfWeek);
    const endDate=new Date(startDate);endDate.setDate(endDate.getDate()+6);

    const weekDates=[];
    for(let i=0;i<7;i++){
      const d=new Date(startDate);d.setDate(d.getDate()+i);
      weekDates.push(d);
    }

    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',overflow:'hidden'}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 24px',overflow:'hidden'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
              <button onClick={goToday} style={{border:'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
              <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
              <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{MONTH_NAMES[startDate.getMonth()]} {startDate.getDate()} - {MONTH_NAMES[endDate.getMonth()]} {endDate.getDate()}</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
              <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
              <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
            </div>
          </div>

          {/* Category filter */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:12,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                }}>{name}</button>
            ))}
          </div>

          {/* Week grid */}
          <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,overflow:'auto'}}>
            {weekDates.map((weekDate,idx)=>{
              const weekDateStr=weekDate.toLocaleDateString('en-CA');
              const isToday=weekDateStr===todayStr;
              const weekTasks=tasksByDate[weekDateStr]||[];

              return(
                <div key={idx} style={{
                  minHeight:200,padding:12,borderRadius:8,
                  background:'#141822',
                  border:isToday?'2px solid #4a9eff':'1px solid #1e2438',
                  cursor:'pointer',
                  display:'flex',flexDirection:'column',
                  position:'relative',overflow:'hidden',
                }}
                onClick={()=>startAdding(weekDateStr)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,paddingBottom:8,borderBottom:'1px solid #1e2438'}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:'#444',marginBottom:2}}>{DAY_NAMES[weekDate.getDay()]}</div>
                      <div style={{fontSize:isToday?14:12,fontWeight:isToday?600:400,color:isToday?'#4a9eff':'#d0d4e0'}}>
                        {weekDate.getDate()}
                      </div>
                    </div>
                  </div>

                  {addingDate===weekDateStr?(
                    <div onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column',gap:4}}>
                      <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAddTask(weekDateStr);if(e.key==='Escape')cancelAdding();}}
                        placeholder="New task..." autoFocus
                        style={{border:'1px solid #4a9eff',borderRadius:4,padding:'4px 6px',fontSize:11,background:'#0d1117',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>
                      <div style={{display:'flex',gap:3,alignItems:'center'}}>
                        <input type="time" value={addStartTime} onChange={e=>setAddStartTime(e.target.value)}
                          style={{flex:1,border:'1px solid #1e2438',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                        <span style={{fontSize:9,color:'#3a4060'}}>→</span>
                        <input type="time" value={addEndTime} onChange={e=>setAddEndTime(e.target.value)}
                          style={{flex:1,border:'1px solid #1e2438',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <button onClick={e=>{e.stopPropagation();handleAddTask(weekDateStr);}} style={{flex:1,border:'none',borderRadius:3,padding:'3px',background:'#4a9eff',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:600}}>Add</button>
                        <button onClick={e=>{e.stopPropagation();cancelAdding();}} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'3px',background:'transparent',color:'#666',fontSize:10,cursor:'pointer'}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
                      {weekTasks.map(task=>{
                        const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                        const catCfg=task.category&&categories[task.category];
                        return(
                          <div key={task.id} onClick={e=>{e.stopPropagation();onSelectTask(task.id);}}
                            style={{
                              fontSize:11,padding:'6px 8px',borderRadius:4,borderLeft:'3px solid '+s.color,
                              background:catCfg?catCfg.bg+'22':'#1a1e2e',
                              color:'#d0d4e0',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                              fontWeight:500,display:'flex',alignItems:'center',gap:4,
                              border:selId===task.id?'1px solid #4a9eff':'1px solid transparent',
                            }}>
                            <span style={{width:16,height:16,borderRadius:4,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:s.color,flexShrink:0}}>{task.status||'·'}</span>
                            <span style={{flex:1,minWidth:0}}>{task.title}</span>
                            {task.recurrence&&<span style={{fontSize:10,flexShrink:0}}>🔁</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }else{
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const d=currentDate.getDate();
    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');
    const currentDateStr=new Date(y,m,d).toLocaleDateString('en-CA');

    const dayTasks=tasksByDate[currentDateStr]||[];
    const allDayTasks=dayTasks.filter(t=>!t.startTime&&!t.endTime);
    const timedTasks=dayTasks.filter(t=>t.startTime||t.endTime);

    const now=new Date();
    const currentHour=now.getHours()+now.getMinutes()/60;
    const timelineTopPx=currentHour*60;

    const renderTaskBlock=(task,idx)=>{
      if(!task.startTime)return null;
      const[sh,sm]=task.startTime.split(':').map(Number);
      const[eh,em]=(task.endTime||task.startTime).split(':').map(Number);
      const startMin=sh*60+sm;
      const endMin=eh*60+em;
      const duration=Math.max(endMin-startMin,30);
      const top=startMin;
      const height=duration;
      const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
      const catCfg=task.category&&categories[task.category];
      const isDragging=dragState&&dragState.taskId===task.id;

      const handleMoveStart=e=>{
        e.stopPropagation();e.preventDefault();
        didDragRef.current=false;
        const tl=timelineRef.current;if(!tl)return;
        const rect=tl.getBoundingClientRect();
        const mouseMin=e.clientY-rect.top+tl.scrollTop;
        setDragState({type:'move',taskId:task.id,startY:mouseMin,origStartMin:startMin,origEndMin:endMin});
      };
      const handleResizeStart=e=>{
        e.stopPropagation();e.preventDefault();
        const tl=timelineRef.current;if(!tl)return;
        const rect=tl.getBoundingClientRect();
        const mouseMin=e.clientY-rect.top+tl.scrollTop;
        setDragState({type:'resize',taskId:task.id,startY:mouseMin,origStartMin:startMin,origEndMin:endMin});
      };

      return(
        <div key={task.id} onMouseDown={handleMoveStart} onClick={e=>{if(!didDragRef.current)onSelectTask(task.id);}}
          style={{
            position:'absolute',top:top+'px',left:'4px',right:'4px',height:height+'px',
            background:catCfg?(catCfg.bg+'33'):'rgba(100,150,200,0.15)',
            border:'1px solid '+(selId===task.id?'#4a9eff':s.color+'66'),
            borderRadius:6,padding:'8px 10px',cursor:isDragging?'grabbing':'grab',
            display:'flex',flexDirection:'column',gap:4,overflow:'hidden',
            transition:isDragging?'none':'all 0.15s',
            zIndex:isDragging?15:5,
            opacity:isDragging?0.85:1,
            userSelect:'none',
          }}>
          <div style={{fontSize:12,fontWeight:600,color:'#d0d4e0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',pointerEvents:'none'}}>
            {task.title}
          </div>
          <div style={{fontSize:10,color:'#8a9bb8',pointerEvents:'none'}}>
            {task.startTime}{task.endTime?'-'+task.endTime:''}
          </div>
          {catCfg&&<span style={{fontSize:10,background:catCfg.bg,color:catCfg.text||'#222',padding:'2px 6px',borderRadius:3,width:'fit-content',fontWeight:600,pointerEvents:'none'}}>
            {task.category}
          </span>}
          {/* Resize handle */}
          <div onMouseDown={handleResizeStart}
            style={{position:'absolute',bottom:0,left:0,right:0,height:8,cursor:'ns-resize',background:'transparent',borderRadius:'0 0 6px 6px'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(74,158,255,0.25)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}/>
        </div>
      );
    };

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'16px 24px',borderBottom:'1px solid #151a28',display:'flex',alignItems:'center',gap:16,justifyContent:'space-between'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
            <button onClick={goToday} style={{border:'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
            <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
            <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{DAY_NAMES_FULL[new Date(y,m,d).getDay()]}, {MONTH_NAMES[m]} {d}</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
            <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
            <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #1e2438',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
          </div>
        </div>

        {/* All-day section */}
        {allDayTasks.length>0&&(
          <div style={{padding:'12px 24px',borderBottom:'1px solid #151a28',background:'#0a0e18'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#2a3050',marginBottom:6}}>All day</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {allDayTasks.map(task=>{
                const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                const catCfg=task.category&&categories[task.category];
                return(
                  <div key={task.id} onClick={()=>onSelectTask(task.id)}
                    style={{
                      fontSize:12,padding:'6px 10px',borderRadius:4,borderLeft:'3px solid '+s.color,
                      background:catCfg?catCfg.bg+'22':'#1a1e2e',
                      color:'#9aa',cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                      border:selId===task.id?'1px solid #4a9eff':'1px solid transparent',
                    }}>
                    <span style={{width:12,height:12,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <span style={{flex:1}}>{task.title}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Timeline */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {/* Time gutter */}
          <div style={{width:60,flexShrink:0,background:'#0a0e18',borderRight:'1px solid #151a28',overflow:'auto'}}>
            <div style={{position:'relative',height:1440}}>
              {Array.from({length:24}).map((_,h)=>(
                <div key={h} style={{position:'absolute',top:h*60+'px',left:0,right:0,height:60,borderBottom:'1px solid #151a28',padding:'4px 4px',textAlign:'right'}}>
                  <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:'#3a4060'}}>
                    {String(h).padStart(2,'0')}:00
                  </span>
                </div>
              ))}
            </div>
          </div>

          {/* Timeline area */}
          <div ref={timelineRef} style={{flex:1,position:'relative',overflow:'auto',background:'#0d1117'}}>
            <div style={{position:'relative',height:1440}} onClick={e=>{
              if(addingDate===currentDateStr||dragState)return;
              const rect=e.currentTarget.getBoundingClientRect();
              const clickMin=Math.max(0,Math.min(1439,e.clientY-rect.top));
              const snapped=Math.round(clickMin/15)*15;
              startAdding(currentDateStr,minToTime(snapped));
            }}>
              {/* Hour gridlines */}
              {Array.from({length:24}).map((_,h)=>(
                <div key={h} style={{position:'absolute',top:h*60+'px',left:0,right:0,height:60,borderBottom:'1px solid rgba(30,36,56,0.5)'}}/>
              ))}

              {/* Current time indicator */}
              {currentDateStr===todayStr&&(
                <div style={{position:'absolute',top:timelineTopPx+'px',left:0,right:0,height:'2px',background:'#ff6b6b',zIndex:10}}>
                  <div style={{position:'absolute',left:'-6px',top:'-4px',width:8,height:8,background:'#ff6b6b',borderRadius:'50%'}}/>
                </div>
              )}

              {/* Task blocks */}
              {timedTasks.map((task,idx)=>renderTaskBlock(task,idx))}

              {/* Add task form */}
              {addingDate===currentDateStr&&(
                <div onClick={e=>e.stopPropagation()} style={{position:'absolute',top:Math.min((addStartTime?parseInt(addStartTime.split(':')[0])*60+parseInt(addStartTime.split(':')[1]):100),1340)+'px',left:'16px',right:'16px',background:'#141822',border:'1px solid #4a9eff',borderRadius:6,padding:'12px',zIndex:20}}>
                  <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAddTask(currentDateStr);if(e.key==='Escape')cancelAdding();}}
                    placeholder="New task..." autoFocus
                    style={{border:'none',outline:'none',background:'transparent',width:'100%',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,marginBottom:8}}/>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
                    <input type="time" value={addStartTime} onChange={e=>setAddStartTime(e.target.value)}
                      style={{flex:1,border:'1px solid #1e2438',borderRadius:4,padding:'4px 6px',fontSize:12,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                    <span style={{fontSize:11,color:'#3a4060'}}>→</span>
                    <input type="time" value={addEndTime} onChange={e=>setAddEndTime(e.target.value)}
                      style={{flex:1,border:'1px solid #1e2438',borderRadius:4,padding:'4px 6px',fontSize:12,background:'#0d1117',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={e=>{e.stopPropagation();handleAddTask(currentDateStr);}} style={{flex:1,border:'none',borderRadius:3,padding:'6px',background:'#4a9eff',color:'#fff',fontSize:11,cursor:'pointer',fontWeight:600}}>Add</button>
                    <button onClick={e=>{e.stopPropagation();cancelAdding();}} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'6px',background:'transparent',color:'#666',fontSize:11,cursor:'pointer'}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }
}

/* ── Kbd helper ── */
function K({children}){
  return <kbd style={{display:'inline-block',padding:'1px 5px',border:'1px solid #1e2438',borderRadius:3,fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginRight:3,background:'#151a28',color:'#3a4060'}}>{children}</kbd>;
}

/* ══════════════════════════════════════════
   ── Main App ──
   ══════════════════════════════════════════ */
function TaskFlow(){
  const[tasks,setTasks]=useState(()=>loadLS(TASK_KEY,[]));
  const[categories,setCategories]=useState(()=>loadLS(CAT_KEY,DEFAULT_CATEGORIES));
  const[view,setView]=useState('active');
  const[selId,setSelId]=useState(null);
  const[input,setInput]=useState('');
  const[search,setSearch]=useState('');
  const[catFilter,setCatFilter]=useState(null);
  const[dragIdx,setDragIdx]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const[showCatMgr,setShowCatMgr]=useState(false);
  const[showImportExport,setShowImportExport]=useState(false);
  const[checkedInActive,setCheckedInActive]=useState(new Set());
  const[mainTab,setMainTab]=useState('tasks');
  const[recDropOpen,setRecDropOpen]=useState(false);
  const inputRef=useRef(null);

  // Mindmap state — lifted here so sidebar can access projects/tree
  const mm=useMindmap();
  const[mmSidebarExpanded,setMmSidebarExpanded]=useState(()=>new Set(mm.rootId?[mm.rootId]:[]));
  const[addingProject,setAddingProject]=useState(false);
  const[newProjectName,setNewProjectName]=useState('');
  // Keep root expanded when it changes
  useEffect(()=>{if(mm.rootId)setMmSidebarExpanded(prev=>{if(prev.has(mm.rootId))return prev;const n=new Set(prev);n.add(mm.rootId);return n;});},[mm.rootId]);
  const mmExpandAll=useCallback(()=>setMmSidebarExpanded(new Set(mm.nodes.map(n=>n.id))),[mm.nodes]);
  const mmCollapseAll=useCallback(()=>setMmSidebarExpanded(new Set(mm.rootId?[mm.rootId]:[])),[mm.rootId]);
  const mmToggleSidebarExpand=useCallback(id=>{setMmSidebarExpanded(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n;});},[]);

  const handleImport=useCallback((importedTasks,importedCats,mode)=>{
    if(mode==='replace'){
      setTasks(importedTasks);
      if(importedCats)setCategories(importedCats);
    }else{
      setTasks(prev=>[...prev,...importedTasks]);
      if(importedCats)setCategories(prev=>({...prev,...importedCats}));
    }
  },[]);

  // Auto-return & due-date processing on mount
  useEffect(()=>{
    const{tasks:p1,changed:c1}=processAutoReturns(tasks);
    const{tasks:p2,changed:c2}=processDueDates(p1);
    if(c1||c2){setTasks(p2);saveLS(TASK_KEY,p2);}
  },[]);

  // Persist
  useEffect(()=>{saveLS(TASK_KEY,tasks);},[tasks]);
  useEffect(()=>{saveLS(CAT_KEY,categories);},[categories]);

  // Periodic auto-return check
  useEffect(()=>{
    const iv=setInterval(()=>{
      setTasks(prev=>{
        const{tasks:p1,changed:c1}=processAutoReturns(prev);
        const{tasks:p2,changed:c2}=processDueDates(p1);
        return(c1||c2)?p2:prev;
      });
    },60000);
    return()=>clearInterval(iv);
  },[]);

  const catShortcuts=useMemo(()=>{
    const m={};Object.keys(categories).forEach(n=>{m[n[0].toLowerCase()]=n;});return m;
  },[categories]);

  /* ── Status change: tasks stay in Active view until manually cleared ── */
  const changeStatus=useCallback((taskId,newStatus)=>{
    if(newStatus&&newStatus!==''){
      setCheckedInActive(prev=>new Set(prev).add(taskId));
      setTasks(prev=>prev.map(t=>{
        if(t.id!==taskId)return t;
        const upd={...t,status:newStatus,statusChanged:now(),
          dateCompleted:newStatus==='x'?now():(newStatus===''?null:t.dateCompleted),
          autoReturn:newStatus==='t'||newStatus==='w'||newStatus==='m'?true:(newStatus==='l'?false:t.autoReturn),
        };
        if(newStatus==='x'&&t.recurrence){
          const clone=cloneRecurringTask(t);
          if(clone){setTimeout(()=>setTasks(p=>[...p,clone]),0);}
        }
        return upd;
      }));
    }else{
      setCheckedInActive(prev=>{const n=new Set(prev);n.delete(taskId);return n;});
      setTasks(prev=>prev.map(t=>{
        if(t.id!==taskId)return t;
        return{...t,status:'',statusChanged:now(),dateCompleted:null,autoReturn:true};
      }));
    }
    // Sync to mindmap node if linked
    mm.syncNodeFromTask(taskId, newStatus||'');
  },[mm]);

  const clearChecked=useCallback(()=>{setCheckedInActive(new Set());},[]);

  /* ── Keyboard ── */
  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if(selId&&STATUS_KEYS.has(e.key)){e.preventDefault();changeStatus(selId,e.key);return;}
      if(selId&&e.key==='Backspace'){e.preventDefault();changeStatus(selId,'');return;}
      if(selId&&e.key==='Escape'){e.preventDefault();setSelId(null);return;}
      if(selId&&e.key==='Delete'){e.preventDefault();setTasks(p=>p.filter(t=>t.id!==selId));setSelId(null);return;}
      if(e.key==='/'||(e.key==='n'&&!e.metaKey&&!e.ctrlKey)){e.preventDefault();inputRef.current?.focus();return;}
      if((e.key==='ArrowDown'||e.key==='j')&&!e.metaKey){e.preventDefault();navTask(1);return;}
      if((e.key==='ArrowUp'||e.key==='k')&&!e.metaKey){e.preventDefault();navTask(-1);return;}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  });

  const navTask=dir=>{
    const vis=filtered;if(!vis.length)return;
    const ci=vis.findIndex(t=>t.id===selId);
    const ni=ci<0?0:Math.max(0,Math.min(vis.length-1,ci+dir));
    setSelId(vis[ni].id);
  };

  const addTask=useCallback((title,dueDate=null,startTime=null,endTime=null)=>{
    let t=title.trim(),cat=null;
    const m=t.match(/#([A-Za-z])$/);
    if(m){const s=m[1].toLowerCase();if(catShortcuts[s]){cat=catShortcuts[s];t=t.replace(/#[A-Za-z]$/,'').trim();}}
    if(!t)return;
    const maxOrd=tasks.reduce((mx,tk)=>(tk.status===''||tk.status==='u')?Math.max(mx,tk.order??0):mx,0);
    setTasks(prev=>[...prev,{id:uuid(),title:t,status:'',order:maxOrd+1,category:cat,importance:null,dateAdded:now(),dateCompleted:null,statusChanged:null,dueDate,notes:'',autoReturn:true,recurrence:null,startTime:startTime||null,endTime:endTime||null}]);
  },[tasks,catShortcuts]);

  // Raw task add for mindmap integration (accepts full task object)
  const addTaskRaw=useCallback(task=>{setTasks(prev=>[...prev,task]);},[]);

  const updateTask=useCallback(u=>{setTasks(prev=>prev.map(t=>t.id===u.id?u:t));},[]);

  /* ── Drag & drop ── */
  const handleDragStart=(e,i)=>{setDragIdx(i);e.dataTransfer.effectAllowed='move';};
  const handleDragOver=e=>{e.preventDefault();};
  const handleDrop=(e,dropIdx)=>{
    e.preventDefault();if(dragIdx===null||dragIdx===dropIdx)return;
    setTasks(prev=>{
      const vis=getVis(prev).map(t=>t.id);const id=vis[dragIdx];if(!id)return prev;
      const r=[...vis];r.splice(dragIdx,1);r.splice(dropIdx,0,id);
      const om={};r.forEach((id,i)=>{om[id]=i;});
      return prev.map(t=>om[t.id]!==undefined?{...t,order:om[t.id]}:t);
    });
    setDragIdx(null);
  };

  /* ── Filtering ── */
  const getVis=taskList=>{
    let f;
    if(view==='active')f=taskList.filter(t=>t.status===''||t.status==='u'||checkedInActive.has(t.id));
    else if(view==='all')f=[...taskList];
    else f=taskList.filter(t=>t.status===view);
    if(catFilter)f=f.filter(t=>t.category===catFilter);
    if(search){const q=search.toLowerCase();f=f.filter(t=>t.title.toLowerCase().includes(q)||(t.notes&&t.notes.toLowerCase().includes(q)));}
    if(view==='active')f.sort((a,b)=>{if(a.status==='u'&&b.status!=='u')return-1;if(b.status==='u'&&a.status!=='u')return 1;return(a.order??9999)-(b.order??9999);});
    else f.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
    return f;
  };

  const filtered=useMemo(()=>getVis(tasks),[tasks,view,catFilter,search,checkedInActive]);

  const grouped=useMemo(()=>{
    if(view==='active')return null;
    const g={};filtered.forEach(t=>{const k=dateKey(t.dateAdded);if(!g[k])g[k]=[];g[k].push(t);});
    return Object.entries(g).sort(([a],[b])=>b.localeCompare(a));
  },[filtered,view]);

  const counts=useMemo(()=>{
    const c={active:0,t:0,w:0,m:0,l:0,x:0,s:0,all:tasks.length};
    tasks.forEach(t=>{
      if(t.status===''||t.status==='u'||checkedInActive.has(t.id))c.active++;
      else if(c[t.status]!==undefined)c[t.status]++;
    });
    return c;
  },[tasks,checkedInActive]);

  const hasChecked=checkedInActive.size>0;
  const selTask=selId?tasks.find(t=>t.id===selId):null;

  /* ══════════════════════════════════════
     ── Render ──
     ══════════════════════════════════════ */
  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* ── Sidebar ── */}
      <div style={{width:sidebarOpen?260:58,transition:'width 0.2s ease',background:'#0a0e18',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden',borderRight:'1px solid #151a28'}}>

        {/* Logo */}
        <div style={{padding:sidebarOpen?'20px 16px 16px':'20px 10px 16px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',borderBottom:'1px solid #151a28'}}
          onClick={()=>setSidebarOpen(!sidebarOpen)}>
          <span style={{fontSize:22,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#4a9eff,#7c5cff)',borderRadius:8,flexShrink:0,color:'#fff'}}>⚡</span>
          {sidebarOpen&&<span style={{color:'#e0e0e0',fontWeight:700,fontSize:17,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-0.5}}>TaskFlow</span>}
        </div>

        {/* Main/Calendar tab toggle */}
        {sidebarOpen&&<div style={{padding:'12px 12px',display:'flex',gap:6,borderBottom:'1px solid #151a28'}}>
          <button onClick={()=>setMainTab('tasks')}
            style={{flex:1,border:mainTab==='tasks'?'1.5px solid #4a9eff':'1.5px solid #1e2438',borderRadius:6,padding:'8px',background:mainTab==='tasks'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:mainTab==='tasks'?'#4a9eff':'#666',fontWeight:600}}>☰ Tasks</button>
          <button onClick={()=>setMainTab('calendar')}
            style={{flex:1,border:mainTab==='calendar'?'1.5px solid #4a9eff':'1.5px solid #1e2438',borderRadius:6,padding:'8px',background:mainTab==='calendar'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:mainTab==='calendar'?'#4a9eff':'#666',fontWeight:600}}>📅 Calendar</button>
          <button onClick={()=>setMainTab('mindmap')}
            style={{flex:1,border:mainTab==='mindmap'?'1.5px solid #4a9eff':'1.5px solid #1e2438',borderRadius:6,padding:'8px',background:mainTab==='mindmap'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:mainTab==='mindmap'?'#4a9eff':'#666',fontWeight:600}}>🧠 Mindmap</button>
        </div>}

        {/* View buttons — only show in Tasks tab */}
        {mainTab==='tasks'&&<div style={{padding:'12px 0',flex:1}}>
          {VIEWS.map(v=>{
            const act=view===v.key&&!showCatMgr;const c=counts[v.key]||0;
            const sc=STATUS_CONFIG[v.key==='active'?'':v.key];
            const useColor=sc?.sidebarColor;
            const activeColor=useColor?(sc?.color||'#d0d4e0'):'#d0d4e0';
            const inactiveColor=useColor?(sc?.color||'#3a4060'):'#3a4060';
            return(
              <button key={v.key} onClick={()=>{setView(v.key);setCatFilter(null);setSearch('');setShowCatMgr(false);}}
                style={{display:'flex',alignItems:'center',gap:12,width:'100%',border:'none',
                  background:act?'rgba(74,158,255,0.08)':'transparent',
                  padding:sidebarOpen?'12px 16px':'12px 14px',cursor:'pointer',
                  color:act?activeColor:inactiveColor,
                  opacity:act?1:0.5,
                  transition:'all 0.15s',
                  fontSize:22,fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:act?600:400,
                  borderLeft:act?'3px solid '+(useColor?(sc?.color||'#4a9eff'):'#4a9eff'):'3px solid transparent',
                }}
                onMouseEnter={e=>{if(!act)e.currentTarget.style.opacity='0.8';}}
                onMouseLeave={e=>{if(!act)e.currentTarget.style.opacity='0.5';}}>
                <span style={{width:28,height:28,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",flexShrink:0,
                  background:v.key==='all'?'transparent':(v.key==='active'?'#151a28':(sc?.bg||'#151a28')),
                  color:v.key==='all'?(act?activeColor:inactiveColor):(v.key==='active'?'#2a3050':(sc?.color||'#2a3050')),
                  border:v.key==='all'?'none':(v.key==='active'?'2px solid #1e2438':'none'),
                }}>{v.key==='all'?'≡':v.icon}</span>
                {sidebarOpen&&<>
                  <span style={{flex:1,textAlign:'left'}}>{v.label}</span>
                  {c>0&&<span style={{fontSize:16,fontFamily:"'JetBrains Mono',monospace",opacity:0.6,background:act?'rgba(255,255,255,0.08)':'transparent',padding:'2px 10px',borderRadius:10}}>{c}</span>}
                </>}
              </button>
            );
          })}
        </div>}

        {/* Category manager toggle */}
        {sidebarOpen&&mainTab==='tasks'&&<button onClick={()=>setShowCatMgr(!showCatMgr)}
          style={{margin:'0 12px',padding:'10px 12px',border:'1px solid #151a28',borderRadius:8,
            background:showCatMgr?'rgba(74,158,255,0.08)':'transparent',
            color:showCatMgr?'#d0d4e0':'#3a4060',cursor:'pointer',fontSize:14,textAlign:'left',
            display:'flex',alignItems:'center',gap:8,transition:'all 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.color='#6a7090'} onMouseLeave={e=>{if(!showCatMgr)e.currentTarget.style.color='#3a4060';}}>
          <span style={{fontSize:15}}>🎨</span><span>Categories</span>
        </button>}

        {/* Import/Export toggle */}
        {sidebarOpen&&mainTab==='tasks'&&<button onClick={()=>setShowImportExport(true)}
          style={{margin:'6px 12px 0',padding:'10px 12px',border:'1px solid #151a28',borderRadius:8,
            background:'transparent',
            color:'#3a4060',cursor:'pointer',fontSize:14,textAlign:'left',
            display:'flex',alignItems:'center',gap:8,transition:'all 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.color='#6a7090'} onMouseLeave={e=>e.currentTarget.style.color='#3a4060'}>
          <span style={{fontSize:15}}>↕</span><span>Import / Export</span>
        </button>}

        {/* Keyboard shortcuts */}
        {sidebarOpen&&mainTab==='tasks'&&<div style={{padding:'14px 16px',borderTop:'1px solid #151a28',color:'#2a3050',fontSize:11,fontFamily:"'JetBrains Mono',monospace",lineHeight:2.1,marginTop:12}}>
          <div><K>x</K> done <K>s</K> skip</div>
          <div><K>t</K> tmrw <K>w</K> week <K>m</K> month</div>
          <div><K>l</K> long <K>u</K> urgent</div>
          <div><K>⌫</K> reactivate <K>del</K> delete</div>
          <div><K>n</K> new <K>j</K><K>k</K> nav <K>/</K> search</div>
        </div>}

        {/* ── Mindmap sidebar: Projects + Tree ── */}
        {mainTab==='mindmap'&&sidebarOpen&&<>
          {/* Project list */}
          <div style={{padding:'8px 0',borderBottom:'1px solid #151a28'}}>
            {mm.projects.map(p=>{
              const isActive=p.id===mm.activeProjectId;
              return(
                <button key={p.id} onClick={()=>mm.switchProject(p.id)}
                  style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',
                    background:isActive?'rgba(74,158,255,0.08)':'transparent',
                    padding:'10px 16px',cursor:'pointer',
                    color:isActive?'#d0d4e0':'#3a4060',opacity:isActive?1:0.6,
                    transition:'all 0.15s',fontSize:15,fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:isActive?600:400,
                    borderLeft:isActive?'3px solid #4a9eff':'3px solid transparent',
                  }}
                  onMouseEnter={e=>{if(!isActive)e.currentTarget.style.opacity='0.8';}}
                  onMouseLeave={e=>{if(!isActive)e.currentTarget.style.opacity='0.6';}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:p.color||'#4a9eff',flexShrink:0}}/>
                  <span style={{flex:1,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                </button>
              );
            })}
            {/* Add project */}
            {addingProject?(
              <div style={{padding:'6px 16px',display:'flex',gap:6}}>
                <input value={newProjectName} onChange={e=>setNewProjectName(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&newProjectName.trim()){mm.addProject(newProjectName.trim());setAddingProject(false);setNewProjectName('');}if(e.key==='Escape'){setAddingProject(false);setNewProjectName('');}}}
                  placeholder="Project name..." autoFocus
                  style={{flex:1,border:'1px solid #1e2438',borderRadius:4,padding:'5px 8px',fontSize:12,background:'#0d1117',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>
              </div>
            ):(
              <button onClick={()=>setAddingProject(true)}
                style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',
                  background:'transparent',padding:'8px 16px',cursor:'pointer',
                  color:'#2a3050',fontSize:13,fontFamily:"'IBM Plex Sans',sans-serif",
                  transition:'color 0.15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#4a9eff'}
                onMouseLeave={e=>e.currentTarget.style.color='#2a3050'}>
                <span style={{fontSize:16,fontWeight:700}}>+</span>
                <span>New Project</span>
              </button>
            )}
          </div>

          {/* Tree header with expand/collapse */}
          <div style={{padding:'10px 12px 6px',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,fontWeight:600,color:'#3a4060',fontFamily:"'JetBrains Mono',monospace",flex:1,letterSpacing:0.5,textTransform:'uppercase'}}>Nodes</span>
            <button onClick={mmExpandAll} title="Expand all"
              style={{border:'1px solid #1e2438',borderRadius:3,padding:'2px 5px',background:'transparent',
                color:'#2a3050',cursor:'pointer',fontSize:9,transition:'color 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.color='#6a7090'} onMouseLeave={e=>e.currentTarget.style.color='#2a3050'}>⊞</button>
            <button onClick={mmCollapseAll} title="Collapse all"
              style={{border:'1px solid #1e2438',borderRadius:3,padding:'2px 5px',background:'transparent',
                color:'#2a3050',cursor:'pointer',fontSize:9,transition:'color 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.color='#6a7090'} onMouseLeave={e=>e.currentTarget.style.color='#2a3050'}>⊟</button>
          </div>

          {/* Tree navigator */}
          <div style={{flex:1,overflow:'auto',padding:'2px 0 8px'}}>
            {mm.rootId && <MindmapTreeItem nodeId={mm.rootId} nodes={mm.nodes} depth={0}
              selectedId={mm.selectedId} onSelect={mm.setSelectedId}
              expandedIds={mmSidebarExpanded} onToggleExpand={mmToggleSidebarExpand}/>}
          </div>

          {/* Color palette + delete at bottom */}
          <div style={{padding:'8px 12px',borderTop:'1px solid #151a28',display:'flex',flexDirection:'column',gap:6}}>
            <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
              {MINDMAP_COLORS.map(c=>(
                <button key={c} onClick={()=>{if(mm.selectedId)mm.setNodeColor(mm.selectedId,c);}}
                  disabled={!mm.selectedId}
                  style={{width:20,height:20,background:c,
                    border:mm.selectedId&&mm.nodes.find(n=>n.id===mm.selectedId)?.color===c?'2px solid #fff':'1px solid rgba(255,255,255,0.12)',
                    borderRadius:3,cursor:mm.selectedId?'pointer':'default',opacity:mm.selectedId?1:0.35,transition:'all 0.2s'}}/>
              ))}
            </div>
            <button onClick={()=>{if(mm.selectedId&&mm.selectedId!==mm.rootId){mm.deleteNode(mm.selectedId);mm.setSelectedId(null);}}}
              disabled={!mm.selectedId||mm.selectedId===mm.rootId}
              style={{padding:'5px 0',background:mm.selectedId&&mm.selectedId!==mm.rootId?'rgba(255,107,107,0.12)':'transparent',
                border:'1px solid '+(mm.selectedId&&mm.selectedId!==mm.rootId?'rgba(255,107,107,0.25)':'#1e2438'),
                color:mm.selectedId&&mm.selectedId!==mm.rootId?'#ff6b6b':'#2a3050',borderRadius:4,
                cursor:mm.selectedId&&mm.selectedId!==mm.rootId?'pointer':'default',fontSize:11,fontWeight:500,
                fontFamily:"'JetBrains Mono',monospace",transition:'all 0.15s'}}>Delete node</button>
          </div>
        </>}

        {/* ── Calendar sidebar: task list ── */}
        {mainTab==='calendar'&&sidebarOpen&&<>
          <div style={{padding:'10px 12px 6px',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,fontWeight:600,color:'#3a4060',fontFamily:"'JetBrains Mono',monospace",flex:1,letterSpacing:0.5,textTransform:'uppercase'}}>Tasks with dates</span>
          </div>
          <div style={{flex:1,overflow:'auto',padding:'2px 0 8px'}}>
            {tasks.filter(t=>t.dueDate).length===0?(
              <div style={{padding:'12px 16px',fontSize:12,color:'#2a3050',textAlign:'center'}}>No scheduled tasks</div>
            ):(
              tasks.filter(t=>t.dueDate).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')).map(task=>{
                const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                const catCfg=task.category&&categories[task.category];
                return(
                  <div key={task.id} onClick={()=>setSelId(task.id)}
                    style={{
                      padding:'7px 14px',cursor:'pointer',borderLeft:'2px solid '+(selId===task.id?'#4a9eff':'transparent'),
                      background:selId===task.id?'rgba(74,158,255,0.08)':'transparent',
                      display:'flex',alignItems:'center',gap:8,transition:'all 0.15s',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.02)'}
                    onMouseLeave={e=>{if(selId!==task.id)e.currentTarget.style.background='transparent';}}>
                    <span style={{width:10,height:10,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,color:'#9aa',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</div>
                      <div style={{fontSize:10,color:'#3a4060',fontFamily:"'JetBrains Mono',monospace"}}>{task.dueDate}{task.startTime?' '+task.startTime:''}</div>
                    </div>
                    {catCfg&&<span style={{fontSize:9,background:catCfg.bg,color:catCfg.text||'#222',padding:'1px 5px',borderRadius:3,fontWeight:600,flexShrink:0}}>{task.category}</span>}
                  </div>
                );
              })
            )}
          </div>
        </>}
      </div>

      {/* ── Main Content ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* Header bar - only show in Tasks tab */}
        {mainTab==='tasks'&&<div style={{padding:'16px 24px',borderBottom:'1px solid #151a28',display:'flex',alignItems:'center',gap:16,background:'#0a0e18'}}>
          <div style={{flex:1}}>
            <h1 style={{fontSize:22,fontWeight:600,display:'flex',alignItems:'center',gap:10,color:'#d0d4e0'}}>
              <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:32,height:32,borderRadius:7,
                background:view==='all'?'transparent':(view==='active'?'#151a28':(STATUS_CONFIG[view]?.bg||'#151a28')),
                color:view==='all'?'#d0d4e0':(view==='active'?'#2a3050':(STATUS_CONFIG[view]?.color||'#2a3050')),
                border:view==='active'?'2px solid #1e2438':'none',
                fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
                {VIEWS.find(v=>v.key===view)?.icon}
              </span>
              {VIEWS.find(v=>v.key===view)?.label}
              <span style={{fontSize:15,fontWeight:400,color:'#3a4060',fontFamily:"'JetBrains Mono',monospace"}}>{filtered.length}</span>
            </h1>
          </div>

          {/* Category filter pills — always colored */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:13,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                  boxShadow:catFilter===name?'0 0 12px '+cfg.bg+'88':'none',
                }}>{name}</button>
            ))}
          </div>

          {/* Search */}
          <div style={{position:'relative'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
              style={{border:'1px solid #1e2438',borderRadius:6,padding:'8px 12px 8px 32px',fontSize:14,fontFamily:"'IBM Plex Sans',sans-serif",outline:'none',width:210,background:'#0d1117',color:'#d0d4e0',transition:'border-color 0.15s'}}
              onFocus={e=>e.target.style.borderColor='#4a9eff'} onBlur={e=>e.target.style.borderColor='#1e2438'}/>
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'#2a3050'}}>⌕</span>
          </div>
        </div>}

        {/* Category manager OR task/calendar/mindmap views */}
        {showCatMgr&&mainTab==='tasks'?(
          <div style={{flex:1,overflow:'auto'}}><CategoryManager categories={categories} onUpdate={setCategories}/></div>
        ):mainTab==='mindmap'?(
          <MindmapTab mm={mm} tasks={tasks} onAddTask={addTaskRaw} onChangeStatus={changeStatus}/>
        ):(mainTab==='calendar'?(
          <CalendarView tasks={tasks} categories={categories} onAddTask={addTask} onSelectTask={setSelId} onChangeStatus={changeStatus} onUpdateTask={updateTask} selId={selId}/>
        ):(
          <>
            {/* Quick entry + clear button (active view only) */}
            {view==='active'&&(
              <div style={{padding:'14px 24px',borderBottom:'1px solid #151a28',background:'#0a0e18'}}>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <span style={{color:'#4a9eff',fontSize:22,fontWeight:700}}>+</span>
                  <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'&&input.trim()){addTask(input);setInput('');}}}
                    placeholder="Add a task... (#W for Work, #H for Home, etc.)"
                    style={{flex:1,border:'none',outline:'none',fontSize:17,fontFamily:"'IBM Plex Sans',sans-serif",color:'#d0d4e0',background:'transparent',padding:'4px 0'}}/>
                  {hasChecked&&<button onClick={clearChecked}
                    style={{border:'1px solid #2a4a2a',borderRadius:6,padding:'5px 14px',fontSize:13,cursor:'pointer',
                      background:'rgba(110,207,110,0.1)',color:'#6ecf6e',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                      transition:'all 0.15s',whiteSpace:'nowrap'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(110,207,110,0.2)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(110,207,110,0.1)'}>
                    ✓ Clear checked ({checkedInActive.size})
                  </button>}
                  <span style={{fontSize:12,color:'#2a3050',fontFamily:"'JetBrains Mono',monospace"}}>⏎ enter</span>
                </div>
              </div>
            )}

            {/* Task list */}
            <div style={{flex:1,overflow:'auto',padding:'8px 12px 60px'}}>
              {filtered.length===0?(
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60%',color:'#2a3050',gap:12}}>
                  <span style={{fontSize:44}}>{view==='active'?'✨':view==='x'?'📦':'📋'}</span>
                  <span style={{fontSize:16}}>{view==='active'?'All clear — add a task to get started.':'No tasks here.'}</span>
                </div>
              ):view==='active'?(
                <div style={{display:'flex',flexDirection:'column',gap:2,paddingTop:4}}>
                  {filtered.map((task,idx)=>(
                    <TaskRow key={task.id} task={task} idx={idx} isSelected={selId===task.id} onSelect={setSelId}
                      onUpdate={updateTask} onChangeStatus={changeStatus} onDragStart={handleDragStart} onDragOver={handleDragOver} onDrop={handleDrop}
                      showOrder={true} categories={categories}/>
                  ))}
                </div>
              ):(
                grouped?.map(([dk,dayTasks])=>(
                  <div key={dk} style={{marginBottom:24}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#2a3050',fontFamily:"'JetBrains Mono',monospace",padding:'12px 16px 6px',letterSpacing:0.5,textTransform:'uppercase',borderBottom:'1px solid #151a28',marginBottom:6}}>
                      {fmtDay(dk+'T12:00:00')}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:2}}>
                      {dayTasks.map((task,idx)=>(
                        <TaskRow key={task.id} task={task} idx={idx} isSelected={selId===task.id} onSelect={setSelId}
                          onUpdate={updateTask} onChangeStatus={changeStatus} onDragStart={handleDragStart} onDragOver={handleDragOver} onDrop={handleDrop}
                          showOrder={false} categories={categories}/>
                      ))}
                    </div>
                  </div>
                ))
              )}
            </div>
          </>
        ))}

        {/* Detail bar for selected task - works in both tasks and calendar tabs */}
        {selTask&&(mainTab==='tasks'||mainTab==='calendar')&&(()=>{
          const task=selTask;
          return(
            <div style={{borderTop:'1px solid #151a28',padding:'10px 24px',background:'#0a0e18',display:'flex',alignItems:'center',gap:16,fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:'#3a4060',flexWrap:'wrap'}}>
              <span style={{fontWeight:600,color:'#6a7090',maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.title}</span>
              <span>added {fmt(task.dateAdded)}</span>
              {task.dateCompleted&&<span style={{color:'#5a8a5a'}}>done {fmt(task.dateCompleted)}</span>}

              {/* Auto-return button */}
              {(task.status==='t'||task.status==='w'||task.status==='m')&&(
                <button onClick={()=>updateTask({...task,autoReturn:!task.autoReturn})}
                  style={{border:'1px solid #1e2438',borderRadius:5,padding:'3px 10px',cursor:'pointer',background:task.autoReturn?'#1a2a1a':'transparent',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:task.autoReturn?'#6ecf6e':'#3a4060'}}>
                  ↩ auto-return {task.autoReturn?'on':'off'}
                </button>
              )}

              {/* Recurrence button */}
              <div style={{position:'relative'}}>
                <button onClick={()=>setRecDropOpen(!recDropOpen)}
                  style={{border:'1px solid #1e2438',borderRadius:5,padding:'3px 10px',cursor:'pointer',background:task.recurrence?'#1a2a3e':'transparent',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:task.recurrence?'#50a0e0':'#3a4060'}}>
                  🔁 {task.recurrence?describeRecurrence(task.recurrence):'repeat off'}
                </button>
                {recDropOpen&&<RecurrenceDropdown task={task} onSelect={rec=>{updateTask({...task,recurrence:rec});setRecDropOpen(false);}} onClose={()=>setRecDropOpen(false)}/>}
              </div>

              {/* Notes input */}
              <input value={task.notes||''} onChange={e=>updateTask({...task,notes:e.target.value})} placeholder="Add notes..."
                style={{flex:1,border:'1px solid #1e2438',borderRadius:5,padding:'4px 8px',fontSize:12,background:'#0d1117',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>

              {/* Close button */}
              <button onClick={()=>setSelId(null)}
                style={{border:'none',background:'transparent',cursor:'pointer',color:'#444',fontSize:18,padding:'0 4px'}}
                onMouseEnter={e=>e.currentTarget.style.color='#888'} onMouseLeave={e=>e.currentTarget.style.color='#444'}>×</button>
            </div>
          );
        })()}
      </div>

      {/* Import/Export Modal */}
      {showImportExport&&<ImportExportModal
        onClose={()=>setShowImportExport(false)}
        onImport={handleImport}
        onExportJson={()=>exportToJson(tasks,categories)}
        onExportXlsx={()=>exportToXlsx(tasks)}
        taskCount={tasks.length}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TaskFlow/>);
</script>
</body>
</html>
