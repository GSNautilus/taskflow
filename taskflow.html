function FixedCatDropdown({categories,onSelect,onClose,anchorRef}){
  const ref=useRef(null);
  const[pos,setPos]=useState({top:0,left:0});
  useEffect(()=>{
    if(anchorRef.current){
      const r=anchorRef.current.getBoundingClientRect();
      const dropH=Object.keys(categories).length*37+37+8;
      const spaceBelow=window.innerHeight-r.bottom;
      const top=spaceBelow<dropH?Math.max(4,r.top-dropH):r.bottom+4;
      const left=Math.min(r.left,window.innerWidth-180);
      setPos({top,left});
    }
  },[anchorRef,categories]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target)&&anchorRef.current&&!anchorRef.current.contains(e.target))onClose();};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[onClose,anchorRef]);
  return ReactDOM.createPortal(
    <div ref={ref} style={{position:'fixed',top:pos.top,left:pos.left,zIndex:9999,background:'#2c2c2c',border:'1px solid #3a3a3a',borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,0.6)',padding:4,minWidth:170}}>
      {Object.entries(categories).map(([name,cfg])=>(
        <button key={name} onClick={()=>onSelect(name)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',background:'transparent',padding:'9px 12px',cursor:'pointer',borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:14,color:'#ccc'}}
          onMouseEnter={e=>e.currentTarget.style.background='#353535'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{width:16,height:16,borderRadius:4,background:cfg.bg,flexShrink:0}}/><span>{name}</span>
        </button>
      ))}
      <button onClick={()=>onSelect(null)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',background:'transparent',padding:'9px 12px',cursor:'pointer',borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:14,color:'#555'}}
        onMouseEnter={e=>e.currentTarget.style.background='#353535'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{width:16,height:16,borderRadius:4,border:'1px dashed #444',flexShrink:0}}/><span>None</span>
      </button>
    </div>,
    document.body
  );
}

function CalendarCatButton({task,categories,onUpdateTask}){
  const[open,setOpen]=useState(false);
  const btnRef=useRef(null);
  const catCfg=task.category&&categories[task.category];
  return(
    <div ref={btnRef} style={{position:'relative',flexShrink:0}} onClick={e=>e.stopPropagation()}>
      {catCfg?(
        <button onClick={()=>setOpen(!open)} style={{border:'none',borderRadius:4,padding:'2px 6px',fontSize:9,background:catCfg.bg,cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:catCfg.text||'#222'}}>{task.category}</button>
      ):(
        <button onClick={()=>setOpen(!open)} style={{border:'1px dashed #444',borderRadius:4,padding:'1px 5px',fontSize:9,color:'#555',background:'transparent',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}}>+</button>
      )}
      {open&&<FixedCatDropdown categories={categories} anchorRef={btnRef} onSelect={c=>{onUpdateTask({...task,category:c});setOpen(false);}} onClose={()=>setOpen(false)}/>}
    </div>
  );
}

const EARLY_HOUR=8; // Hours 0-7 collapsed by default
const EARLY_MINS=EARLY_HOUR*60; // 480 minutes
const COLLAPSED_BAR_H=32; // Height of collapsed early-morning bar in px

function CalendarView({tasks,categories,onAddTask,onSelectTask,onChangeStatus,onUpdateTask,selId,calMode,setCalMode,currentDate,setCurrentDate}){
  const[addingDate,setAddingDate]=useState(null);
  const[addInput,setAddInput]=useState('');
  const[addStartTime,setAddStartTime]=useState('');
  const[addEndTime,setAddEndTime]=useState('');
  const[catFilter,setCatFilter]=useState(null);
  const containerRef=useRef(null);
  const timelineRef=useRef(null);
  const gutterRef=useRef(null);
  const weekBodyRef=useRef(null);
  const[dragState,setDragState]=useState(null);
  const didDragRef=useRef(false);
  const[editingTaskId,setEditingTaskId]=useState(null);
  const[editTitle,setEditTitle]=useState('');
  const[editStart,setEditStart]=useState('');
  const[editEnd,setEditEnd]=useState('');
  const[earlyExpanded,setEarlyExpanded]=useState(false);

  // Sync scroll between time gutter and timeline
  const syncScroll=useCallback(source=>{
    const tl=timelineRef.current;
    const gt=gutterRef.current;
    if(!tl||!gt)return;
    if(source==='timeline')gt.scrollTop=tl.scrollTop;
    else tl.scrollTop=gt.scrollTop;
  },[]);

  const minToTime=min=>{const h=Math.floor(Math.max(0,Math.min(1439,min))/60);const m=Math.round(Math.max(0,Math.min(1439,min))%60);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');};

  useEffect(()=>{
    if(!dragState)return;
    const handleMouseMove=e=>{
      const tl=timelineRef.current;
      if(!tl)return;
      const rect=tl.getBoundingClientRect();
      const scrollTop=tl.scrollTop;
      const rawMin=e.clientY-rect.top+scrollTop;
      const mouseMin=Math.max(0,Math.min(1439,rawMin+(earlyExpanded?0:EARLY_MINS)));
      const deltaMin=mouseMin-dragState.startY;
      if(Math.abs(deltaMin)>2)didDragRef.current=true;
      const task=tasks.find(t=>t.id===dragState.taskId);
      if(!task)return;
      if(dragState.type==='move'){
        const duration=dragState.origEndMin-dragState.origStartMin;
        let newStart=Math.round((dragState.origStartMin+deltaMin)/15)*15;
        newStart=Math.max(0,Math.min(1440-duration,newStart));
        const newEnd=newStart+duration;
        onUpdateTask({...task,startTime:minToTime(newStart),endTime:minToTime(newEnd)});
      }else if(dragState.type==='resize'){
        let newEnd=Math.round((dragState.origEndMin+deltaMin)/15)*15;
        newEnd=Math.max(dragState.origStartMin+15,Math.min(1440,newEnd));
        onUpdateTask({...task,endTime:minToTime(newEnd)});
      }
    };
    const handleMouseUp=()=>{setDragState(null);};
    document.addEventListener('mousemove',handleMouseMove);
    document.addEventListener('mouseup',handleMouseUp);
    return()=>{document.removeEventListener('mousemove',handleMouseMove);document.removeEventListener('mouseup',handleMouseUp);};
  },[dragState,tasks,onUpdateTask,earlyExpanded]);

  const filteredTasks=useMemo(()=>{
    if(!catFilter)return tasks;
    return tasks.filter(t=>t.category===catFilter);
  },[tasks,catFilter]);

  const tasksByDate=useMemo(()=>{
    const m={};
    filteredTasks.forEach(t=>{
      if(t.dueDate){
        if(!m[t.dueDate])m[t.dueDate]=[];
        m[t.dueDate].push(t);
      }
    });
    return m;
  },[filteredTasks]);

  const visibleTasks=useMemo(()=>{
    if(calMode==='month'){
      const y=currentDate.getFullYear();
      const m=currentDate.getMonth();
      const fd=new Date(y,m,1);
      const ld=new Date(y,m+1,0);
      const startD=new Date(fd);startD.setDate(startD.getDate()-fd.getDay());
      const endD=new Date(ld);endD.setDate(endD.getDate()+(6-ld.getDay()));
      const result=[];
      let d=new Date(startD);
      while(d<=endD){
        const dateStr=d.toLocaleDateString('en-CA');
        if(tasksByDate[dateStr]){result.push(...tasksByDate[dateStr]);}
        d.setDate(d.getDate()+1);
      }
      return result;
    }else if(calMode==='week'){
      const y=currentDate.getFullYear();
      const m=currentDate.getMonth();
      const day=currentDate.getDate();
      const dayOfWeek=currentDate.getDay();
      const startDate=new Date(y,m,day-dayOfWeek);
      const result=[];
      for(let i=0;i<7;i++){
        const d=new Date(startDate);d.setDate(d.getDate()+i);
        const dateStr=d.toLocaleDateString('en-CA');
        if(tasksByDate[dateStr]){result.push(...tasksByDate[dateStr]);}
      }
      return result;
    }else{
      const cd=currentDate.toLocaleDateString('en-CA');
      return filteredTasks.filter(t=>t.dueDate&&new Date(t.dueDate).toLocaleDateString('en-CA')===cd);
    }
  },[filteredTasks,tasksByDate,currentDate,calMode]);

  const goToday=()=>setCurrentDate(new Date());
  const goNext=()=>{
    const d=new Date(currentDate);
    if(calMode==='month')d.setMonth(d.getMonth()+1);
    else if(calMode==='week')d.setDate(d.getDate()+7);
    else d.setDate(d.getDate()+1);
    setCurrentDate(d);
  };
  const goPrev=()=>{
    const d=new Date(currentDate);
    if(calMode==='month')d.setMonth(d.getMonth()-1);
    else if(calMode==='week')d.setDate(d.getDate()-7);
    else d.setDate(d.getDate()-1);
    setCurrentDate(d);
  };

  const handleAddTask=(dueDate)=>{
    if(!addInput.trim())return;
    onAddTask(addInput,dueDate,addStartTime||null,addEndTime||null);
    setAddInput('');
    setAddStartTime('');
    setAddEndTime('');
    setAddingDate(null);
  };

  const cancelAdding=()=>{
    setAddingDate(null);
    setAddInput('');
    setAddStartTime('');
    setAddEndTime('');
  };

  const getNearestQuarter=()=>{
    const n=new Date();
    const mins=n.getHours()*60+n.getMinutes();
    const snapped=Math.round(mins/15)*15;
    return snapped>=1440?1425:snapped;
  };

  const startAdding=(dateStr,startTime)=>{
    setAddingDate(dateStr);
    setAddInput('');
    if(startTime){
      setAddStartTime(startTime);
      const[h,m]=startTime.split(':').map(Number);
      const endMin=Math.min(h*60+m+60,1440);
      setAddEndTime(minToTime(endMin));
    }else{
      // Default to current time nearest 15min, 1hr duration
      const snapped=getNearestQuarter();
      setAddStartTime(minToTime(snapped));
      setAddEndTime(minToTime(Math.min(snapped+60,1440)));
    }
  };

  useEffect(()=>{
    const h=e=>{
      if(addingDate&&containerRef.current&&!containerRef.current.contains(e.target)){
        cancelAdding();
      }
    };
    if(addingDate){
      document.addEventListener('mousedown',h);
      return()=>document.removeEventListener('mousedown',h);
    }
  },[addingDate]);

  if(calMode==='month'){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const fd=new Date(y,m,1);
    const ld=new Date(y,m+1,0);
    const startD=new Date(fd);startD.setDate(startD.getDate()-fd.getDay());
    const endD=new Date(ld);endD.setDate(endD.getDate()+(6-ld.getDay()));

    const cells=[];
    let d=new Date(startD);
    while(d<=endD){
      cells.push(new Date(d));
      d.setDate(d.getDate()+1);
    }

    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',overflow:'hidden'}}>
        {/* Main calendar */}
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 24px',overflow:'hidden'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
              <button onClick={goToday} style={{border:'1px solid #333333',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
              <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
              <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{MONTH_NAMES[m]} {y}</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
              <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
              <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
            </div>
          </div>

          {/* Category filter pills */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:12,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                }}>{name}</button>
            ))}
          </div>

          {/* Calendar grid */}
          <div style={{flex:1,display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,overflow:'auto'}}>
            {/* Day headers */}
            {DAY_NAMES.map(dn=>(
              <div key={dn} style={{fontSize:11,fontWeight:600,color:'#444',textAlign:'center',padding:'8px 0',borderBottom:'1px solid #2a2a2a'}}>
                {dn}
              </div>
            ))}

            {/* Cells */}
            {cells.map((cellDate,idx)=>{
              const cellDateStr=cellDate.toLocaleDateString('en-CA');
              const isToday=cellDateStr===todayStr;
              const isCurrentMonth=cellDate.getMonth()===m;
              const cellTasks=tasksByDate[cellDateStr]||[];

              return(
                <div key={idx} style={{
                  minHeight:100,padding:8,borderRadius:8,
                  background:isCurrentMonth?'#242424':'#1a1a1a',
                  border:isToday?'2px solid #4a9eff':'1px solid #333333',
                  opacity:isCurrentMonth?1:0.4,
                  cursor:'pointer',
                  display:'flex',flexDirection:'column',
                  position:'relative',overflow:'hidden',
                }}
                onClick={()=>{setCurrentDate(new Date(cellDate));setCalMode('day');}}>
                  <div style={{fontSize:isToday?13:11,fontWeight:isToday?600:400,color:isToday?'#4a9eff':'#666',marginBottom:4}}>
                    {cellDate.getDate()}
                  </div>

                  <div style={{display:'flex',flexDirection:'column',gap:2,flex:1}}>
                    {cellTasks.slice(0,3).map(task=>{
                      const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                      return(
                        <div key={task.id} onClick={e=>{e.stopPropagation();setCurrentDate(new Date(cellDate));setCalMode('day');}}
                          style={{
                            fontSize:10,padding:'2px 6px',borderRadius:3,borderLeft:'3px solid '+(task.eventColor||s.color),
                            background:task.eventColor?(task.eventColor+'22'):(task.category&&categories[task.category]?categories[task.category].bg+'22':'#2e2e2e'),
                            color:'#9aa',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                            fontWeight:500,
                          }}>
                          {task.title}
                        </div>
                      );
                    })}
                    {cellTasks.length>3&&<div style={{fontSize:9,color:'#555',padding:'2px 6px'}}>+{cellTasks.length-3} more</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }else if(calMode==='week'){
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const d=currentDate.getDate();
    const dayOfWeek=currentDate.getDay();
    const startDate=new Date(y,m,d-dayOfWeek);
    const endDate=new Date(startDate);endDate.setDate(endDate.getDate()+6);

    const weekDates=[];
    for(let i=0;i<7;i++){
      const d=new Date(startDate);d.setDate(d.getDate()+i);
      weekDates.push(d);
    }

    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',overflow:'hidden'}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 24px',overflow:'hidden'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
              <button onClick={goToday} style={{border:'1px solid #333333',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
              <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
              <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{MONTH_NAMES[startDate.getMonth()]} {startDate.getDate()} - {MONTH_NAMES[endDate.getMonth()]} {endDate.getDate()}</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
              <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
              <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
            </div>
          </div>

          {/* Category filter */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
            {Object.entries(categories).map(([name,cfg])=>(
              <button key={name} onClick={()=>setCatFilter(catFilter===name?null:name)}
                style={{
                  border:catFilter===name?'2px solid #fff':'1px solid transparent',
                  borderRadius:5,padding:'4px 12px',fontSize:12,cursor:'pointer',
                  background:cfg.bg,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
                  color:cfg.text||'#222',transition:'all 0.15s',
                  opacity:catFilter===name?1:(catFilter?0.35:0.7),
                }}>{name}</button>
            ))}
          </div>

          {/* Week timeline grid — fits to screen */}
          <div ref={weekBodyRef} style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {/* Day headers — grid aligned with body */}
            <div style={{display:'flex',borderBottom:'1px solid #2a2a2a',flexShrink:0}}>
              <div style={{width:42,flexShrink:0}}/>
              {weekDates.map((weekDate,idx)=>{
                const weekDateStr=weekDate.toLocaleDateString('en-CA');
                const isToday=weekDateStr===todayStr;
                return(
                  <div key={idx} style={{flex:1,textAlign:'center',padding:'6px 2px',borderLeft:'1px solid #2a2a2a',position:'relative'}}>
                    {isToday?(
                      <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',background:'rgba(74,158,255,0.12)',borderRadius:8,padding:'2px 8px'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'#4a9eff'}}>{DAY_NAMES[weekDate.getDay()]}</div>
                        <div style={{fontSize:13,fontWeight:700,color:'#4a9eff'}}>{weekDate.getDate()}</div>
                      </div>
                    ):(
                      <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',padding:'2px 8px'}}>
                        <div style={{fontSize:10,fontWeight:600,color:'#444'}}>{DAY_NAMES[weekDate.getDay()]}</div>
                        <div style={{fontSize:12,fontWeight:400,color:'#d0d4e0'}}>{weekDate.getDate()}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* All-day events row */}
            {(()=>{
              const hasAllDay=weekDates.some(wd=>(tasksByDate[wd.toLocaleDateString('en-CA')]||[]).some(t=>!t.startTime&&!t.endTime));
              if(!hasAllDay)return null;
              return(
                <div style={{display:'flex',borderBottom:'1px solid #2a2a2a',flexShrink:0}}>
                  <div style={{width:42,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:9,color:'#444',fontFamily:"'JetBrains Mono',monospace"}}>all</span>
                  </div>
                  {weekDates.map((weekDate,idx)=>{
                    const ds=weekDate.toLocaleDateString('en-CA');
                    const allDay=(tasksByDate[ds]||[]).filter(t=>!t.startTime&&!t.endTime);
                    return(
                      <div key={idx} style={{flex:1,borderLeft:'1px solid #2a2a2a',padding:'3px 2px',display:'flex',flexDirection:'column',gap:2}}>
                        {allDay.map(task=>{
                          const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                          return(
                            <div key={task.id} onClick={()=>onSelectTask(task.id)}
                              style={{fontSize:9,padding:'2px 4px',borderRadius:3,borderLeft:'2px solid '+(task.eventColor||s.color),
                                background:task.eventColor?(task.eventColor+'22'):'#2e2e2e',
                                color:'#9aa',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                              {task.title}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* Early morning collapsed bar */}
            {!earlyExpanded&&(
              <div style={{display:'flex',flexShrink:0,borderBottom:'1px solid #2a2a2a',cursor:'pointer',background:'#1e1e1e'}} onClick={()=>setEarlyExpanded(true)}>
                <div style={{width:42,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#161616',borderRight:'1px solid #2a2a2a'}}>
                  <span style={{fontSize:9,color:'#606060',fontFamily:"'JetBrains Mono',monospace"}}>▼</span>
                </div>
                <div style={{flex:1,display:'flex',alignItems:'center',padding:'4px 8px',gap:6}}>
                  <span style={{fontSize:9,color:'#555',fontFamily:"'JetBrains Mono',monospace"}}>00:00 – 0{EARLY_HOUR}:00</span>
                  <span style={{fontSize:9,color:'#444'}}>expand</span>
                </div>
              </div>
            )}

            {/* Timeline body — fits remaining height */}
            <div style={{flex:1,display:'flex',overflow:'hidden'}}>
              {/* Time gutter */}
              <div style={{width:42,flexShrink:0,background:'#161616',borderRight:'1px solid #2a2a2a',overflow:'hidden',position:'relative'}}>
                <div style={{position:'relative',height:'100%'}}>
                  {Array.from({length:earlyExpanded?24:(24-EARLY_HOUR)}).map((_,i)=>{
                    const h=earlyExpanded?i:i+EARLY_HOUR;
                    return(
                      <div key={h} style={{position:'absolute',top:((earlyExpanded?h:(h-EARLY_HOUR))/(earlyExpanded?24:(24-EARLY_HOUR))*100)+'%',left:0,right:0,height:(100/(earlyExpanded?24:(24-EARLY_HOUR)))+'%',borderBottom:'1px solid #2a2a2a',padding:'2px 3px',textAlign:'right'}}>
                        <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:'#606060'}}>
                          {String(h).padStart(2,'0')}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Day columns */}
              {weekDates.map((weekDate,idx)=>{
                const weekDateStr=weekDate.toLocaleDateString('en-CA');
                const isToday=weekDateStr===todayStr;
                const wkDayTasks=(tasksByDate[weekDateStr]||[]).filter(t=>t.startTime);
                const startH=earlyExpanded?0:EARLY_HOUR;
                const totalH=earlyExpanded?24:(24-EARLY_HOUR);
                const minToPct=min=>((min-startH*60)/(totalH*60))*100;

                return(
                  <div key={idx} style={{flex:1,position:'relative',borderLeft:'1px solid #2a2a2a',
                    background:isToday?'rgba(74,158,255,0.03)':'transparent'}}
                    onClick={e=>{
                      if(addingDate===weekDateStr)return;
                      if(e.target!==e.currentTarget&&!e.target.dataset.weekgridline)return;
                      const rect=e.currentTarget.getBoundingClientRect();
                      const pct=(e.clientY-rect.top)/rect.height;
                      const clickMin=Math.round((startH*60+pct*totalH*60)/15)*15;
                      startAdding(weekDateStr,minToTime(Math.max(0,Math.min(1425,clickMin))));
                    }}>
                    {/* Hour gridlines */}
                    {Array.from({length:totalH}).map((_,i)=>{
                      const h=startH+i;
                      return(
                        <div key={h} data-weekgridline="true" style={{position:'absolute',top:(i/totalH*100)+'%',left:0,right:0,height:(100/totalH)+'%',borderBottom:'1px solid rgba(30,36,56,0.3)'}}/>
                      );
                    })}

                    {/* Current time indicator */}
                    {isToday&&(()=>{
                      const nowMin=new Date().getHours()*60+new Date().getMinutes();
                      if(!earlyExpanded&&nowMin<EARLY_MINS)return null;
                      return <div style={{position:'absolute',top:minToPct(nowMin)+'%',left:0,right:0,height:'2px',background:'#ff6b6b',zIndex:10}}/>;
                    })()}

                    {/* Timed events — percentage positioned */}
                    {wkDayTasks.map(task=>{
                      const[sh,sm]=task.startTime.split(':').map(Number);
                      const[eh,em]=(task.endTime||task.startTime).split(':').map(Number);
                      const sMin=sh*60+sm;
                      const eMin=eh*60+em;
                      const dur=Math.max(eMin-sMin,15);
                      if(!earlyExpanded&&eMin<=EARLY_MINS)return null;
                      const topPct=Math.max(0,minToPct(sMin));
                      const hPct=(dur/(totalH*60))*100;
                      const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                      const catCfg=task.category&&categories[task.category];
                      return(
                        <div key={task.id} onClick={e=>{e.stopPropagation();onSelectTask(task.id);}}
                          style={{
                            position:'absolute',top:topPct+'%',left:2,right:2,height:hPct+'%',minHeight:16,
                            background:task.eventColor?(task.eventColor+'33'):(catCfg?(catCfg.bg+'33'):'rgba(100,150,200,0.15)'),
                            border:'1px solid '+(selId===task.id?'#4a9eff':(task.eventColor?(task.eventColor+'44'):(s.color+'44'))),
                            borderRadius:3,padding:'1px 3px',cursor:'pointer',
                            overflow:'hidden',zIndex:5,
                            display:'flex',flexDirection:'column',
                          }}>
                          <div style={{fontSize:9,fontWeight:600,color:'#d0d4e0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                            {task.title}
                          </div>
                          {hPct>4&&<div style={{fontSize:7,color:'#8a9bb8'}}>
                            {task.startTime}{task.endTime?'-'+task.endTime:''}
                          </div>}
                        </div>
                      );
                    })}

                    {/* Add task form */}
                    {addingDate===weekDateStr&&(
                      <div onClick={e=>e.stopPropagation()} style={{position:'absolute',top:Math.min(minToPct(addStartTime?parseInt(addStartTime.split(':')[0])*60+parseInt(addStartTime.split(':')[1]):EARLY_MINS),85)+'%',left:2,right:2,background:'#242424',border:'1px solid #4a9eff',borderRadius:4,padding:'6px',zIndex:20}}>
                        <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAddTask(weekDateStr);if(e.key==='Escape')cancelAdding();}}
                          placeholder="New task..." autoFocus
                          style={{border:'none',outline:'none',background:'transparent',width:'100%',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:11,marginBottom:4}}/>
                        <div style={{display:'flex',gap:3}}>
                          <button onClick={e=>{e.stopPropagation();handleAddTask(weekDateStr);}} style={{flex:1,border:'none',borderRadius:3,padding:'3px',background:'#4a9eff',color:'#fff',fontSize:9,cursor:'pointer',fontWeight:600}}>Add</button>
                          <button onClick={e=>{e.stopPropagation();cancelAdding();}} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'3px',background:'transparent',color:'#666',fontSize:9,cursor:'pointer'}}>Cancel</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Collapse button when expanded */}
            {earlyExpanded&&(
              <div style={{flexShrink:0,borderTop:'1px solid #2a2a2a',cursor:'pointer',background:'#1e1e1e',display:'flex',alignItems:'center',padding:'3px 8px',gap:6}} onClick={()=>setEarlyExpanded(false)}>
                <span style={{fontSize:9,color:'#606060',fontFamily:"'JetBrains Mono',monospace"}}>▲</span>
                <span style={{fontSize:9,color:'#555',fontFamily:"'JetBrains Mono',monospace"}}>collapse early morning</span>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }else{
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    const d=currentDate.getDate();
    const today=new Date();
    const todayStr=today.toLocaleDateString('en-CA');
    const currentDateStr=new Date(y,m,d).toLocaleDateString('en-CA');

    const dayTasks=tasksByDate[currentDateStr]||[];
    const allDayTasks=dayTasks.filter(t=>!t.startTime&&!t.endTime);
    const timedTasks=dayTasks.filter(t=>t.startTime||t.endTime);

    const now=new Date();
    const currentHour=now.getHours()+now.getMinutes()/60;
    const timelineTopPx=currentHour*60;

    const dayOffset=earlyExpanded?0:EARLY_MINS;

    const renderTaskBlock=(task,idx)=>{
      if(!task.startTime)return null;
      const[sh,sm]=task.startTime.split(':').map(Number);
      const[eh,em]=(task.endTime||task.startTime).split(':').map(Number);
      const startMin=sh*60+sm;
      const endMin=eh*60+em;
      const duration=Math.max(endMin-startMin,30);
      const top=startMin-dayOffset;
      const height=duration;
      const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
      const catCfg=task.category&&categories[task.category];
      const isDragging=dragState&&dragState.taskId===task.id;

      const handleMoveStart=e=>{
        e.stopPropagation();e.preventDefault();
        didDragRef.current=false;
        const tl=timelineRef.current;if(!tl)return;
        const rect=tl.getBoundingClientRect();
        const mouseMin=e.clientY-rect.top+tl.scrollTop+(earlyExpanded?0:EARLY_MINS);
        setDragState({type:'move',taskId:task.id,startY:mouseMin,origStartMin:startMin,origEndMin:endMin});
      };
      const handleResizeStart=e=>{
        e.stopPropagation();e.preventDefault();
        const tl=timelineRef.current;if(!tl)return;
        const rect=tl.getBoundingClientRect();
        const mouseMin=e.clientY-rect.top+tl.scrollTop+(earlyExpanded?0:EARLY_MINS);
        setDragState({type:'resize',taskId:task.id,startY:mouseMin,origStartMin:startMin,origEndMin:endMin});
      };

      const isEditing=editingTaskId===task.id;
      const startEdit=()=>{
        setEditingTaskId(task.id);
        setEditTitle(task.title);
        setEditStart(task.startTime||'');
        setEditEnd(task.endTime||'');
      };
      const saveEdit=()=>{
        onUpdateTask({...task,title:editTitle.trim()||task.title,startTime:editStart||task.startTime,endTime:editEnd||task.endTime});
        setEditingTaskId(null);
      };
      const cancelEdit=()=>setEditingTaskId(null);

      return(
        <div key={task.id} data-taskblock="true" onMouseDown={isEditing?undefined:handleMoveStart}
          onClick={e=>{e.stopPropagation();if(!didDragRef.current&&!isEditing)onSelectTask(task.id);}}
          onDoubleClick={e=>{e.stopPropagation();}}
          style={{
            position:'absolute',top:top+'px',left:'4px',right:'4px',height:height+'px',
            background:task.eventColor?(task.eventColor+'33'):(catCfg?(catCfg.bg+'33'):'rgba(100,150,200,0.15)'),
            border:'1px solid '+(selId===task.id?'#4a9eff':(task.eventColor?(task.eventColor+'66'):(s.color+'66'))),
            borderRadius:6,padding:'8px 10px',cursor:isEditing?'default':(isDragging?'grabbing':'grab'),
            display:'flex',flexDirection:'column',gap:4,overflow:'visible',
            transition:isDragging?'none':'all 0.15s',
            zIndex:isEditing?20:(isDragging?15:5),
            opacity:isDragging?0.85:1,
            userSelect:'none',
          }}>
          {isEditing?(
            <div style={{display:'flex',flexDirection:'column',gap:4}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
              <input value={editTitle} onChange={e=>setEditTitle(e.target.value)} autoFocus
                onKeyDown={e=>{if(e.key==='Enter')saveEdit();if(e.key==='Escape')cancelEdit();}}
                style={{border:'1px solid #4a9eff',borderRadius:4,padding:'3px 6px',fontSize:12,background:'#1a1a1a',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none',width:'100%'}}/>
              <div style={{display:'flex',gap:4,alignItems:'center'}}>
                <input type="time" value={editStart} onChange={e=>setEditStart(e.target.value)}
                  style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#1a1a1a',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
                <span style={{fontSize:9,color:'#606060'}}>→</span>
                <input type="time" value={editEnd} onChange={e=>setEditEnd(e.target.value)}
                  style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'2px 4px',fontSize:10,background:'#1a1a1a',color:'#d0d4e0',fontFamily:"'JetBrains Mono',monospace",outline:'none'}}/>
              </div>
              <div style={{display:'flex',gap:3}}>
                <button onClick={saveEdit} style={{flex:1,border:'none',borderRadius:3,padding:'3px',background:'#4a9eff',color:'#fff',fontSize:10,cursor:'pointer',fontWeight:600}}>Save</button>
                <button onClick={cancelEdit} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'3px',background:'transparent',color:'#666',fontSize:10,cursor:'pointer'}}>Cancel</button>
              </div>
            </div>
          ):(
            <>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span onDoubleClick={e=>{e.stopPropagation();if(!didDragRef.current)startEdit();}}
                  style={{fontSize:15,fontWeight:600,color:'#d0d4e0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'text'}}>
                  {task.title}
                </span>
                <span style={{fontSize:13,color:'#8a9bb8',whiteSpace:'nowrap',flexShrink:0,pointerEvents:'none'}}>
                  {task.startTime}{task.endTime?' - '+task.endTime:''}
                </span>
                <span style={{flex:1}}/>
                <CalendarCatButton task={task} categories={categories} onUpdateTask={onUpdateTask}/>
              </div>
            </>
          )}
          {/* Resize handle */}
          {!isEditing&&<div onMouseDown={handleResizeStart}
            style={{position:'absolute',bottom:0,left:0,right:0,height:8,cursor:'ns-resize',background:'transparent',borderRadius:'0 0 6px 6px'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(74,158,255,0.25)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}/>}
        </div>
      );
    };

    return(
      <div ref={containerRef} style={{display:'flex',height:'100%',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'16px 24px',borderBottom:'1px solid #2a2a2a',display:'flex',alignItems:'center',gap:16,justifyContent:'space-between'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={goPrev} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>‹</button>
            <button onClick={goToday} style={{border:'1px solid #333333',borderRadius:6,padding:'6px 14px',background:'transparent',cursor:'pointer',color:'#4a9eff',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Today</button>
            <button onClick={goNext} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:24,color:'#4a9eff',padding:'0 6px'}}>›</button>
            <span style={{fontSize:16,fontWeight:600,color:'#d0d4e0',minWidth:180}}>{DAY_NAMES_FULL[new Date(y,m,d).getDay()]}, {MONTH_NAMES[m]} {d}</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setCalMode('day')} style={{border:calMode==='day'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='day'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='day'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Day</button>
            <button onClick={()=>setCalMode('week')} style={{border:calMode==='week'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='week'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='week'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Week</button>
            <button onClick={()=>setCalMode('month')} style={{border:calMode==='month'?'1.5px solid #4a9eff':'1px solid #333333',borderRadius:6,padding:'6px 14px',background:calMode==='month'?'rgba(74,158,255,0.08)':'transparent',cursor:'pointer',color:calMode==='month'?'#4a9eff':'#666',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Month</button>
          </div>
        </div>

        {/* All-day section */}
        {allDayTasks.length>0&&(
          <div style={{padding:'12px 24px',borderBottom:'1px solid #2a2a2a',background:'#161616'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#4a4a4a',marginBottom:6}}>All day</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {allDayTasks.map(task=>{
                const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
                const catCfg=task.category&&categories[task.category];
                return(
                  <div key={task.id} onClick={()=>onSelectTask(task.id)}
                    style={{
                      fontSize:12,padding:'6px 10px',borderRadius:4,borderLeft:'3px solid '+s.color,
                      background:catCfg?catCfg.bg+'22':'#2e2e2e',
                      color:'#9aa',cursor:'pointer',display:'flex',alignItems:'center',gap:8,
                      border:selId===task.id?'1px solid #4a9eff':'1px solid transparent',
                    }}>
                    <span style={{width:12,height:12,borderRadius:'50%',background:s.color,flexShrink:0}}/>
                    <span style={{flex:1}}>{task.title}</span>
                    <CalendarCatButton task={task} categories={categories} onUpdateTask={onUpdateTask}/>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Early morning collapsed bar */}
        {!earlyExpanded&&(
          <div style={{display:'flex',flexShrink:0,borderBottom:'1px solid #2a2a2a',cursor:'pointer',background:'#1e1e1e'}} onClick={()=>setEarlyExpanded(true)}>
            <div style={{width:60,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#161616',borderRight:'1px solid #2a2a2a'}}>
              <span style={{fontSize:10,color:'#606060',fontFamily:"'JetBrains Mono',monospace"}}>▼</span>
            </div>
            <div style={{flex:1,display:'flex',alignItems:'center',padding:'6px 12px',gap:8}}>
              <span style={{fontSize:11,color:'#555',fontFamily:"'JetBrains Mono',monospace"}}>00:00 – 0{EARLY_HOUR}:00</span>
              <span style={{fontSize:10,color:'#444'}}>expand</span>
              {/* Show current time indicator if it falls in early morning */}
              {currentDateStr===todayStr&&timelineTopPx<EARLY_MINS&&(
                <span style={{fontSize:10,color:'#ff6b6b',fontFamily:"'JetBrains Mono',monospace",marginLeft:'auto'}}>● {minToTime(Math.round(timelineTopPx))}</span>
              )}
            </div>
          </div>
        )}

        {/* Timeline */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {/* Time gutter */}
          <div ref={gutterRef} onScroll={()=>syncScroll('gutter')} style={{width:60,flexShrink:0,background:'#161616',borderRight:'1px solid #2a2a2a',overflow:'auto',scrollbarWidth:'none',msOverflowStyle:'none'}}>
            <div style={{position:'relative',height:(earlyExpanded?24:(24-EARLY_HOUR))*60}}>
              {Array.from({length:earlyExpanded?24:(24-EARLY_HOUR)}).map((_,i)=>{
                const h=earlyExpanded?i:i+EARLY_HOUR;
                return(
                  <div key={h} style={{position:'absolute',top:(earlyExpanded?h:(h-EARLY_HOUR))*60+'px',left:0,right:0,height:60,borderBottom:'1px solid #2a2a2a',padding:'4px 4px',textAlign:'right'}}>
                    <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:'#606060'}}>
                      {String(h).padStart(2,'0')}:00
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Timeline area */}
          <div ref={timelineRef} onScroll={()=>syncScroll('timeline')} style={{flex:1,position:'relative',overflow:'auto',background:'#1a1a1a'}}>
            <div style={{position:'relative',height:(earlyExpanded?24:(24-EARLY_HOUR))*60}} onClick={e=>{
              if(addingDate===currentDateStr||dragState)return;
              if(didDragRef.current)return;
              if(e.target.closest('[data-taskblock]'))return;
              const rect=e.currentTarget.getBoundingClientRect();
              const scrollTop=timelineRef.current?timelineRef.current.scrollTop:0;
              const rawMin=e.clientY-rect.top+scrollTop;
              const clickMin=(earlyExpanded?0:EARLY_MINS)+rawMin;
              const snapped=Math.round(clickMin/15)*15;
              startAdding(currentDateStr,minToTime(Math.max(0,Math.min(1425,snapped))));
            }}>
              {/* Hour gridlines */}
              {Array.from({length:earlyExpanded?24:(24-EARLY_HOUR)}).map((_,i)=>{
                const h=earlyExpanded?i:i+EARLY_HOUR;
                return(
                  <div key={h} data-gridline="true" style={{position:'absolute',top:(earlyExpanded?h:(h-EARLY_HOUR))*60+'px',left:0,right:0,height:60,borderBottom:'1px solid rgba(30,36,56,0.5)'}}/>
                );
              })}

              {/* Current time indicator */}
              {currentDateStr===todayStr&&(()=>{
                const indicatorMin=timelineTopPx;
                if(!earlyExpanded&&indicatorMin<EARLY_MINS)return null;
                const top=(earlyExpanded?indicatorMin:(indicatorMin-EARLY_MINS));
                return(
                  <div style={{position:'absolute',top:top+'px',left:0,right:0,height:'2px',background:'#ff6b6b',zIndex:10}}>
                    <div style={{position:'absolute',left:'-6px',top:'-4px',width:8,height:8,background:'#ff6b6b',borderRadius:'50%'}}/>
                  </div>
                );
              })()}

              {/* Task blocks */}
              {timedTasks.map((task,idx)=>{
                if(!task.startTime)return null;
                const[sh,sm]=task.startTime.split(':').map(Number);
                const taskStartMin=sh*60+sm;
                if(!earlyExpanded&&taskStartMin<EARLY_MINS){
                  // Task is entirely in early morning — show in collapsed bar? For now skip
                  const[eh,em]=(task.endTime||task.startTime).split(':').map(Number);
                  if(eh*60+em<=EARLY_MINS)return null;
                }
                return renderTaskBlock(task,idx);
              })}

              {/* Add task form */}
              {addingDate===currentDateStr&&(
                <div onClick={e=>e.stopPropagation()} style={{position:'absolute',top:Math.min(((addStartTime?parseInt(addStartTime.split(':')[0])*60+parseInt(addStartTime.split(':')[1]):EARLY_MINS)-(earlyExpanded?0:EARLY_MINS)),((earlyExpanded?24:(24-EARLY_HOUR))*60-100))+'px',left:'16px',right:'16px',background:'#242424',border:'1px solid #4a9eff',borderRadius:6,padding:'12px',zIndex:20}}>
                  <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAddTask(currentDateStr);if(e.key==='Escape')cancelAdding();}}
                    placeholder="New task..." autoFocus
                    style={{border:'none',outline:'none',background:'transparent',width:'100%',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,marginBottom:8}}/>
                  <div style={{fontSize:11,color:'#606060',fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>
                    {addStartTime}{addEndTime?' → '+addEndTime:''} <span style={{color:'#4a4a4a'}}>(drag to adjust)</span>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={e=>{e.stopPropagation();handleAddTask(currentDateStr);}} style={{flex:1,border:'none',borderRadius:3,padding:'6px',background:'#4a9eff',color:'#fff',fontSize:11,cursor:'pointer',fontWeight:600}}>Add</button>
                    <button onClick={e=>{e.stopPropagation();cancelAdding();}} style={{flex:1,border:'1px solid #333',borderRadius:3,padding:'6px',background:'transparent',color:'#666',fontSize:11,cursor:'pointer'}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Collapse early morning toggle */}
        {earlyExpanded&&(
          <div style={{flexShrink:0,borderTop:'1px solid #2a2a2a',cursor:'pointer',background:'#1e1e1e',display:'flex',alignItems:'center',padding:'4px 12px',gap:8}} onClick={()=>setEarlyExpanded(false)}>
            <span style={{fontSize:10,color:'#606060',fontFamily:"'JetBrains Mono',monospace"}}>▲</span>
            <span style={{fontSize:10,color:'#555',fontFamily:"'JetBrains Mono',monospace"}}>collapse early morning</span>
          </div>)}
      </div>
    );
  }
}

/* ── Kbd helper ── */
function K({children}){
  return <kbd style={{display:'inline-block',padding:'1px 5px',border:'1px solid #333333',borderRadius:3,fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginRight:3,background:'#2a2a2a',color:'#606060'}}>{children}</kbd>;
}

/* ══════════════════════════════════════════
   ── Main App ──
   ══════════════════════════════════════════ */
function TaskFlow({ session, onSignOut }){
  const[tasks,setTasks]=useState(()=>loadLS(TASK_KEY,[]));
  const[categories,setCategories]=useState(()=>loadLS(CAT_KEY,DEFAULT_CATEGORIES));
  const[cloudStatus,setCloudStatus]=useState(session?'syncing':'offline'); // 'synced'|'syncing'|'offline'|'error'
  const[view,setView]=useState('active');
  const[selId,setSelId]=useState(null);
  const[input,setInput]=useState('');
  const[search,setSearch]=useState('');
  const[catFilter,setCatFilter]=useState(null);
  const[dragIdx,setDragIdx]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const[showCatMgr,setShowCatMgr]=useState(false);
  const[showImportExport,setShowImportExport]=useState(false);
  const[showMmImportExport,setShowMmImportExport]=useState(false);
  const[claudePromptData,setClaudePromptData]=useState(null);
  const[defaultEventColor,setDefaultEventColor]=useState('#4a9eff');
  const[mainTab,setMainTabRaw]=useState(()=>loadLS('taskflow-mainTab')||'tasks');
  const setMainTab=useCallback(t=>{setMainTabRaw(t);saveLS('taskflow-mainTab',t);if(session)debouncedSaveSB('taskflow-mainTab',t);},[session]);
  const[calMode,setCalMode]=useState('month');
  const[calDate,setCalDate]=useState(()=>new Date());
  const[recDropOpen,setRecDropOpen]=useState(false);
  const inputRef=useRef(null);

  // Mindmap state — lifted here so sidebar can access projects/tree
  const mm=useMindmap(session);
  const[mmSidebarExpanded,setMmSidebarExpanded]=useState(()=>new Set(mm.rootId?[mm.rootId]:[]));
  const[addingProject,setAddingProject]=useState(false);
  const[renamingProjectId,setRenamingProjectId]=useState(null);
  const[renameProjectName,setRenameProjectName]=useState('');
  const[newProjectName,setNewProjectName]=useState('');
  // Keep root expanded when it changes
  useEffect(()=>{if(mm.rootId)setMmSidebarExpanded(prev=>{if(prev.has(mm.rootId))return prev;const n=new Set(prev);n.add(mm.rootId);return n;});},[mm.rootId]);
  const mmExpandAll=useCallback(()=>setMmSidebarExpanded(new Set(mm.nodes.map(n=>n.id))),[mm.nodes]);
  const mmCollapseAll=useCallback(()=>setMmSidebarExpanded(new Set(mm.rootId?[mm.rootId]:[])),[mm.rootId]);
  const mmToggleSidebarExpand=useCallback(id=>{setMmSidebarExpanded(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n;});},[]);

  const handleImport=useCallback((importedTasks,importedCats,mode)=>{
    const normalized=importedTasks.map(t=>({
      ...t,
      parentId:t.parentId??null,
      collapsed:t.collapsed??false,
      activeVisible:t.activeVisible??(t.status===''||t.status==='u'?true:false),
      eventColor:t.eventColor??null,
    }));
    if(mode==='replace'){
      setTasks(normalized);
      if(importedCats)setCategories(importedCats);
    }else{
      setTasks(prev=>[...prev,...normalized]);
      if(importedCats)setCategories(prev=>({...prev,...importedCats}));
    }
  },[]);

  // Auto-return & due-date processing on mount, also add parentId and collapsed fields if missing
  useEffect(()=>{
    const tasksWithDefaults=tasks.map(t=>({...t,parentId:t.parentId??null,collapsed:t.collapsed??false,activeVisible:t.activeVisible??(t.status===''||t.status==='u'?true:false)}));
    const{tasks:p1,changed:c1}=processAutoReturns(tasksWithDefaults);
    const{tasks:p2,changed:c2}=processDueDates(p1);
    if(c1||c2){setTasks(p2);saveLS(TASK_KEY,p2);}
  },[]);

  // ── Supabase: initial sync on mount ──
  const sbSyncedRef = useRef(false);
  useEffect(() => {
    if (!session || sbSyncedRef.current) return;
    sbSyncedRef.current = true;
    setCloudStatus('syncing');
    (async () => {
      try {
        // Load tasks from Supabase
        const sbTasks = await loadSB(TASK_KEY);
        if (sbTasks && Array.isArray(sbTasks) && sbTasks.length > 0) {
          setTasks(sbTasks);
        } else if (tasks.length > 0) {
          // First-time migration: push localStorage tasks to Supabase
          await saveSB(TASK_KEY, tasks);
        }

        // Load categories
        const sbCats = await loadSB(CAT_KEY);
        if (sbCats && typeof sbCats === 'object' && Object.keys(sbCats).length > 0) {
          setCategories(sbCats);
        } else {
          await saveSB(CAT_KEY, categories);
        }

        // Load mainTab
        const sbTab = await loadSB('taskflow-mainTab');
        if (sbTab) { setMainTabRaw(sbTab); saveLS('taskflow-mainTab', sbTab); }

        // Load mindmap projects
        const sbProjects = await loadSB(MM_PROJECTS_KEY);
        if (sbProjects && Array.isArray(sbProjects) && sbProjects.length > 0) {
          saveLS(MM_PROJECTS_KEY, sbProjects);
          // Also load nodes for each project
          for (const p of sbProjects) {
            const sbNodes = await loadSB(MM_DATA_PREFIX + p.id);
            if (sbNodes) saveLS(MM_DATA_PREFIX + p.id, sbNodes);
          }
          // Reload mindmap from updated localStorage
          window.__sbMindmapSynced = true;
          mm.switchProject(sbProjects[0].id);
        } else {
          // Migrate mindmap to Supabase
          const localProjects = loadLS(MM_PROJECTS_KEY, []);
          if (localProjects.length > 0) {
            await saveSB(MM_PROJECTS_KEY, localProjects);
            for (const p of localProjects) {
              const localNodes = loadLS(MM_DATA_PREFIX + p.id, []);
              if (localNodes.length > 0) await saveSB(MM_DATA_PREFIX + p.id, localNodes);
            }
          }
        }

        setCloudStatus('synced');
      } catch (e) {
        console.error('[SB] Initial sync failed:', e);
        setCloudStatus('error');
      }
    })();
  }, [session]);

  // Persist — localStorage always, Supabase when connected
  useEffect(()=>{saveLS(TASK_KEY,tasks); if(session) debouncedSaveSB(TASK_KEY, tasks);},[tasks]);
  useEffect(()=>{saveLS(CAT_KEY,categories); if(session) debouncedSaveSB(CAT_KEY, categories);},[categories]);

  // Periodic auto-return check
  useEffect(()=>{
    const iv=setInterval(()=>{
      setTasks(prev=>{
        const{tasks:p1,changed:c1}=processAutoReturns(prev);
        const{tasks:p2,changed:c2}=processDueDates(p1);
        return(c1||c2)?p2:prev;
      });
    },60000);
    return()=>clearInterval(iv);
  },[]);

  const catShortcuts=useMemo(()=>{
    const m={};Object.keys(categories).forEach(n=>{m[n[0].toLowerCase()]=n;});return m;
  },[categories]);

  /* ── Status change: tasks stay in Active view (activeVisible) until manually cleared ── */
  const changeStatus=useCallback((taskId,newStatus)=>{
    if(newStatus&&newStatus!==''){
      setTasks(prev=>prev.map(t=>{
        if(t.id!==taskId)return t;
        const upd={...t,status:newStatus,statusChanged:now(),activeVisible:true,
          dateCompleted:newStatus==='x'?now():(newStatus===''?null:t.dateCompleted),
          autoReturn:newStatus==='t'||newStatus==='w'||newStatus==='m'?true:(newStatus==='l'?false:t.autoReturn),
        };
        if(newStatus==='x'&&t.recurrence){
          const clone=cloneRecurringTask(t);
          if(clone){setTimeout(()=>setTasks(p=>{
            const mx=p.reduce((m,tk)=>tk.activeVisible?Math.max(m,tk.order??0):m,0);
            return[...p,{...clone,order:mx+1}];
          }),0);}
        }
        return upd;
      }));
    }else{
      setTasks(prev=>prev.map(t=>{
        if(t.id!==taskId)return t;
        return{...t,status:'',statusChanged:now(),dateCompleted:null,autoReturn:true,activeVisible:true};
      }));
    }
    // Sync to mindmap node if linked
    mm.syncNodeFromTask(taskId, newStatus||'');
  },[mm]);

  const clearChecked=useCallback(()=>{
    setTasks(prev=>prev.map(t=>(t.status!==''&&t.status!=='u'&&t.activeVisible)?{...t,activeVisible:false}:t));
  },[]);

  /* ── Keyboard ── */
  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if(selId&&STATUS_KEYS.has(e.key)){e.preventDefault();changeStatus(selId,e.key);return;}
      if(selId&&e.key==='Backspace'){e.preventDefault();changeStatus(selId,'');return;}
      if(selId&&e.key==='Escape'){e.preventDefault();setSelId(null);return;}
      if(selId&&e.key==='Delete'){e.preventDefault();setTasks(p=>p.filter(t=>t.id!==selId));setSelId(null);return;}
      if(e.key==='/'||(e.key==='n'&&!e.metaKey&&!e.ctrlKey)){e.preventDefault();inputRef.current?.focus();return;}
      if((e.key==='ArrowDown'||e.key==='j')&&!e.metaKey){e.preventDefault();navTask(1);return;}
      if((e.key==='ArrowUp'||e.key==='k')&&!e.metaKey){e.preventDefault();navTask(-1);return;}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  });

  const navTask=dir=>{
    const vis=filtered;if(!vis.length)return;
    const ci=vis.findIndex(t=>t.id===selId);
    const ni=ci<0?0:Math.max(0,Math.min(vis.length-1,ci+dir));
    setSelId(vis[ni].id);
  };

  const addTask=useCallback((title,dueDate=null,startTime=null,endTime=null,parentId=null)=>{
    let t=title.trim(),cat=null;
    const m=t.match(/#([A-Za-z])$/);
    if(m){const s=m[1].toLowerCase();if(catShortcuts[s]){cat=catShortcuts[s];t=t.replace(/#[A-Za-z]$/,'').trim();}}
    if(!t)return;
    const maxOrd=tasks.reduce((mx,tk)=>tk.activeVisible?Math.max(mx,tk.order??0):mx,0);
    setTasks(prev=>[...prev,{id:uuid(),title:t,status:'',order:maxOrd+1,category:cat,importance:null,dateAdded:now(),dateCompleted:null,statusChanged:null,dueDate,notes:'',autoReturn:true,recurrence:null,startTime:startTime||null,endTime:endTime||null,eventColor:dueDate?defaultEventColor:null,parentId:parentId||null,collapsed:false,activeVisible:true}]);
  },[tasks,catShortcuts,defaultEventColor]);

  // Raw task add for mindmap integration (accepts full task object)
  const addTaskRaw=useCallback(task=>{setTasks(prev=>[...prev,task]);},[]);

  const updateTask=useCallback(u=>{setTasks(prev=>prev.map(t=>t.id===u.id?u:t));},[]);

  const toggleCollapse=useCallback(taskId=>{
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,collapsed:!t.collapsed}:t));
  },[]);

  const addSubtask=useCallback((parentId)=>{
    const t='New subtask';
    const cat=null;
    const maxOrd=0;
    setTasks(prev=>[...prev,{id:uuid(),title:t,status:'',order:maxOrd,category:cat,importance:null,dateAdded:now(),dateCompleted:null,statusChanged:null,dueDate:null,notes:'',autoReturn:true,recurrence:null,startTime:null,endTime:null,eventColor:null,parentId:parentId,collapsed:false,activeVisible:true}]);
  },[]);

  /* ── Drag & drop ── */
  const handleDragStart=(e,i)=>{setDragIdx(i);e.dataTransfer.effectAllowed='move';};
  const handleDragOver=e=>{e.preventDefault();};
  const handleDrop=(e,dropIdx)=>{
    e.preventDefault();if(dragIdx===null||dragIdx===dropIdx)return;
    setTasks(prev=>{
      const vis=getVis(prev).map(t=>t.id);const id=vis[dragIdx];if(!id)return prev;
      const r=[...vis];r.splice(dragIdx,1);r.splice(dropIdx,0,id);
      const om={};r.forEach((id,i)=>{om[id]=i;});
      return prev.map(t=>om[t.id]!==undefined?{...t,order:om[t.id]}:t);
    });
    setDragIdx(null);
  };

  /* ── Filtering ── */
  const getVis=taskList=>{
    let f;
    if(view==='active')f=taskList.filter(t=>t.activeVisible);
    else if(view==='all')f=[...taskList];
    else f=taskList.filter(t=>t.status===view);
    if(catFilter)f=f.filter(t=>t.category===catFilter);
    if(search){const q=search.toLowerCase();f=f.filter(t=>t.title.toLowerCase().includes(q)||(t.notes&&t.notes.toLowerCase().includes(q)));}
    // Filter to include only top-level tasks (parentId is null or undefined)
    f=f.filter(t=>!t.parentId);
    if(view==='active')f.sort((a,b)=>{if(a.status==='u'&&b.status!=='u')return-1;if(b.status==='u'&&a.status!=='u')return 1;return(a.order??9999)-(b.order??9999);});
    else f.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
    return f;
  };

  const filtered=useMemo(()=>getVis(tasks),[tasks,view,catFilter,search]);

  // Helper to render task with its subtasks recursively
  const renderTaskWithChildren=(task,idx,depth=0)=>{
    const children=tasks.filter(t=>t.parentId===task.id);
    const hasChildren=children.length>0;
    return(
      <React.Fragment key={task.id}>
        <TaskRow task={task} idx={idx} isSelected={selId===task.id} onSelect={setSelId}
          onUpdate={updateTask} onChangeStatus={changeStatus} onDragStart={handleDragStart} onDragOver={handleDragOver} onDrop={handleDrop}
          showOrder={view==='active'} categories={categories} depth={depth} hasChildren={hasChildren}
          onToggleCollapse={toggleCollapse} onAddSubtask={addSubtask}/>
        {hasChildren&&!task.collapsed&&(
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            {children.map((child,cidx)=>renderTaskWithChildren(child,cidx,depth+1))}
          </div>
        )}
      </React.Fragment>
    );
  };

  const grouped=useMemo(()=>{
    if(view==='active')return null;
    const g={};filtered.forEach(t=>{const k=dateKey(t.dateAdded);if(!g[k])g[k]=[];g[k].push(t);});
    return Object.entries(g).sort(([a],[b])=>b.localeCompare(a));
  },[filtered,view]);

  const counts=useMemo(()=>{
    const c={active:0,t:0,w:0,m:0,l:0,x:0,s:0,all:tasks.length};
    tasks.forEach(t=>{
      if(t.activeVisible)c.active++;
      if(t.status===''||t.status==='u'){/* already counted above */}
      else if(c[t.status]!==undefined)c[t.status]++;
    });
    return c;
  },[tasks]);

  const checkedCount=useMemo(()=>tasks.filter(t=>t.activeVisible&&t.status!==''&&t.status!=='u').length,[tasks]);
  const hasChecked=checkedCount>0;
  const selTask=selId?tasks.find(t=>t.id===selId):null;

  /* ══════════════════════════════════════
     ── Render ──
     ══════════════════════════════════════ */
  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* ── Sidebar ── */}
      <div style={{width:sidebarOpen?260:58,transition:'width 0.2s ease',background:'#161616',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden',borderRight:'1px solid #2a2a2a'}}>

        {/* Logo */}
        <div style={{padding:sidebarOpen?'18px 16px 14px':'18px 10px 14px',display:'flex',alignItems:'center',gap:0,cursor:'pointer',borderBottom:'1px solid #2a2a2a'}}
          onClick={()=>setSidebarOpen(!sidebarOpen)}>
          {sidebarOpen?(
            <span style={{fontWeight:700,fontSize:22,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-0.5,lineHeight:1}}>
              <span style={{background:'linear-gradient(135deg,#e0e4ea,#b0b8c8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Task</span><span style={{background:'linear-gradient(135deg,#4a9eff,#b080e0)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Flow</span>
            </span>
          ):(
            <span style={{fontWeight:700,fontSize:18,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-0.5,display:'flex',alignItems:'center',justifyContent:'center',width:34}}>
              <span style={{background:'linear-gradient(135deg,#e0e4ea,#b0b8c8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>T</span><span style={{background:'linear-gradient(135deg,#4a9eff,#b080e0)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>F</span>
            </span>
          )}
        </div>

        {/* Main/Calendar tab toggle */}
        {sidebarOpen&&<div style={{padding:'12px 12px',display:'flex',gap:6,borderBottom:'1px solid #2a2a2a'}}>
          <button onClick={()=>setMainTab('tasks')}
