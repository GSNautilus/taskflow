const now=()=>new Date().toISOString();
const msNow=()=>Date.now();

  'Band':{bg:'#F4C7C3',text:'#4a1a1a'},

  '':{label:'Active',color:'#8a9bb8',bg:'transparent',rowBg:'transparent',sidebarColor:true},

const VIEWS=[
  {key:'active',label:'Active',icon:'·'},
  {key:'t',label:'Tomorrow',icon:'t'},
  {key:'w',label:'Weekly',icon:'w'},
  {key:'m',label:'Monthly',icon:'m'},

  {key:'x',label:'Done',icon:'x'},
  {key:'s',label:'Skipped',icon:'s'},
  {key:'all',label:'All',icon:'≡'},
];

const RECURRENCE_PRESETS=[
  {key:'daily',label:'Daily',icon:'☀'},
  {key:'weekly',label:'Weekly',icon:'📅'},
  {key:'biweekly',label:'Biweekly',icon:'📆'},
  {key:'monthly',label:'Monthly',icon:'🗓'},
  {key:'custom',label:'Custom...',icon:'⚙'},
];

const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

const STATUS_KEYS=new Set(['x','s','t','w','m','l','u']);
const AUTO_RETURN_MS={t:86400000,w:604800000,m:2592000000};
const DUE_SOON_MS=604800000;
const TASK_KEY='taskflow-tasks';
const CAT_KEY='taskflow-cats';

function loadLS(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}}

function fmt(iso){
  if(!iso)return'';
  return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
}
function fmtDay(iso){return new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function dateKey(iso){return new Date(iso).toLocaleDateString('en-CA');}

/* ── Recurrence helpers ── */
function getNextOccurrence(task){
  if(!task.recurrence||!task.dueDate)return null;
  const rec=task.recurrence;
  const curDate=new Date(task.dueDate);
  let nextDate=new Date(curDate);

  if(rec.type==='daily'){
    nextDate.setDate(nextDate.getDate()+1);
  }else if(rec.type==='weekly'){
    nextDate.setDate(nextDate.getDate()+7);
  }else if(rec.type==='biweekly'){
    nextDate.setDate(nextDate.getDate()+14);
  }else if(rec.type==='monthly'){
    nextDate.setMonth(nextDate.getMonth()+1);
  }else if(rec.type==='custom'&&rec.interval&&rec.unit){
    if(rec.unit==='days')nextDate.setDate(nextDate.getDate()+rec.interval);
    else if(rec.unit==='weeks')nextDate.setDate(nextDate.getDate()+rec.interval*7);
    else if(rec.unit==='months')nextDate.setMonth(nextDate.getMonth()+rec.interval);
  }

  if(rec.endDate&&nextDate.toLocaleDateString('en-CA')>rec.endDate)return null;
  return nextDate.toLocaleDateString('en-CA');
}

function cloneRecurringTask(task){
  const nextDue=getNextOccurrence(task);
  if(!nextDue)return null;
  return{
    ...task,
    id:uuid(),
    status:'',
    dueDate:nextDue,
    statusChanged:null,
    dateCompleted:null,
    dateAdded:now(),
  };
}

function describeRecurrence(rec){
  if(!rec)return'';
  if(rec.type==='daily')return'Every day';
  if(rec.type==='weekly')return'Every week';
  if(rec.type==='biweekly')return'Every 2 weeks';
  if(rec.type==='monthly')return'Every month';
  if(rec.type==='custom'&&rec.interval&&rec.unit){
    const u=rec.unit==='days'?'day':(rec.unit==='weeks'?'week':'month');
    return'Every '+rec.interval+' '+u+(rec.interval>1?'s':'');
  }
  return'';
}

function processAutoReturns(tasks){
  const n=msNow();let changed=false;
  const out=tasks.map(t=>{
    if(t.autoReturn&&t.statusChanged&&AUTO_RETURN_MS[t.status]){
      if(n-new Date(t.statusChanged).getTime()>=AUTO_RETURN_MS[t.status]){
        changed=true;return{...t,status:'',statusChanged:now(),autoReturn:true};
      }
    }
    return t;
  });
  return{tasks:out,changed};
}

function processDueDates(tasks){
  const n=msNow();let changed=false;
  const out=tasks.map(t=>{
    if(t.dueDate&&t.status!==''&&t.status!=='x'&&t.status!=='s'&&t.status!=='u'){
      const diff=new Date(t.dueDate).getTime()-n;
      if(diff<=DUE_SOON_MS&&diff>-86400000*30){changed=true;return{...t,status:'',statusChanged:now()};}
    }
    return t;
  });
  return{tasks:out,changed};
}

/* ── Import/Export Utilities ── */
function parseXlsxDate(val){
  if(!val)return null;
  if(val instanceof Date||typeof val==='number'){
    if(typeof val==='number'){const d=XLSX.SSF.parse_date_code(val);return new Date(d.y,d.m-1,d.d,d.H||0,d.M||0,d.S||0).toISOString();}
    return new Date(val).toISOString();
  }
  const s=String(val).trim();if(!s)return null;
  const d=new Date(s);
  if(!isNaN(d.getTime()))return d.toISOString();
  const cleaned=s.replace(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),\s*/i,'');
  const d2=new Date(cleaned);
  if(!isNaN(d2.getTime()))return d2.toISOString();
  return null;
}

function importFromXlsx(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:null});
        const STATUS_MAP={'x':'x','s':'s'};
        const tasks=[];
        for(const row of rows){
          const title=row['Todo 2026']||row['Todo']||row['Title']||row['title']||row['Task'];
          if(!title||String(title).trim()==='')continue;
          const rawStatus=row['x']||row['Status']||row['status']||'';
          const status=STATUS_MAP[String(rawStatus).trim().toLowerCase()]||'';
          const dateAdded=parseXlsxDate(row['Date Added'])||now();
          const dateCompleted=parseXlsxDate(row['Date Completed'])||null;
          const dueDate=parseXlsxDate(row['Due Date']);
          const dueDateStr=dueDate?dueDate.split('T')[0]:null;
          tasks.push({
            id:uuid(),
            title:String(title).trim(),
            status,
            order:row['Order']!=null?Number(row['Order']):tasks.length,
            category:row['Category']&&String(row['Category']).trim()?String(row['Category']).trim():null,
            importance:row['Importance']!=null?row['Importance']:null,
            dateAdded,
            dateCompleted:status==='x'?dateCompleted||dateAdded:null,
            statusChanged:status?dateCompleted||dateAdded:null,
            dueDate:dueDateStr,
            notes:row['Notes']?String(row['Notes']):'',
            autoReturn:status==='t'||status==='w'||status==='m',
            recurrence:null,
            startTime:null,
            endTime:null,
          });
        }
        resolve(tasks);
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsArrayBuffer(file);
  });
}

function importFromJson(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.tasks&&Array.isArray(data.tasks)){
          resolve({tasks:data.tasks,categories:data.categories||null});
        }else if(Array.isArray(data)){
          resolve({tasks:data,categories:null});
        }else{reject(new Error('Unrecognized JSON format'));}
      }catch(err){reject(err);}
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

function exportToJson(tasks,categories){
  const data=JSON.stringify({version:1,exportedAt:now(),tasks,categories},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='taskflow-export-'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportToXlsx(tasks){
  const rows=tasks.map(t=>({
    'x':t.status||'',
    'Todo 2026':t.title,
    'Order':t.order??'',
    'Category':t.category||'',
    'Importance':t.importance||'',
    'Date Added':t.dateAdded?new Date(t.dateAdded).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}):'',
    'Date Completed':t.dateCompleted?new Date(t.dateCompleted).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}):'',
    'Due Date':t.dueDate||'',
    'Recurrence':describeRecurrence(t.recurrence)||'',
    'Notes':t.notes||'',
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const colWidths=[{wch:4},{wch:45},{wch:6},{wch:14},{wch:12},{wch:42},{wch:42},{wch:12},{wch:20},{wch:30}];
  ws['!cols']=colWidths;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Daily');
  XLSX.writeFile(wb,'taskflow-export-'+new Date().toISOString().split('T')[0]+'.xlsx');
}

/* ── Import/Export Modal ── */
function ImportExportModal({onClose,onImport,onExportJson,onExportXlsx,taskCount}){
  const ref=useRef(null);
  const fileRef=useRef(null);
  const[dragOver,setDragOver]=useState(false);
  const[status,setStatus]=useState(null);
  const[importMode,setImportMode]=useState('merge');

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[onClose]);

  const handleFile=async(file)=>{
    if(!file)return;
    setStatus({type:'loading',msg:'Importing...'});
    try{
      let result;
      if(file.name.endsWith('.json')){
        result=await importFromJson(file);
      }else if(file.name.endsWith('.xlsx')||file.name.endsWith('.xls')){
        const tasks=await importFromXlsx(file);
        result={tasks,categories:null};
      }else{
        setStatus({type:'error',msg:'Unsupported file type. Use .xlsx or .json'});return;
      }
      onImport(result.tasks,result.categories,importMode);
      setStatus({type:'success',msg:'Imported '+result.tasks.length+' tasks!'});
      setTimeout(onClose,1200);
    }catch(err){
      setStatus({type:'error',msg:'Import failed: '+err.message});
    }
  };

  const handleDrop=e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);};

  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
      <div ref={ref} style={{background:'#141822',border:'1px solid #1e2438',borderRadius:14,padding:28,width:460,maxWidth:'90vw',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{fontSize:20,fontWeight:600,color:'#d0d4e0',margin:0}}>Import / Export</h2>
          <button onClick={onClose} style={{border:'none',background:'transparent',color:'#555',fontSize:22,cursor:'pointer',padding:'0 4px'}}
            onMouseEnter={e=>e.currentTarget.style.color='#fff'} onMouseLeave={e=>e.currentTarget.style.color='#555'}>×</button>
        </div>

        {/* Import section */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:14,fontWeight:600,color:'#8a9bb8',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>📥</span> Import Tasks
          </div>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop}
            onClick={()=>fileRef.current?.click()}
            style={{
              border:dragOver?'2px solid #4a9eff':'2px dashed #2a2e3e',
              borderRadius:10,padding:'24px 16px',textAlign:'center',cursor:'pointer',
              background:dragOver?'rgba(74,158,255,0.06)':'#0d1117',
              transition:'all 0.15s',
            }}>
            <div style={{fontSize:28,marginBottom:8}}>{dragOver?'📂':'📄'}</div>
            <div style={{fontSize:14,color:'#6a7090',marginBottom:4}}>Drop a file here or click to browse</div>
            <div style={{fontSize:12,color:'#3a4060',fontFamily:"'JetBrains Mono',monospace"}}>.xlsx or .json</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.json" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>

          {/* Import mode */}
          <div style={{display:'flex',gap:8,marginTop:10}}>
            {[{key:'merge',label:'Merge',desc:'Add to existing tasks'},{key:'replace',label:'Replace',desc:'Clear & replace all tasks'}].map(m=>(
              <button key={m.key} onClick={()=>setImportMode(m.key)}
                style={{
                  flex:1,border:importMode===m.key?'1.5px solid #4a9eff':'1.5px solid #1e2438',
                  borderRadius:8,padding:'8px 12px',cursor:'pointer',
                  background:importMode===m.key?'rgba(74,158,255,0.08)':'#0d1117',
                  textAlign:'left',transition:'all 0.15s',
                }}>
                <div style={{fontSize:13,fontWeight:600,color:importMode===m.key?'#4a9eff':'#6a7090'}}>{m.label}</div>
                <div style={{fontSize:11,color:'#3a4060',marginTop:2}}>{m.desc}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Export section */}
        <div>
          <div style={{fontSize:14,fontWeight:600,color:'#8a9bb8',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>📤</span> Export Tasks
            <span style={{fontSize:12,color:'#3a4060',fontWeight:400,fontFamily:"'JetBrains Mono',monospace"}}>{taskCount} tasks</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={onExportJson}
              style={{flex:1,border:'1.5px solid #1e2438',borderRadius:8,padding:'12px 14px',cursor:'pointer',background:'#0d1117',textAlign:'left',transition:'all 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='#4a9eff'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e2438'}>
              <div style={{fontSize:14,fontWeight:600,color:'#d0d4e0'}}>TaskFlow JSON</div>
              <div style={{fontSize:11,color:'#3a4060',marginTop:3}}>Full data, re-importable into TaskFlow</div>
            </button>
            <button onClick={onExportXlsx}
              style={{flex:1,border:'1.5px solid #1e2438',borderRadius:8,padding:'12px 14px',cursor:'pointer',background:'#0d1117',textAlign:'left',transition:'all 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='#4a9eff'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e2438'}>
              <div style={{fontSize:14,fontWeight:600,color:'#d0d4e0'}}>Excel (.xlsx)</div>
              <div style={{fontSize:11,color:'#3a4060',marginTop:3}}>Spreadsheet format, re-importable</div>
            </button>
          </div>
        </div>

        {/* Status message */}
        {status&&(
          <div style={{marginTop:14,padding:'8px 12px',borderRadius:6,fontSize:13,fontFamily:"'JetBrains Mono',monospace",
            background:status.type==='success'?'rgba(110,207,110,0.1)':(status.type==='error'?'rgba(255,107,107,0.1)':'rgba(74,158,255,0.1)'),
            color:status.type==='success'?'#6ecf6e':(status.type==='error'?'#ff6b6b':'#4a9eff'),
          }}>{status.msg}</div>
        )}
      </div>
    </div>
  );
}

/* ── Recurrence Dropdown ── */
function RecurrenceDropdown({task,onSelect,onClose}){
  const ref=useRef(null);
  const[showCustom,setShowCustom]=useState(task.recurrence?.type==='custom'||false);
  const[customInterval,setCustomInterval]=useState(task.recurrence?.interval||1);
  const[customUnit,setCustomUnit]=useState(task.recurrence?.unit||'days');
  const[endDate,setEndDate]=useState(task.recurrence?.endDate||'');

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[onClose]);

  const handlePreset=preset=>{
    if(preset==='custom'){setShowCustom(true);return;}
    onSelect({type:preset,interval:null,unit:null,endDate:null});
  };

  const handleCustom=()=>{
    onSelect({type:'custom',interval:customInterval,unit:customUnit,endDate:endDate||null});
  };

  return(
    <div ref={ref} style={{position:'absolute',bottom:'100%',right:0,zIndex:200,background:'#1e2230',border:'1px solid #2a2e3e',borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,0.6)',padding:8,minWidth:220,marginBottom:6}}>
      {!showCustom?(
        <>
          {RECURRENCE_PRESETS.map(p=>(
            <button key={p.key} onClick={()=>handlePreset(p.key)}
              style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',background:'transparent',padding:'10px 12px',cursor:'pointer',borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:14,color:'#ccc'}}
              onMouseEnter={e=>e.currentTarget.style.background='#282d3e'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:16}}>{p.icon}</span><span>{p.label}</span>
            </button>
          ))}
          {task.recurrence&&(
            <button onClick={()=>onSelect(null)}
              style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',background:'transparent',padding:'10px 12px',cursor:'pointer',borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:14,color:'#555'}}
              onMouseEnter={e=>e.currentTarget.style.background='#282d3e'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:16}}>✕</span><span>Remove recurrence</span>
            </button>
          )}
        </>
      ):(
        <div style={{padding:'8px 0'}}>
          <div style={{padding:'8px 12px',color:'#888',fontSize:12}}>Every</div>
          <div style={{display:'flex',gap:6,padding:'4px 12px',marginBottom:8}}>
            <input type="number" min="1" value={customInterval} onChange={e=>setCustomInterval(Math.max(1,parseInt(e.target.value)||1))}
              style={{width:50,border:'1px solid #2a2e3e',borderRadius:4,padding:'4px 6px',background:'#0d1117',color:'#d0d4e0',fontSize:12}}/>
            <select value={customUnit} onChange={e=>setCustomUnit(e.target.value)}
              style={{flex:1,border:'1px solid #2a2e3e',borderRadius:4,padding:'4px 6px',background:'#0d1117',color:'#d0d4e0',fontSize:12}}>
              <option value="days">days</option>
              <option value="weeks">weeks</option>
              <option value="months">months</option>
            </select>
          </div>
          <div style={{padding:'8px 12px',color:'#888',fontSize:12}}>Until (optional)</div>
          <div style={{padding:'4px 12px',marginBottom:8}}>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
              style={{width:'100%',border:'1px solid #2a2e3e',borderRadius:4,padding:'4px 6px',background:'#0d1117',color:'#d0d4e0',fontSize:12}}/>
          </div>
          <div style={{display:'flex',gap:6,padding:'8px 12px'}}>
            <button onClick={()=>setShowCustom(false)}
              style={{flex:1,border:'1px solid #1e2438',borderRadius:4,padding:'6px',cursor:'pointer',background:'transparent',color:'#888',fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>Back</button>
            <button onClick={handleCustom}
              style={{flex:1,border:'1px solid #4a9eff',borderRadius:4,padding:'6px',cursor:'pointer',background:'rgba(74,158,255,0.08)',color:'#4a9eff',fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>Set</button>
          </div>
        </div>
      )}

}

/* ── Category Dropdown ── */

/* ── Status Dropdown ── */
function StatusDropdown({onSelect,onClose}){

/* ── Task Row ── */
function TaskRow({task,idx,isSelected,onSelect,onUpdate,onChangeStatus,onDragStart,onDragOver,onDrop,showOrder,categories}){
  const[catOpen,setCatOpen]=useState(false);
  const[statusOpen,setStatusOpen]=useState(false);
  const[editing,setEditing]=useState(false);
  const[editVal,setEditVal]=useState(task.title);
  const[duePicker,setDuePicker]=useState(false);
  const inp=useRef(null);
  const s=STATUS_CONFIG[task.status]||STATUS_CONFIG[''];
  const dblClickTimer=useRef(null);

  useEffect(()=>{if(editing&&inp.current)inp.current.focus();},[editing]);
  const donEdit=()=>{setEditing(false);if(editVal.trim()&&editVal!==task.title)onUpdate({...task,title:editVal.trim()});};

  const retInfo=useMemo(()=>{
    if(!task.autoReturn||!task.statusChanged||!AUTO_RETURN_MS[task.status])return null;
    const rem=new Date(task.statusChanged).getTime()+AUTO_RETURN_MS[task.status]-msNow();
    if(rem<=0)return'now';
    const h=Math.floor(rem/3600000),d=Math.floor(h/24);
    return d>0?d+'d '+(h%24)+'h':h+'h';
  },[task.statusChanged,task.status,task.autoReturn]);

  const overdue=task.dueDate&&new Date(task.dueDate)<new Date();
  const soon=task.dueDate&&!overdue&&(new Date(task.dueDate).getTime()-msNow())<=DUE_SOON_MS;
  const catCfg=task.category&&categories[task.category];

  const handleStatusClick=(e)=>{
    e.stopPropagation();
    if(dblClickTimer.current){clearTimeout(dblClickTimer.current);dblClickTimer.current=null;onChangeStatus(task.id,'x');return;}
    dblClickTimer.current=setTimeout(()=>{dblClickTimer.current=null;setStatusOpen(!statusOpen);},250);
  };

  return(
    <div draggable={!editing}
      onDragStart={e=>onDragStart(e,idx)} onDragOver={e=>{e.preventDefault();onDragOver(e,idx);}} onDrop={e=>onDrop(e,idx)}
      onClick={()=>onSelect(task.id)} onDoubleClick={()=>{setEditing(true);setEditVal(task.title);}}
      style={{
        display:'flex',alignItems:'center',gap:12,padding:'11px 16px',
        background:isSelected?'#151d35':(task.status?s.rowBg:'#0d1117'),
        borderRadius:10,cursor:'grab',userSelect:'none',
        border:isSelected?'1.5px solid #4a9eff':'1.5px solid #1e2438',
        transition:'all 0.15s ease',position:'relative',minHeight:52,
        opacity:task.status==='s'?0.45:1,
        marginBottom:4,
      }}>

      {/* Order number */}
      {showOrder&&<span style={{width:24,textAlign:'right',fontSize:14,fontFamily:"'JetBrains Mono',monospace",color:'#3a4060',fontWeight:600,flexShrink:0}}>{idx}</span>}

      {/* Status badge - click for dropdown, double-click for instant x */}
      <div style={{position:'relative',flexShrink:0}}>
        <span onClick={handleStatusClick} style={{
          width:36,height:36,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:20,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",cursor:'pointer',
          background:task.status?s.bg:'#151a28',color:task.status?s.color:'#2a3050',
          border:task.status?'none':'2px solid #1e2438',
          transition:'all 0.15s',
        }}>{task.status||'·'}</span>
        {statusOpen&&<StatusDropdown onSelect={st=>{onChangeStatus(task.id,st);setStatusOpen(false);}} onClose={()=>setStatusOpen(false)}/>}
      </div>

      {/* Title + timestamps */}
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:3}}>
        {editing?(
          <input ref={inp} value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={donEdit}
            onKeyDown={e=>{if(e.key==='Enter')donEdit();if(e.key==='Escape')setEditing(false);}}
            style={{border:'none',outline:'none',background:'#0d1117',padding:'4px 8px',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:17,borderRadius:4,boxShadow:'0 0 0 2px #4a9eff',color:'#e0e0e0',width:'100%'}}/>
        ):(
          <span style={{
            fontSize:17,fontFamily:"'IBM Plex Sans',sans-serif",
            color:task.status==='x'?'#5a8a5a':(task.status==='s'?'#555':'#d0d4e0'),
            textDecoration:task.status==='x'?'line-through':'none',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.35,
            fontWeight:task.status==='u'?600:400,
          }}>{task.title}</span>
        )}
        {/* Completed: show both timestamps */}
        {task.status==='x'&&(
          <div style={{display:'flex',gap:14,fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:'#3a5a3a'}}>
            <span>+ {fmt(task.dateAdded)}</span>
            {task.dateCompleted&&<span>✓ {fmt(task.dateCompleted)}</span>}
          </div>
        )}
      </div>

      {/* Auto-return countdown + recurrence indicator */}
      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
        {task.recurrence&&<span style={{fontSize:12,color:'#888',fontFamily:"'JetBrains Mono',monospace"}}>🔁</span>}
        {retInfo&&task.autoReturn&&<span style={{fontSize:12,color:s.color,fontFamily:"'JetBrains Mono',monospace",opacity:0.7}}>↩ {retInfo}</span>}
      </div>

      {/* Category pill */}
      <div style={{position:'relative',flexShrink:0}}>
        {catCfg?(
          <button onClick={e=>{e.stopPropagation();setCatOpen(!catOpen);}} style={{border:'none',borderRadius:5,padding:'3px 10px',fontSize:12,background:catCfg.bg,cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:catCfg.text||'#222'}}>{task.category}</button>
        ):(
          <button onClick={e=>{e.stopPropagation();setCatOpen(!catOpen);}} style={{border:'1.5px dashed #333',borderRadius:5,padding:'3px 8px',fontSize:12,color:'#444',background:'transparent',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}}>+</button>
        )}
        {catOpen&&<CatDropdown categories={categories} onSelect={c=>{onUpdate({...task,category:c});setCatOpen(false);}} onClose={()=>setCatOpen(false)}/>}
      </div>

      {/* Due date */}
      <div style={{position:'relative',flexShrink:0,display:'flex',alignItems:'center',gap:4}}>
        {task.dueDate?(
          <>
            <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",padding:'3px 8px',borderRadius:5,
              background:overdue?'#4a1a1a':(soon?'#3a3520':'#1a1e2e'),
              color:overdue?'#ff6b6b':(soon?'#f0c040':'#5a6080'),
            }}>{new Date(task.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            <button onClick={e=>{e.stopPropagation();onUpdate({...task,dueDate:null});}}
              style={{border:'none',background:'transparent',cursor:'pointer',color:'#444',fontSize:16,padding:'0 2px',lineHeight:1}}
              onMouseEnter={e=>e.currentTarget.style.color='#ff6b6b'} onMouseLeave={e=>e.currentTarget.style.color='#444'} title="Remove due date">×</button>
          </>
        ):(
          <>
            <button onClick={e=>{e.stopPropagation();setDuePicker(!duePicker);}}
              style={{border:'1px dashed #2a2e3e',borderRadius:5,padding:'3px 8px',fontSize:12,color:'#3a3e50',background:'transparent',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}} title="Add due date">📅</button>
            {duePicker&&<input type="date" autoFocus style={{position:'absolute',top:32,right:0,zIndex:200,background:'#1e2230',border:'1px solid #333',borderRadius:6,padding:8,fontSize:13,color:'#ccc',colorScheme:'dark'}}
              onChange={e=>{if(e.target.value)onUpdate({...task,dueDate:e.target.value});setDuePicker(false);}} onBlur={()=>setDuePicker(false)}/>}
          </>
        )}
      </div>

      {/* Timestamp for non-completed */}
      {task.status!=='x'&&<span style={{fontSize:12,color:'#2a3050',fontFamily:"'JetBrains Mono',monospace",flexShrink:0,minWidth:110,textAlign:'right'}}>{fmt(task.dateAdded)}</span>}
    </div>
  );
}

          <div key={name} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'#141822',borderRadius:8,border:'1px solid #1a1e2e'}}>

            <span style={{flex:1,fontSize:16,color:'#d0d4e0',fontWeight:500}}>{name}</span>

          style={{flex:1,border:'1px solid #2a2e3e',borderRadius:6,padding:'8px 12px',fontSize:14,background:'#141822',color:'#d0d4e0',fontFamily:"'IBM Plex Sans',sans-serif",outline:'none'}}/>

  );

/* ══════════════════════════════════════════
   ── Mindmap: Tree Layout Algorithm ──
   ══════════════════════════════════════════ */

function buildTreeStructure(nodes, rootId) {
  const nodeMap = new Map();
  nodes.forEach(node => {
    nodeMap.set(node.id, { ...node, _children: [] });
  });
  nodes.forEach(node => {
    if (node.parentId) {
      const parent = nodeMap.get(node.parentId);
      if (parent) parent._children.push(nodeMap.get(node.id));
    }
  });
  return nodeMap.get(rootId);
}

function initializeLayoutTree(node, nodeWidth, nodeHeight, parent) {
  const layoutNode = {
    id: node.id, data: node,
    x: 0, y: 0, width: nodeWidth, height: nodeHeight,
    prelim: 0, modifier: 0,
    parent: parent || null,
    number: 0,
    children: []
  };
  if (!node.collapsed) {
    layoutNode.children = node._children.map((child, index) => {
      const lc = initializeLayoutTree(child, nodeWidth, nodeHeight, layoutNode);
      lc.number = index;
      return lc;
    });
  }
  return layoutNode;
}

function firstWalk(node) {
  if (node.children.length === 0) {
    const ls = node.parent ? node.parent.children[node.number - 1] : null;
    node.prelim = ls ? ls.prelim + 2 : 0;
  } else {
    node.children.forEach(c => firstWalk(c));
    const mid = node.children.reduce((s, c) => s + c.prelim, 0) / node.children.length;
    const ls = node.parent ? node.parent.children[node.number - 1] : null;
    if (ls) {
      node.prelim = ls.prelim + 2;
      node.modifier = node.prelim - mid;
    } else {
      node.prelim = mid;
    }
  }
}

function secondWalk(node, modifier) {
  node.x = node.prelim + modifier;
  node.children.forEach(c => secondWalk(c, modifier + node.modifier));
}

function findMinX(node) {
  let min = node.x;
  node.children.forEach(c => { min = Math.min(min, findMinX(c)); });
  return min;
}

function collectPositioned(node, out, depth, minX, hs, vs, nw, nh) {
  out.push({ id: node.id, x: Math.round((node.x - minX) * hs), y: Math.round(depth * vs), width: nw, height: nh });
  node.children.forEach(c => collectPositioned(c, out, depth + 1, minX, hs, vs, nw, nh));
}

function computeTreeLayout(nodes, rootId, options = {}) {
  const { horizontalSpacing = 120, verticalSpacing = 80, nodeWidth = 200, nodeHeight = 54 } = options;
  const root = buildTreeStructure(nodes, rootId);
  if (!root) return [];
  const layoutRoot = initializeLayoutTree(root, nodeWidth, nodeHeight, null);
  firstWalk(layoutRoot);
  secondWalk(layoutRoot, 0);
  const minX = findMinX(layoutRoot);
  const positioned = [];
  collectPositioned(layoutRoot, positioned, 0, minX, horizontalSpacing, verticalSpacing, nodeWidth, nodeHeight);
  return positioned;
}

function computeEdges(positionedNodes, nodes) {
  const posMap = new Map();
  positionedNodes.forEach(p => posMap.set(p.id, p));
  const edges = [];
  nodes.forEach(n => {
    if (n.parentId) {
      const pp = posMap.get(n.parentId), cp = posMap.get(n.id);
      if (pp && cp) {
        edges.push({
          fromId: n.parentId, toId: n.id,
          fromX: Math.round(pp.x + pp.width / 2), fromY: Math.round(pp.y + pp.height),
          toX: Math.round(cp.x + cp.width / 2), toY: Math.round(cp.y)
        });
      }
    }
  });
  return edges;
}

/* ══════════════════════════════════════════
   ── Mindmap: Visual Components ──
   ══════════════════════════════════════════ */

function MindmapNode({ node, position, isSelected, isRoot, onSelect, onAddChild, onToggleCollapse, onStartRename, onToggleChecked, onAddToTasks, tasks }) {
  const [hover, setHover] = useState(false);
  const hasChildren = node.children && node.children.length > 0;
  const nw = position.width || 200, nh = position.height || 54;
  const foHeight = nh + 32;
  const isChecked = node.checked;
  // Find linked task status
  const linkedTask = node.linkedTaskId ? tasks.find(t => t.id === node.linkedTaskId) : null;
  const linkedStatus = linkedTask ? linkedTask.status : null;
  const statusCfg = linkedStatus && STATUS_CONFIG[linkedStatus] ? STATUS_CONFIG[linkedStatus] : null;

  return (
    <g onClick={e=>{e.stopPropagation();onSelect();}} onDoubleClick={e=>{e.stopPropagation();onStartRename();}}
       onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <foreignObject x={position.x} y={position.y} width={nw} height={foHeight} style={{overflow:'visible'}}>
        <div style={{position:'relative',width:nw,height:foHeight}}>
          <div style={{
            width:nw,height:nh,background:isChecked?'#0d1117':'#141822',
            border:'2px solid '+(isSelected?'#4a9eff':isChecked?'#2a4a2a':'#1e2438'),
            borderRadius:6,display:'flex',alignItems:'center',gap:8,
            paddingLeft:8,paddingRight:hasChildren?32:8,
            position:'relative',cursor:'pointer',
            boxShadow:isSelected?'0 0 12px rgba(74,158,255,0.3)':'none',
            opacity:isChecked?0.55:1,
            transition:'all 0.2s',fontFamily:"'IBM Plex Sans',sans-serif",
            fontSize:isRoot?15:13,fontWeight:isRoot?600:500,color:isChecked?'#555':'#d0d4e0',overflow:'hidden'
          }}>
            <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:isChecked?'#6ecf6e':(node.color||'#4a9eff'),borderRadius:'4px 0 0 4px'}}/>
            {/* Checkbox */}
            <div onClick={e=>{e.stopPropagation();onToggleChecked();}}
              style={{width:20,height:20,borderRadius:4,marginLeft:4,flexShrink:0,
                border:isChecked?'2px solid #6ecf6e':'2px solid #2a3050',
                background:isChecked?'#2a4a2a':'transparent',
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:'pointer',transition:'all 0.15s',fontSize:12,fontWeight:700,
                color:'#6ecf6e'}}>
              {isChecked?'✓':''}
            </div>
            {/* Title */}
            <div style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              textDecoration:isChecked?'line-through':'none'}}>
              {node.title}
            </div>
            {/* Status badge from linked task */}
            {linkedStatus && linkedStatus !== '' && statusCfg && (
              <span style={{fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                background:statusCfg.bg,color:statusCfg.color,borderRadius:3,padding:'1px 5px',flexShrink:0}}>
                {linkedStatus}
              </span>
            )}
            {/* Notes indicator */}
            {node.notes && node.notes.trim() && (
              <span style={{fontSize:10,color:'#3a4060',flexShrink:0}} title={node.notes}>📝</span>
            )}
            {/* Collapse toggle */}
            {hasChildren&&<div onClick={e=>{e.stopPropagation();onToggleCollapse();}}
              style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%) rotateZ('+(node.collapsed?'-90deg':'0deg')+')',
                width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',
                cursor:'pointer',color:'#3a4060',transition:'transform 0.2s',fontSize:10}}>▶</div>}
          </div>
          {/* Hover buttons below node */}
          <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
            display:'flex',gap:4,opacity:hover?1:0,pointerEvents:hover?'auto':'none',transition:'opacity 0.2s'}}>
            <div onClick={e=>{e.stopPropagation();onAddChild();}}
              style={{width:24,height:24,background:'#4a9eff',borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                color:'#0d1117',fontSize:14,fontWeight:'bold'}}>+</div>
            {!node.linkedTaskId && !isRoot && (
              <div onClick={e=>{e.stopPropagation();onAddToTasks();}} title="Add to Tasks"
                style={{height:24,padding:'0 8px',background:'#2a4a2a',borderRadius:12,
                  display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                  color:'#6ecf6e',fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap'}}>→ Tasks</div>
            )}
          </div>
        </div>
      </foreignObject>
    </g>
  );
}

function MindmapEdge({ edge }) {
  const dy = edge.toY - edge.fromY;
  const off = Math.max(dy * 0.4, 30);
  const d = `M ${edge.fromX} ${edge.fromY} C ${edge.fromX} ${edge.fromY+off}, ${edge.toX} ${edge.toY-off}, ${edge.toX} ${edge.toY}`;
  return <path d={d} stroke="#1e2438" strokeWidth="2" fill="none" strokeLinecap="round" pointerEvents="none"/>;
}

function MindmapNodeEditor({ node, position, onSave, onCancel }) {
  const [val, setVal] = useState(node.title);
  const ref = useRef(null);
  useEffect(()=>{if(ref.current){ref.current.focus();ref.current.select();}},[]);
  const nw = position.width || 200, nh = position.height || 54;
  return (
    <foreignObject x={position.x} y={position.y} width={nw} height={nh} style={{overflow:'visible'}}>
      <div style={{width:nw,height:nh,background:'#141822',border:'2px solid #4a9eff',borderRadius:6,
        display:'flex',alignItems:'center',padding:'0 16px',boxShadow:'0 0 12px rgba(74,158,255,0.3)'}}>
        <input ref={ref} type="text" value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();onSave(val);}else if(e.key==='Escape'){e.preventDefault();onCancel();}}}
          onBlur={()=>onCancel()} onClick={e=>e.stopPropagation()}
          style={{width:'100%',background:'transparent',border:'none',color:'#d0d4e0',
            fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,fontWeight:500,outline:'none',padding:0}}/>
      </div>
    </foreignObject>
  );
}

/* ══════════════════════════════════════════
   ── Mindmap: State Management ──
   ══════════════════════════════════════════ */

const MM_PROJECTS_KEY='taskflow-mm-projects';
const MM_DATA_PREFIX='taskflow-mm-';

function useMindmap() {
  const [projects, setProjects] = useState(() => {
    const stored = loadLS(MM_PROJECTS_KEY, null);
    if (stored && Array.isArray(stored) && stored.length > 0) return stored;
    const pid = uuid();
    const def = [{ id: pid, name: 'My Project', color: '#4a9eff' }];
    saveLS(MM_PROJECTS_KEY, def);
    const old = loadLS('taskflow-mindmap', null);
    if (old && Array.isArray(old) && old.length > 0) {
      saveLS(MM_DATA_PREFIX + pid, old.map(n => ({ notes:'', checked:false, linkedTaskId:null, ...n })));
    } else {
      const rid = uuid();
      saveLS(MM_DATA_PREFIX + pid, [{ id:rid, parentId:null, title:'My Project', color:'#4a9eff', collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null }]);
    }
    return def;
  });
  const [activeProjectId, setActiveProjectId] = useState(() => {
    const p = loadLS(MM_PROJECTS_KEY, []);
    return p.length > 0 ? p[0].id : null;
  });
  const [nodes, setNodes] = useState(() => {
    const p = loadLS(MM_PROJECTS_KEY, []);
    const pid = p.length > 0 ? p[0].id : null;
    if (!pid) return [];
    return loadLS(MM_DATA_PREFIX + pid, []).map(n => ({ notes:'', checked:false, linkedTaskId:null, ...n }));
  });
  const [selectedId, setSelectedId] = useState(null);

  const rootId = useMemo(() => nodes.find(n => !n.parentId)?.id || null, [nodes]);
  const persistProjects = useCallback(pp => { setProjects(pp); saveLS(MM_PROJECTS_KEY, pp); }, []);
  const persistNodes = useCallback((nn, pid) => { setNodes(nn); saveLS(MM_DATA_PREFIX + (pid || activeProjectId), nn); }, [activeProjectId]);

  const switchProject = useCallback(pid => {
    setActiveProjectId(pid);
    setNodes(loadLS(MM_DATA_PREFIX + pid, []).map(n => ({ notes:'', checked:false, linkedTaskId:null, ...n })));
    setSelectedId(null);
  }, []);

  const addProject = useCallback((name = 'New Project') => {
    const pid = uuid(), rid = uuid();
    const np = [...projects, { id:pid, name, color:'#4a9eff' }];
    persistProjects(np);
    saveLS(MM_DATA_PREFIX + pid, [{ id:rid, parentId:null, title:name, color:'#4a9eff', collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null }]);
    switchProject(pid);
    return pid;
  }, [projects, persistProjects, switchProject]);

  const renameProject = useCallback((pid, name) => {
    persistProjects(projects.map(p => p.id === pid ? { ...p, name } : p));
  }, [projects, persistProjects]);

  const deleteProject = useCallback(pid => {
    if (projects.length <= 1) return;
    const np = projects.filter(p => p.id !== pid);
    persistProjects(np);
    try { localStorage.removeItem(MM_DATA_PREFIX + pid); } catch(e) {}
    if (activeProjectId === pid) switchProject(np[0].id);
  }, [projects, activeProjectId, persistProjects, switchProject]);

  const findDescendants = useCallback(nodeId => {
    const desc = [], stack = [nodeId];
    while (stack.length) {
      const cid = stack.pop();
      const nd = nodes.find(n => n.id === cid);
      if (nd && nd.children) nd.children.forEach(ch => { desc.push(ch); stack.push(ch); });
    }
    return desc;
  }, [nodes]);

  const addChild = useCallback((parentId, title = 'New Node') => {
    const newId = uuid();
    const nn = [...nodes, { id:newId, parentId, title, color:'#4a9eff', collapsed:false, children:[], notes:'', checked:false, linkedTaskId:null }];
    const p = nn.find(n => n.id === parentId);
    if (p) p.children = [...(p.children || []), newId];
    persistNodes(nn);
    return newId;
  }, [nodes, persistNodes]);

  const deleteNode = useCallback(id => {
    if (id === rootId) return [];
    const toDelete = new Set([id, ...findDescendants(id)]);
    let nn = nodes.filter(n => !toDelete.has(n.id));
    const nd = nodes.find(n => n.id === id);
    if (nd?.parentId) nn = nn.map(n => n.id === nd.parentId ? { ...n, children: n.children.filter(c => c !== id) } : n);
    if (toDelete.has(selectedId)) setSelectedId(null);
    persistNodes(nn);
    return [...toDelete].map(did => nodes.find(n => n.id === did)?.linkedTaskId).filter(Boolean);
  }, [nodes, rootId, selectedId, findDescendants, persistNodes]);

  const renameNode = useCallback((id, t) => persistNodes(nodes.map(n => n.id === id ? { ...n, title: t } : n)), [nodes, persistNodes]);
  const setNodeColor = useCallback((id, c) => persistNodes(nodes.map(n => n.id === id ? { ...n, color: c } : n)), [nodes, persistNodes]);
  const toggleCollapse = useCallback(id => persistNodes(nodes.map(n => n.id === id ? { ...n, collapsed: !n.collapsed } : n)), [nodes, persistNodes]);
  const setNodeNotes = useCallback((id, notes) => persistNodes(nodes.map(n => n.id === id ? { ...n, notes } : n)), [nodes, persistNodes]);
  const toggleNodeChecked = useCallback(id => persistNodes(nodes.map(n => n.id === id ? { ...n, checked: !n.checked } : n)), [nodes, persistNodes]);
  const setNodeLinkedTask = useCallback((id, taskId) => persistNodes(nodes.map(n => n.id === id ? { ...n, linkedTaskId: taskId } : n)), [nodes, persistNodes]);

  const syncNodeFromTask = useCallback((taskId, newStatus) => {
    const nd = nodes.find(n => n.linkedTaskId === taskId);
    if (!nd) return;
    persistNodes(nodes.map(n => n.linkedTaskId === taskId ? { ...n, checked: newStatus === 'x' } : n));
  }, [nodes, persistNodes]);

  const moveNode = useCallback((id, newParentId) => {
    if (id === rootId) return;
    const desc = findDescendants(id);
    if (desc.includes(newParentId)) return;
    const nd = nodes.find(n => n.id === id);
    if (!nd) return;
    let nn = [...nodes];
    if (nd.parentId) nn = nn.map(n => n.id === nd.parentId ? { ...n, children: n.children.filter(c => c !== id) } : n);
    nn = nn.map(n => {
      if (n.id === id) return { ...n, parentId: newParentId };
      if (n.id === newParentId) return { ...n, children: [...(n.children || []), id] };
      return n;
    });
    persistNodes(nn);
  }, [nodes, rootId, findDescendants, persistNodes]);

  return {
    nodes, rootId, selectedId, setSelectedId,
    addChild, deleteNode, renameNode, setNodeColor, toggleCollapse, moveNode,
    setNodeNotes, toggleNodeChecked, setNodeLinkedTask, syncNodeFromTask,
    projects, activeProjectId, switchProject, addProject, renameProject, deleteProject,
  };
}

   ── Mindmap: Sidebar Tree Item ──
